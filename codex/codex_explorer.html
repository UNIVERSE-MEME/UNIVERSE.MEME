<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CODEX</title>

<style>
:root{
  --text:rgba(240,240,245,.92);
  --grayFoot:rgba(200,205,215,.52);
  --blue:#3366FF;
  --green:#22DD09;
  --border:rgba(255,255,255,.10);
  --scroll-track:rgba(255,255,255,.04);
  --scroll-thumb:rgba(51,102,255,.55);
  --scroll-thumb-hover:rgba(51,102,255,.85);
  --box-bg:rgba(255,255,255,.03);
  --box-border:rgba(255,255,255,.10);
  --danger:#ff6b6b;
  --muted:rgba(240,240,245,.68);
}

html,body{
  width:100%;
  height:100%;
  margin:0;
  background:transparent;
  overflow:hidden;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(51,102,255,.12), transparent 30%),
    radial-gradient(circle at bottom right, rgba(34,221,9,.05), transparent 25%),
    #05070d;
}

.card{
  width:100%;
  height:100%;
  padding:0;
  box-sizing:border-box;
  border:1px solid var(--border);
  border-radius:10px;
  background:
    radial-gradient(circle at 0 0, rgba(51,102,255,.10), transparent 60%),
    rgba(0,0,0,.55);
  text-align:center;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:thin;
  scrollbar-color:var(--scroll-thumb) var(--scroll-track);
}

.card::-webkit-scrollbar{ width:8px; }
.card::-webkit-scrollbar-track{
  background:var(--scroll-track);
  border-radius:8px;
}
.card::-webkit-scrollbar-thumb{
  background:var(--scroll-thumb);
  border-radius:8px;
  box-shadow:0 0 6px rgba(51,102,255,.35);
}
.card::-webkit-scrollbar-thumb:hover{
  background:var(--scroll-thumb-hover);
}

.codex-ui{
  width:100%;
  margin:0;
  padding:14px;
  box-sizing:border-box;
  text-align:left;
}

.codex-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  margin:0 0 10px;
  padding:2px 2px 0;
}

.codex-title{
  font-size:14px;
  letter-spacing:2px;
  font-weight:900;
  color:var(--blue);
  user-select:none;
  line-height:1;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  min-height:42px;
}

.codex-actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:flex-end;
  align-items:center;
  margin-left:auto;
}

.action-wrap{
  position:relative;
  display:inline-flex;
}

.action-wrap:hover .action-tip,
.action-wrap:focus-within .action-tip,
.action-wrap.active .action-tip{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.action-tip{
  position:absolute;
  top:100%;
  right:0;
  margin-top:8px;
  width:auto;
  max-width:none;
  padding:10px 22px 10px 16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:#000;
  color:var(--blue);
  font-size:12px;
  line-height:1.4;
  font-weight:500;
  white-space:nowrap;
  opacity:0;
  transform:translate(-10%,6px);
  transition:opacity .16s ease, transform .16s ease;
  pointer-events:none;
  z-index:30;
  box-shadow:0 16px 36px rgba(0,0,0,.45);
}

.input-shell{
  overflow:hidden;
}

.output-shell{
  display:block;
}

.is-input-mode .output-shell{
  display:none;
}

.is-view-mode .input-shell{
  display:none;
}

.viewer-shell{
  width:100%;
  margin:12px 0 0;
}

.viewer-nav{
  display:flex;
  flex-wrap:nowrap;
  gap:8px;
  margin-bottom:14px;
  overflow-x:auto;
  padding-bottom:2px;
  scrollbar-width:none;
}

.viewer-nav::-webkit-scrollbar{
  display:none;
}

.nav-pill{
  flex:0 0 auto;
  min-height:38px;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.03);
  color:var(--grayFoot);
  font-size:11px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  white-space:nowrap;
}

.nav-pill:hover{
  background:rgba(255,255,255,.03);
}

.nav-pill.active{
  color:var(--blue);
  border-color:rgba(51,102,255,.58);
  background:rgba(51,102,255,.12);
  box-shadow:inset 0 0 0 1px rgba(51,102,255,.18);
}

.viewer-panel{
  border:1px solid var(--box-border);
  border-radius:16px;
  background:var(--box-bg);
  text-align:left;
  overflow:hidden;
}

.viewer-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.viewer-title{
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  font-weight:900;
  color:rgba(240,240,245,.82);
  line-height:1;
}

.viewer-meta{
  flex:1 1 auto;
  min-width:0;
  display:flex;
  justify-content:flex-end;
}

.viewer-body{
  padding:18px;
}

.stack{
  font-size:14px;
  line-height:1.75;
  color:var(--blue);
}

.input-grid{
  width:100%;
  margin:0 0 12px;
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.dropzone{
  border:1px dashed rgba(51,102,255,.45);
  background:rgba(255,255,255,.025);
  border-radius:14px;
  padding:18px 16px;
  text-align:center;
  color:var(--muted);
  transition:border-color .2s ease, background .2s ease, transform .2s ease;
}
.dropzone.dragover{
  border-color:var(--green);
  background:rgba(51,102,255,.08);
  transform:scale(1.005);
}
.dropzone strong{
  display:block;
  color:var(--blue);
  margin-bottom:6px;
  letter-spacing:1px;
}
.dropzone input{ display:none; }

textarea{
  width:100%;
  min-height:180px;
  box-sizing:border-box;
  resize:vertical;
  border-radius:14px;
  border:1px solid var(--box-border);
  background:rgba(0,0,0,.28);
  color:var(--text);
  padding:14px;
  font:13px/1.6 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

button{
  border:1px solid rgba(51,102,255,.28);
  background:rgba(51,102,255,.08);
  color:var(--text);
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:800;
  letter-spacing:.4px;
  min-height:42px;
}
button:hover{
  background:rgba(51,102,255,.14);
}
button.secondary{
  background:rgba(255,255,255,.03);
  border-color:rgba(255,255,255,.08);
}
button:disabled{
  opacity:.42;
  cursor:not-allowed;
}
button:disabled:hover{
  background:rgba(51,102,255,.08);
}
button.secondary:disabled:hover{
  background:rgba(255,255,255,.03);
}

.status{
  width:100%;
  margin:8px 0 0;
  min-height:18px;
  color:var(--muted);
  font-size:13px;
  text-align:center;
}
.status.error{ color:var(--danger); }

.kv{
  display:grid;
  grid-template-columns:minmax(120px, 180px) 1fr;
  gap:8px 16px;
  align-items:start;
}
.kv .k{
  color:var(--grayFoot);
  text-transform:uppercase;
  letter-spacing:1.4px;
  font-size:11px;
  font-weight:900;
}
.kv .v{
  color:var(--text);
  overflow-wrap:anywhere;
}

.pill-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.pill{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  color:var(--text);
  font-size:12px;
}

.codebox{
  white-space:pre-wrap;
  word-break:break-word;
  border-radius:12px;
  padding:12px;
  background:rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.06);
  color:var(--muted);
  font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size:12px;
}

.label-with-info{
  display:flex;
  align-items:center;
  gap:8px;
}

.info-wrap{
  position:relative;
  display:inline-flex;
  align-items:center;
}

.info-dot{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:16px;
  height:16px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  line-height:1;
  color:#fff;
  background:rgba(255,255,255,.14);
  cursor:pointer;
}

.info-wrap:hover .tooltip,
.info-wrap:focus-within .tooltip,
.info-wrap.active .tooltip{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.tooltip{
  position:absolute;
  left:-20px;
  top:24px;
  width:460px;
  max-width:82vw;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:#000;
  color:var(--blue);
  font-size:12px;
  line-height:1.55;
  letter-spacing:0;
  text-transform:none;
  font-weight:500;
  opacity:0;
  transform:translateY(6px);
  transition:opacity .16s ease, transform .16s ease;
  pointer-events:none;
  z-index:20;
  box-shadow:0 16px 36px rgba(0,0,0,.45);
}

.reflectHead{
  width:min(360px, 100%);
  display:grid;
  gap:6px;
}

.reflectTrack{
  position:relative;
  height:8px;
  border-radius:999px;
  background:#d9d9d9;
  overflow:visible;
}

.reflectFill{
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  border-radius:999px;
  background:var(--blue);
}

.reflectThumb{
  position:absolute;
  top:50%;
  width:14px;
  height:14px;
  border-radius:999px;
  background:var(--blue);
  transform:translate(-50%,-50%);
}

.reflectScale{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:10px;
  line-height:1;
  color:rgba(255,255,255,.48);
  text-transform:none;
  letter-spacing:0;
  font-weight:600;
}

.reflectScale span{
  flex:1 1 0;
  text-align:center;
}

.reflectScale.vowScaleMini{
  position:relative;
  height:14px;
  gap:0;
}

.reflectScale.vowScaleMini span{
  position:absolute;
  top:0;
  transform:translateX(-50%);
  flex:none;
  width:auto;
  white-space:nowrap;
  font-size:9px;
}

.uidRow{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.uidShort{
  display:inline-flex;
  align-items:center;
  gap:10px;
  min-width:0;
  color:var(--text);
}

.uidText{
  display:inline-block;
  max-width:100%;
  white-space:nowrap;
}

.uidCopy{
  min-width:32px;
  min-height:32px;
  width:32px;
  height:32px;
  padding:0;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.03);
  color:rgba(255,255,255,.84);
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.uidCopy:hover{
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.16);
}

.uidCopy svg{
  width:14px;
  height:14px;
  display:block;
  fill:currentColor;
}

.uidCopy.is-copied{
  color:var(--green);
  border-color:rgba(34,221,9,.36);
  background:rgba(34,221,9,.08);
}

.portal-website{
  margin-bottom:16px;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.02);
}

.portal-website-label{
  font-size:11px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--grayFoot);
  margin-bottom:10px;
}

.portal-selector{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:16px;
}

.portal-icon{
  width:42px;
  height:42px;
  min-width:42px;
  min-height:42px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.03);
  color:rgba(255,255,255,.78);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

.portal-icon:hover{
  background:rgba(255,255,255,.06);
}

.portal-icon.active{
  color:var(--text);
  border-color:rgba(51,102,255,.45);
  background:rgba(51,102,255,.12);
  box-shadow:inset 0 0 0 1px rgba(51,102,255,.14);
}

.portal-icon.is-dimmed{
  opacity:.28;
  filter:grayscale(1);
  cursor:default;
  pointer-events:none;
}

.portal-icon svg{
  width:18px;
  height:18px;
  display:block;
  fill:currentColor;
}

.portal-detail{
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.02);
}

.portal-detail-title{
  font-size:11px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--grayFoot);
  margin-bottom:12px;
}

.divider{
  height:1px;
  background:rgba(255,255,255,.08);
  margin:14px 0;
}

.messageHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}

.messageTitle{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:900;
  color:var(--grayFoot);
}

.messageBox{
  white-space:pre-wrap;
  word-break:break-word;
  border-radius:12px;
  padding:12px;
  background:rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.06);
  color:var(--text);
  font-size:13px;
  line-height:1.65;
}

.metaGroup + .metaGroup{
  margin-top:16px;
}

.codexSection + .codexSection{
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid rgba(255,255,255,.06);
}

@media (max-width:640px){
  .reflectHead{
    width:100%;
  }
  .codex-bar{
    flex-direction:row;
    align-items:center;
  }
  .codex-actions{
    justify-content:flex-start;
  }
  .action-tip{
    left:0;
    right:auto;
  }
  .kv{
    grid-template-columns:1fr;
  }
}

a{ color:var(--green); }
.empty{ color:var(--grayFoot); }

.action-tip,
.tooltip{
  position:fixed;
  left:50%;
  top:50%;
  right:auto;
  width:min(360px,82vw);
  transform:translate(-50%, calc(-50% + 8px));
  z-index:9999;
  text-align:left;
}

.action-wrap:hover .action-tip,
.action-wrap:focus-within .action-tip,
.action-wrap.active .action-tip,
.info-wrap:hover .tooltip,
.info-wrap:focus-within .tooltip,
.info-wrap.active .tooltip{
  transform:translate(-50%,-50%);
}

.actions .action-tip{
  position:absolute;
  left:50%;
  right:auto;
  top:auto;
  bottom:100%;
  margin-top:0;
  margin-bottom:8px;
  width:min(260px,70vw);
  transform:translate(-50%,6px);
}

.actions .action-wrap:hover .action-tip,
.actions .action-wrap:focus-within .action-tip,
.actions .action-wrap.active .action-tip{
  transform:translate(-50%,0);
}

.codex-actions .action-tip{
  position:absolute;
  left:50%;
  right:auto;
  top:100%;
  bottom:auto;
  margin-top:8px;
  margin-bottom:0;
  width:min(260px,70vw);
  transform:translate(-50%,6px);
}

.codex-actions .action-wrap:hover .action-tip,
.codex-actions .action-wrap:focus-within .action-tip,
.codex-actions .action-wrap.active .action-tip{
  transform:translate(-50%,0);
}

@media (max-width:640px){
  .action-tip,
  .tooltip{
    left:50%;
    right:auto;
  }

  .actions .action-tip{
    left:50%;
    right:auto;
  }
}
</style>
</head>

<body>
<div class="card">
  <div class="codex-ui is-input-mode" id="codexUi">
        <div class="codex-bar">
          <div class="codex-title" id="codexTitle">CODEX</div>

        <div class="codex-actions">
          <span class="action-wrap">
            <button class="secondary" id="inputBtn" type="button">Input</button>
            <span class="action-tip">Show the JSON input panel.</span>
          </span>

          <span class="action-wrap">
            <button id="viewBtn" type="button" disabled>View</button>
            <span class="action-tip">Parse the current JSON and activate view mode.</span>
          </span>

          <span class="action-wrap">
            <button class="secondary" id="editBtn" type="button" disabled>Edit</button>
            <span class="action-tip">Open the current CODEX in edit mode.</span>
          </span>

          <span class="action-wrap">
            <button class="secondary" id="newBtn" type="button">New</button>
            <span class="action-tip">Start a fresh CODEX.</span>
          </span>
        </div>
        </div>

        <div class="input-shell" id="inputShell">
          <div class="input-grid">
            <label class="dropzone" id="dropzone">
              <strong>Drop JSON</strong>
              or click to upload
              <input type="file" id="fileInput" accept=".json,application/json" />
            </label>

            <textarea id="jsonInput" placeholder='Paste JSON here...'></textarea>

            <div class="actions">
              <span class="action-wrap">
                <button id="applyInlineBtn" type="button" disabled>Apply</button>
                <span class="action-tip">Parse the current JSON and activate view mode.</span>
              </span>

              <span class="action-wrap">
                <button class="secondary" id="loadSampleBtn" type="button">Sample</button>
                <span class="action-tip">Load a sample codex for testing the viewer.</span>
              </span>

              <span class="action-wrap">
                <button class="secondary" id="clearBtn" type="button">Clear</button>
                <span class="action-tip">Clear current input and output.</span>
              </span>
            </div>
          </div>
        </div>

        <div class="status" id="status"></div>

        <div class="output-shell" id="outputShell">
          <div id="output"></div>
        </div>
  </div>
</div>

<script>
(function(){
  const codexUi=document.getElementById("codexUi");
  const inputBtn=document.getElementById("inputBtn");
  const viewBtn=document.getElementById("viewBtn");
  const editBtn=document.getElementById("editBtn");
  const newBtn=document.getElementById("newBtn");
  const dropzone=document.getElementById("dropzone");
  const fileInput=document.getElementById("fileInput");
  const jsonInput=document.getElementById("jsonInput");
  const applyInlineBtn=document.getElementById("applyInlineBtn");
  const loadSampleBtn=document.getElementById("loadSampleBtn");
  const clearBtn=document.getElementById("clearBtn");
  const output=document.getElementById("output");
  const status=document.getElementById("status");

  const vowStops=[3,14,29.5,47,61,76.5,94];
  const reflectWords={
    guide:["emerging","forming","embodied"],
    common:["passive","aligning","vibrant"],
    equilibrium:["unclear","visible","coherent"],
    success:["unclear","forming","meaningful"],
    comud:["strained","well-being","thriving"]
  };

  const portalDefs=[
    {key:"github",label:"GitHub",metric:"followers",linkKey:"github",socialKey:"github_followers",type:"github"},
    {key:"x",label:"X",metric:"followers",linkKey:"x",socialKey:"twitter_followers",type:"x"},
    {key:"telegram",label:"Telegram",metric:"users",linkKey:"telegram",socialKey:"telegram_users",type:"telegram"},
    {key:"discord",label:"Discord",metric:"members",linkKey:"discord",socialKey:"discord_members",type:"discord"},
    {key:"instagram",label:"Instagram",metric:"followers",linkKey:"instagram",socialKey:"instagram_followers",type:"instagram"},
    {key:"youtube",label:"YouTube",metric:"subscribers",linkKey:"youtube",socialKey:"youtube_subscribers",type:"youtube"},
    {key:"tiktok",label:"TikTok",metric:"followers",linkKey:"tiktok",socialKey:"tiktok_followers",type:"tiktok"},
    {key:"reddit",label:"Reddit",metric:"subscribers",linkKey:"reddit",socialKey:"reddit_subscribers",type:"reddit"}
  ];

  const sample={
    "identity":{
      "name":"Pepe",
      "website":"https://www.pepe.vip",
      "previous_uid":"",
      "symbol":"PEPE",
      "image":"https://www.pepe.vip/logo.png"
    },
    "links":{
      "github":"",
      "x":"https://twitter.com/pepecoineth",
      "telegram":"",
      "discord":"",
      "instagram":"",
      "youtube":"",
      "tiktok":"",
      "reddit":"https://www.reddit.com/r/pepecoin"
    },
    "social":{
      "github_followers":0,
      "twitter_followers":0,
      "telegram_users":0,
      "discord_members":0,
      "instagram_followers":0,
      "youtube_subscribers":0,
      "tiktok_followers":0,
      "reddit_subscribers":0
    },
    "codex":{
      "vow":{

  function fmtValue(v){
    if(v===null||v===undefined||v==="") return '<span class="empty">—</span>';
    if(typeof v==="boolean") return v?"Yes":"No";
    if(typeof v==="number") return Number.isFinite(v)?v.toLocaleString():String(v);
    return escapeHtml(String(v));
  }

  function fmtPlain(v){
    if(v===null||v===undefined||v==="") return "—";
    if(typeof v==="number") return Number.isFinite(v)?v.toLocaleString():String(v);
    return String(v);
  }

  function clampPercent(v){
    const n=Number(v);
    if(!Number.isFinite(n)) return 0;
    return Math.max(0,Math.min(100,n));
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  function linkValue(url){
    if(!url) return '<span class="empty">—</span>';

    return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${safe}</a>`;
  }

  function stableStringify(value){
    if(Array.isArray(value)){
      return "["+value.map(v=>stableStringify(v===undefined?null:v)).join(",")+"]";
    }
    if(value&&typeof value==="object"){
      return "{"+Object.keys(value).sort().map(
        key=>JSON.stringify(key)+":"+stableStringify(value[key]===undefined?null:value[key])
      ).join(",")+"}";
    }
    return JSON.stringify(value);
  }

  async function sha256(str){
    const buffer=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buffer),b=>b.toString(16).padStart(2,"0")).join("");
  }

  function slugify(s){
    return String(s||"")
      .normalize("NFKC")
      .trim()
      .replace(/\s+/g," ")
      .toLowerCase()
      .replace(/['"]/g,"")
      .replace(/[^a-z0-9]+/g,"-")
      .replace(/^-+|-+$/g,"");
  }

  function detectSchema(data){
    if(data&&typeof data==="object"){

      if(data.id&&data.followers&&data.codex_context) return "legacy";
    }
    return "generic";
  }

  function getUidPrefix(data){
    const schema=detectSchema(data);
    if(schema==="profile"){
      const symbol=String(data?.identity?.symbol||"").trim().toUpperCase();
      if(symbol) return symbol;
      const name=slugify(data?.identity?.name||"").toUpperCase();
      if(name) return name;
    }
    if(schema==="legacy"){
      const symbol=String(data?.symbol||"").trim().toUpperCase();
      if(symbol) return symbol;
      const id=slugify(data?.id||"").toUpperCase();
      if(id) return id;
    }
    return "CODEX";
  }

  function buildDisplayUid(data,uid){
    const prefix=getUidPrefix(data);
    const start=uid.slice(0,2).toUpperCase();
    const end=uid.slice(-2).toUpperCase();
    return `${prefix}_${start}......${end}`;
  }

  async function copyText(text,btn){
    let ok=false;
    try{
      if(navigator.clipboard&&window.isSecureContext){
        await navigator.clipboard.writeText(text);
        ok=true;
      }
    }catch{}
    if(!ok){
      const ta=document.createElement("textarea");
      ta.value=text;
      ta.setAttribute("readonly","");
      ta.style.position="fixed";
      ta.style.opacity="0";
      ta.style.pointerEvents="none";
      ta.style.left="-9999px";
      ta.style.top="0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0,ta.value.length);
      try{
        ok=document.execCommand("copy");
      }catch{
        ok=false;
      }
      ta.remove();
    }
    if(btn&&ok){
      btn.classList.add("is-copied");
      setTimeout(()=>btn.classList.remove("is-copied"),1200);
    }
    return ok;
  }

  function getCodexReflection(data){
    const schema=detectSchema(data);

    const codex=data.codex||{};
    const guide=Number(codex?.guide?.reflection)||0;
    const common=Number(codex?.common?.reflection)||0;
    const equilibrium=Number(codex?.equilibrium?.reflection)||0;
    const success=Number(codex?.success?.reflection)||0;
    const comud=Number(codex?.comud?.reflection)||0;
    const avg=Math.round((guide+common+equilibrium+success+comud)/5)||0;
    const scopes=["Self","Circle","Community","Culture","Nation","Humanity","UNIVERSE"];
    const vowScope=String(codex?.vow?.scope||"");
    const vowIndex=Math.max(1,scopes.indexOf(vowScope)+1||1);
    return `${avg}.${vowIndex}`;
  }

  function getCodexMessage(data,uid){
    const schema=detectSchema(data);
    if(schema!=="profile"){
      return `#CODEX\n${uid}`;

    const reflection=getCodexReflection(data);
    const website=data?.identity?.website||"—";
    return `#CODEX ${reflection}\n${uid}\n${website}`;
  }

  function getPortalData(data){
    const schema=detectSchema(data);
    const website=schema==="profile" ? (data?.identity?.website||"") : "";
    const links=schema==="profile" ? (data?.links||{}) : (data?.links||{});
    const social=schema==="profile" ? (data?.social||{}) : (data?.followers||{});
    return {website,links,social};
  }

  function portalAvailable(data,def){
    const source=getPortalData(data);
    return !!(source.links?.[def.linkKey] || Number(source.social?.[def.socialKey]||0) > 0);
  }

  function normalizeActivePortal(data){
    const available=portalDefs.filter(p=>portalAvailable(data,p)).map(p=>p.key);
    if(available.includes(activePortal)) return activePortal;
    return available[0] || portalDefs[0].key;
  }

  function renderPortalSection(data){
    const source=getPortalData(data);
    const website=source.website;
    activePortal=normalizeActivePortal(data);
    const current=portalDefs.find(p=>p.key===activePortal) || portalDefs[0];
    const currentUrl=source.links?.[current.linkKey]||"";
    const currentMetric=source.social?.[current.socialKey];
    return `
      <div class="portal-website">
        <div class="portal-website-label">Website</div>
        <div>${linkValue(website)}</div>
      </div>
      <div class="portal-selector">
        ${portalDefs.map(p=>`
          <button type="button" class="portal-icon${p.key===activePortal?' active':''}${portalAvailable(data,p)?'':' is-dimmed'}" data-portal-tab="${escapeHtml(p.key)}" aria-label="${escapeHtml(p.label)}" title="${escapeHtml(p.label)}">
            ${iconMarkup(p.type)}
          </button>
        `).join("")}
      </div>
      <div class="portal-detail">
        <div class="portal-detail-title">${escapeHtml(current.label)}</div>
        ${kvBlock([
          kvRow("url",currentUrl,true),
          kvRow(current.metric,currentMetric)
        ])}
      </div>
    `;
  }

      }

    if(codex.comud){

    }

    return renderViewerShell(`
      <div class="viewer-panel">
        <div class="viewer-head">
          <div class="viewer-title">${headTitle}</div>
          <div class="viewer-meta">${headMeta}</div>
        </div>
        <div class="viewer-body">${body}</div>
      </div>
    `);
  }

  function renderProfile(data,uid){
    let headTitle="IDENTITY";
    let headMeta="";
    let body="";

    if(activeFrame==="identity"){
      headTitle="IDENTITY";
      body=`
        <div class="stack">
          ${kvBlock([
            kvRow("name",data.identity?.name),
            kvRow("symbol",data.identity?.symbol),
            kvLabelWithInfo("current uid","Current UID of the loaded CODEX, generated by hashing its canonical JSON form. Changes in content produce a different UID."),
            uidValueRow(data,uid),
            kvRow("website",data.identity?.website,true),
            kvRow("previous uid",data.identity?.previous_uid),
            kvRow("image",data.identity?.image,true)
          ])}
        </div>
      `;
    }

    if(activeFrame==="portals"){
      headTitle="PORTALS";
      body=`<div class="stack">${renderPortalSection(data)}</div>`;
    }

    if(activeFrame==="codex"){
      headTitle="CODEX";
      body=`<div class="stack">${renderCodexProfile(data.codex||{})}</div>`;
    }

    if(activeFrame==="meta"){
      headTitle="META";
      body=`
        <div class="stack">
          <div class="metaGroup">
            ${kvBlock([
              kvRow("codex",data.meta?.codex),
              kvRow("hash algo",data.meta?.hash_algo),
              kvRow("canonicalization",data.meta?.canonicalization),
              kvRow("timestamp",data.meta?.timestamp)
            ])}
          </div>
          <div class="metaGroup">
            ${messageBlock(data,uid)}
          </div>
        </div>
      `;
    }

    return renderViewerShell(`
      <div class="viewer-panel">
        <div class="viewer-head">
          <div class="viewer-title">${headTitle}</div>
          <div class="viewer-meta">${headMeta}</div>
        </div>
        <div class="viewer-body">${body}</div>
      </div>
    `);
  }

  function renderGeneric(data,uid){
    let headTitle="IDENTITY";
    let body="";

    if(activeFrame==="identity"){
      body=`
        <div class="stack">
          ${kvBlock([
            kvLabelWithInfo("current uid","Current UID of the loaded CODEX, generated by hashing its canonical JSON form. Changes in content produce a different UID."),
            uidValueRow(data,uid)
          ])}
        </div>
      `;
    }

    if(activeFrame==="portals"){
      headTitle="PORTALS";
      body=`<div class="codebox">—</div>`;
    }

    if(activeFrame==="codex"){
      headTitle="CODEX";
      body=`<div class="codebox">${escapeHtml(JSON.stringify(data,null,2))}</div>`;
    }

    if(activeFrame==="meta"){
      headTitle="META";
      body=`<div class="stack">${messageBlock(data,uid)}</div>`;
    }

    return renderViewerShell(`
      <div class="viewer-panel">
        <div class="viewer-head">
          <div class="viewer-title">${headTitle}</div>
        </div>
        <div class="viewer-body">${body}</div>
      </div>
    `);
  }

  function bindDynamicOutput(){
    output.querySelectorAll(".info-wrap").forEach(el=>{
      el.addEventListener("click",e=>{
        e.stopPropagation();
        el.classList.toggle("active");
      });
    });

    output.querySelectorAll("[data-frame-tab]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        activeFrame=btn.dataset.frameTab||"identity";
        if(currentData&&currentUid) renderData(currentData,currentUid);
      });
    });

    output.querySelectorAll("[data-portal-tab]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        activePortal=btn.dataset.portalTab||activePortal;
        if(currentData&&currentUid) renderData(currentData,currentUid);
      });
    });

    output.querySelectorAll("[data-copy-uid]").forEach(btn=>{
      btn.addEventListener("click",async e=>{
        e.stopPropagation();
        const uid=btn.getAttribute("data-copy-uid")||"";
        if(uid) await copyText(uid,btn);
      });
    });

    output.querySelectorAll("[data-copy-message]").forEach(btn=>{
      btn.addEventListener("click",async e=>{
        e.stopPropagation();
        const msg=btn.getAttribute("data-copy-message")||"";
        if(msg) await copyText(msg,btn);
      });
    });
  }

  function renderData(data,uid){
    const schema=detectSchema(data);
    currentUid=uid;
    if(schema==="profile"){
      output.innerHTML=renderProfile(data,uid);
    }else if(schema==="legacy"){
      output.innerHTML=renderLegacy(data,uid);
    }else{
      output.innerHTML=renderGeneric(data,uid);
    }
    setStatus("");
    bindDynamicOutput();
  }

  function clearRenderedData(){
    currentData=null;
    currentUid="";
    output.innerHTML="";
    updateButtonState();
  }

  async function parseAndRender(text){
    try{
      const data=JSON.parse(text);
      const canonical=stableStringify(data);
      const uid=await sha256(canonical);
      currentJson=text;
      currentData=data;
      if(!["identity","portals","codex","meta"].includes(activeFrame)) activeFrame="identity";
      activePortal=normalizeActivePortal(data);
      renderData(data,uid);
      updateButtonState();
      setMode("view");
    }catch(err){
      currentData=null;
      currentUid="";
      output.innerHTML="";
      setStatus(`Invalid JSON: ${err.message}`,true);
      updateButtonState();
      setMode("input");
    }
  }

  async function readFile(file){
    const text=await file.text();
    jsonInput.value=text;
    currentJson=text;
    setStatus("");
    updateButtonState();
  }

  function emitEditInBuilder(){
    try{
      sessionStorage.setItem("codex_builder_mode","edit");
      sessionStorage.setItem("codex_builder_payload",JSON.stringify({
        json:currentJson||"",
        data:currentData||null
      }));
    }catch{}
    window.location.href="../codex.html";
  }

  function emitBuildNew(){
    try{
      sessionStorage.setItem("codex_builder_mode","build");
      sessionStorage.removeItem("codex_builder_payload");
    }catch{}
    window.location.href="../codex.html";
  }

  inputBtn.addEventListener("click",()=>{
    setMode("input");
  });

  viewBtn.addEventListener("click",()=>{
    if(viewBtn.disabled) return;
    parseAndRender(jsonInput.value.trim());
  });

  applyInlineBtn.addEventListener("click",()=>{
    if(applyInlineBtn.disabled) return;
    parseAndRender(jsonInput.value.trim());
  });

  editBtn.addEventListener("click",()=>{
    if(editBtn.disabled) return;
    emitEditInBuilder();
  });

newBtn.addEventListener("click",()=>{
  emitBuildNew();
});

  jsonInput.addEventListener("input",()=>{
    currentJson=jsonInput.value;
    clearRenderedData();
    setStatus("");
  });

  document.addEventListener("click",e=>{
    document.querySelectorAll(".action-wrap.active").forEach(el=>{
      if(!el.contains(e.target)) el.classList.remove("active");
    });
    output.querySelectorAll(".info-wrap.active").forEach(el=>{
      if(!el.contains(e.target)) el.classList.remove("active");
    });
  });

  document.querySelectorAll(".action-wrap").forEach(el=>{
    const btn=el.querySelector("button");
    btn.addEventListener("click",e=>{
      e.stopPropagation();
    });
    btn.addEventListener("contextmenu",e=>{
      e.preventDefault();
      el.classList.toggle("active");
    });
  });

  dropzone.addEventListener("dragover",e=>{
    e.preventDefault();
    dropzone.classList.add("dragover");
  });

  dropzone.addEventListener("dragleave",()=>{
    dropzone.classList.remove("dragover");
  });

  dropzone.addEventListener("drop",e=>{
    e.preventDefault();
    dropzone.classList.remove("dragover");
    const file=e.dataTransfer.files?.[0];
    if(file) readFile(file);
  });

  fileInput.addEventListener("change",e=>{
    const file=e.target.files?.[0];
    if(file) readFile(file);
  });

  loadSampleBtn.addEventListener("click",()=>{
    jsonInput.value=JSON.stringify(sample,null,2);
    currentJson=jsonInput.value;
    setStatus("");
    clearRenderedData();
  });

  clearBtn.addEventListener("click",()=>{
    jsonInput.value="";
    currentJson="";
    currentData=null;
    currentUid="";
    output.innerHTML="";
    setStatus("");
    updateButtonState();
    setMode("input");
  });

  window.getCodexUiState=()=>({ json:currentJson, data:currentData, uid:currentUid });

  updateButtonState();
  setMode("input");
})();
</script>
</body>
</html>
