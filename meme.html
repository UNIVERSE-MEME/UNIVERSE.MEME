            const fallbackFn = C.CODEX_DEFAULTS[state.activeWord];
            inactive = !isSovereign && !(Number.isFinite(metaMetric) && metaMetric > 0);
            shortText = wordShort || (fallbackFn ? fallbackFn(name) : `How <span class="community-name">${name}</span> activates ${label}.`);
          }

          const longText = !isCodexTab && !inactive && !!wordLong ? wordLong : null;
          const showChev = !!longText;
          const activationNote = inactive ? `<span class="activation-note activation-open" data-open-activation="1" role="button" tabindex="0" aria-label="SPARK CODEX"></span>` : '';
          const enterVow = '';

          if (isCodexTab) {
            return `
              <div class="links">
                <div class="codexnote is-idle">
                  <div class="codex-rowhead">
                    <div class="codexrow">
                      <span class="codex-deeplink" data-open-codex="1">${label}</span>
                      <div class="codexcenter">
                        <div class="codex-idle-row">
                          <span class="mirror-text${inactive ? ' inactive' : ''}">${shortText}</span>
                          ${inactive ? activationNote : enterVow}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            `;
          }

          return `
            <div class="links">
              <div class="codexnote">
                <div class="codex-rowhead">
                  <div class="codexrow">
                    <span class="codex-deeplink" data-open-codex="1">${label}</span>
                    <span class="codexcenter">
                      <span class="mirror-text${inactive ? ' inactive' : ''}">${shortText}</span>
                    </span>
                    ${inactive ? activationNote : `${showChev ? Panel.chevronSvg() : ``}`}
                  </div>
                </div>
                ${showChev ? `<div class="codex-expand" data-codex-expand-body="1" style="display:none">${longText}</div>` : ``}
              </div>
            </div>
          `;
        },
        bindPanelHandle() {
          const hBtn = document.getElementById('panelHandle');
          if (hBtn) Util.bindPress(hBtn, Panel.close);
        },
        bindCodexExplore() {
          const explore = el.panel.querySelector('.codex-explore[data-open-codex="1"]');
          if (explore && !explore.dataset.bound) {
            explore.dataset.bound = '1';
            const openUniverseCodex = ev => {
              ev.preventDefault();
              ev.stopPropagation();

              Portal.post('MEME_OPEN_PORTAL_CODEX', {
                key: state.activeWord || 'vow',
                coin: { id: 'codex', symbol: 'CODEX', name: 'UNIVERSE' }
              });
            };
            Util.bindPress(explore, openUniverseCodex);
            explore.setAttribute('role', 'button');
            explore.setAttribute('tabindex', '0');
          }
        },
        bindCodexLine() {
          if (state.panelTab !== 'codex') return;
          const line = el.panel.querySelector('.codexline');
          if (line && !line.dataset.bound) {
            line.dataset.bound = '1';
            line.addEventListener('click', e => {
              const k = e.target?.getAttribute?.('data-k');
              if (!k) return;
              App.setActiveWord(k, true);
              Panel.renderCodexSystemPanel();
            });
            line.addEventListener('keydown', e => {
              if (e.key !== 'Enter' && e.key !== ' ') return;
              const k = e.target?.getAttribute?.('data-k');
              if (!k) return;
              e.preventDefault();
              App.setActiveWord(k, true);
              Panel.renderCodexSystemPanel();
            });
            [...line.querySelectorAll('.k[data-k]')].forEach(node => {
              node.setAttribute('role', 'button');
              node.setAttribute('tabindex', '0');
            });
          }
        },
        bindTabs(bindings) {
          Object.entries(bindings).forEach(([id, next]) => {
            const node = document.getElementById(id);
            if (!node) return;
            Util.bindPress(node, () => next());
          });
        },
        codexControlHtml() {
          const isCodex = state.panelTab === 'codex';
          const mode = isCodex ? (state.activeWord ? 'item' : 'root') : 'idle';
          const idx = C.CODEX_KEYS.indexOf(state.activeWord);
          const step = 100 / C.CODEX_KEYS.length;
          const dash = idx >= 0 ? -(idx * step) : 0;

          return `
            <div id="badgeCodex" class="badge action codex-control ${mode} ${isCodex ? 'active' : ''}" title="CODEX" role="button" tabindex="0">
              <div class="codex-hit left" data-codex-action="prev"></div>
              <div class="codex-hit center" data-codex-action="root"></div>
              <div class="codex-hit right" data-codex-action="next"></div>
              <div class="codex-label">CODEX</div>
              <svg class="codex-ring" viewBox="0 0 24 24" aria-hidden="true">
                <circle class="codex-ring-base" cx="12" cy="12" r="8.5"></circle>
                <g class="codex-ring-mover">
                  <circle class="codex-ring-segment" cx="12" cy="12" r="8.5" pathLength="100" style="stroke-dashoffset:${dash}"></circle>
                </g>
              </svg>
              <div class="codex-overlay">CODEX</div>
              <div class="codex-arrow left">◀</div>
              <div class="codex-arrow right">▶</div>
            </div>`;
        },
        bindCodexControl() {
          const node = document.getElementById('badgeCodex');
          if (!node || node.dataset.bound) return;
          node.dataset.bound = '1';

          const rerender = () => {
            if (state.activeCoin) Panel.renderDetailsView(state.activeCoin);
            else Panel.renderCodexSystemPanel();
          };

          const restart = () => {
            if (!state.simulation) return;
            state.simulation.alpha(0.65).alphaTarget(0.10).restart();
            setTimeout(() => state.simulation.alphaTarget(0), 250);
          };

          const setRoot = () => {
            state.panelTab = 'codex';
            state.activeWord = null;
            CodexWheel.updateWheelHighlight();
            Viz.applySizing('codex');
            Viz.setLayout(true, state.panelTab);
            rerender();
            restart();
          };

          const stepWord = dir => {
            state.panelTab = 'codex';
            const keys = C.CODEX_KEYS;
            const current = keys.indexOf(state.activeWord);

            if (current === -1) {
              if (dir > 0) {
                App.setActiveWord(keys[0], !state.activeCoin);
              } else {
                App.setActiveWord(keys[keys.length - 1], !state.activeCoin);
              }
              restart();
              return;
            }

            if (current === keys.length - 1 && dir > 0) {
              state.activeWord = null;
              setRoot();
              return;
            }

            if (current === 0 && dir < 0) {
              state.activeWord = null;
              setRoot();
              return;
            }

            const nextIndex = current + dir;
            App.setActiveWord(keys[nextIndex], !state.activeCoin);
            restart();
          };

          node.addEventListener('click', e => {
            e.preventDefault();
            e.stopPropagation();

            const action = e.target?.getAttribute?.('data-codex-action');

            if (state.panelTab !== 'codex') {
              setRoot();
              return;
            }

            if (action === 'prev') stepWord(-1);
            else if (action === 'next') stepWord(1);
            else setRoot();
          });

          node.addEventListener('keydown', e => {
            if (e.key !== 'Enter' && e.key !== ' ') return;
            e.preventDefault();
            setRoot();
          });
        },
        renderCodexSystemPanel() {
          if (!state.panelTab) state.panelTab = 'codex';

          const id = 'codex';
          const name = 'UNIVERSE';
          const logo = 'media/UNIVERSE-LOGO-256.png';

          const counts = Data.socialCountsFromJson(id);
          const countsAvailable = Object.values(counts).some(v => Number.isFinite(v));
          const topSocial = countsAvailable ? Data.bestSocialFromCounts(counts) : null;
          const socialTitle = topSocial ? `Size by largest social following (${topSocial.platform.toUpperCase()})` : 'Size by largest social following';

          const socialBadge = `
            <div id="badgeSocial" class="badge action ${state.panelTab === 'social' ? 'active' : ''}" title="${socialTitle}" role="button" tabindex="0">
              ${Icons.github()}
            </div>`;

          const codexBadge = Panel.codexControlHtml();

          let bodyHtml = '';

          if (state.panelTab === 'social') {
            const links = Data.linksFromJson(id);
            const socialIcons = [];
            Panel.addSocialIcon(socialIcons, { label: 'X', url: links.x, iconHtml: Icons.x(), count: counts.x });
            Panel.addSocialIcon(socialIcons, { label: 'Telegram', url: links.telegram, iconHtml: Icons.telegram(), count: counts.telegram });
            Panel.addSocialIcon(socialIcons, { label: 'Discord', url: links.discord, iconHtml: Icons.discord(), count: counts.discord });
            Panel.addSocialIcon(socialIcons, { label: 'Instagram', url: links.instagram, iconHtml: Icons.instagram(), count: counts.instagram });
            Panel.addSocialIcon(socialIcons, { label: 'YouTube', url: links.youtube, iconHtml: Icons.youtube(), count: counts.youtube });
            Panel.addSocialIcon(socialIcons, { label: 'TikTok', url: links.tiktok, iconHtml: Icons.tiktok(), count: counts.tiktok });
            Panel.addSocialIcon(socialIcons, { label: 'Reddit', url: links.reddit, iconHtml: Icons.reddit(), count: counts.reddit });
            Panel.addSocialIcon(socialIcons, { label: 'GitHub', url: links.github, iconHtml: Icons.github(), count: counts.github });
            bodyHtml = `<div class="links">${socialIcons.length ? `<div class="socialrow">${socialIcons.join('')}</div>` : `<span class="smallnote">No public links found.</span>`}</div>`;
          } else {
            bodyHtml = Panel.codexPanelBody({ id, name });
          }

          state.panelTab = state.panelTab === 'social' ? 'social' : 'codex';
          Viz.setLayout(true, state.panelTab);

          el.panel.innerHTML = `
            <div class="panelbar">
              <div class="panelhandle" id="panelHandle" role="button" tabindex="0" aria-label="Collapse"></div>
            </div>
            <div class="info-head">
              <div class="info-left">
                <img class="coin-logo" src="${logo}" alt="${name} logo" loading="lazy">
                <div class="coinname" style="color:var(--green); letter-spacing:.12em;">${name}</div>
              </div>
              <div class="info-right">
                ${socialBadge}
                ${codexBadge}
              </div>
            </div>
            ${bodyHtml}
          `;

          Panel.bindPanelHandle();

          Panel.bindTabs({
            badgeSocial: () => {
              state.panelTab = 'social';
              state.activeWord = null;
              CodexWheel.updateWheelHighlight();
              Viz.applySizing('social');
              Panel.renderCodexSystemPanel();
              if (state.simulation) {
                state.simulation.alpha(0.65).alphaTarget(0.10).restart();
                setTimeout(() => state.simulation.alphaTarget(0), 250);
              }
            }
          });

          Panel.bindCodexControl();
          Panel.bindCodexExplore();
          Panel.bindCodexLine();
        },
        renderDetailsView(payload) {
          if (!payload) {
            el.panel.innerHTML = `<div class="panelbar"><div class="panelhandle" id="panelHandle" role="button" tabindex="0" aria-label="Collapse"></div></div><div class="coinname">—</div>`;
            Panel.bindPanelHandle();
            return;
          }

          const { id, symbol, name, logo, mc, links, counts, countsAvailable, sourceNote } = payload;
          state.activeCoin = payload;

          const topSocial = countsAvailable ? Data.bestSocialFromCounts(counts) : null;
          const socialTitle = topSocial ? `Size by largest social following (${topSocial.platform.toUpperCase()})` : 'Size by largest social following';
          const socialBadgeInner = topSocial ? `${Icons.platform(topSocial.platform)}<span>${Util.numShort(topSocial.value)}</span>` : `<span>—</span>`;

          const mcBadge = `<div id="badgeMc" class="badge action ${state.panelTab === 'mc' ? 'active' : ''}" title="Market cap" role="button" tabindex="0">${Util.mcHtml(mc)}</div>`;
          const socialBadge = `<div id="badgeSocial" class="badge action ${state.panelTab === 'social' ? 'active' : ''}" title="${socialTitle}" role="button" tabindex="0">${socialBadgeInner}</div>`;
          const codexBadge = Panel.codexControlHtml();

          let bodyHtml = '';
          if (state.panelTab === 'social') {
            const socialIcons = [];
            Panel.addSocialIcon(socialIcons, { label: 'X', url: links.x, iconHtml: Icons.x(), count: counts.x });
            Panel.addSocialIcon(socialIcons, { label: 'Telegram', url: links.telegram, iconHtml: Icons.telegram(), count: counts.telegram });
            Panel.addSocialIcon(socialIcons, { label: 'Discord', url: links.discord, iconHtml: Icons.discord(), count: counts.discord });
            Panel.addSocialIcon(socialIcons, { label: 'Instagram', url: links.instagram, iconHtml: Icons.instagram(), count: counts.instagram });
            Panel.addSocialIcon(socialIcons, { label: 'YouTube', url: links.youtube, iconHtml: Icons.youtube(), count: counts.youtube });
            Panel.addSocialIcon(socialIcons, { label: 'TikTok', url: links.tiktok, iconHtml: Icons.tiktok(), count: counts.tiktok });
            Panel.addSocialIcon(socialIcons, { label: 'Reddit', url: links.reddit, iconHtml: Icons.reddit(), count: counts.reddit });
            Panel.addSocialIcon(socialIcons, { label: 'GitHub', url: links.github, iconHtml: Icons.github(), count: counts.github });
            bodyHtml = `<div class="links">${socialIcons.length ? `<div class="socialrow">${socialIcons.join('')}</div>` : `<span class="smallnote">No public links found.</span>`}${sourceNote ? `<div class="smallnote">${sourceNote}</div>` : ``}</div>`;
          } else if (state.panelTab === 'codex') {
            bodyHtml = Panel.codexPanelBody({ id, name });
          } else {
            bodyHtml = `<div class="links"></div>`;
          }

          el.panel.innerHTML = `
            <div class="panelbar">
              <div class="panelhandle" id="panelHandle" role="button" tabindex="0" aria-label="Collapse"></div>
            </div>
            <div class="info-head">
              <div class="info-left">
                ${logo ? `<a class="linkname" href="#" data-open-viewer="1" title="Open ${name} Codex"><img class="coin-logo" src="${logo}" alt="${name} logo" loading="lazy"></a>` : ``}
                  <a class="coinname linkname" href="#" data-open-viewer="1" title="Open ${name} Codex">${name}</a>
              </div>
              <div class="info-right">
                ${mcBadge}${socialBadge}${codexBadge}
              </div>
            </div>
            ${bodyHtml}
          `;

          Panel.bindPanelHandle();

          const openViewer = el.panel.querySelectorAll('[data-open-viewer="1"]');
          openViewer.forEach(node => {
            if (node.dataset.bound) return;
            node.dataset.bound = '1';
            Util.bindPress(node, e => {
              e.preventDefault();
              e.stopPropagation();
              state.activeWord = null;
              el.body.classList.remove('is-word-active');
              CodexWheel.updateWheelHighlight();
              Portal.setSliderContext(name.toUpperCase(), false);
              const section = state.activeWord ? String(state.activeWord) : '';
              Portal.openCodexViewer(id, section);
            });
          });

          Panel.bindTabs({
            badgeMc: () => {
              if (!state.activeCoin) return;
              state.panelTab = 'mc';
              state.activeWord = null;
              Viz.applySizing('mc');
              CodexWheel.updateWheelHighlight();
              Viz.setLayout(true, state.panelTab);
              Panel.renderDetailsView(state.activeCoin);
              if (state.simulation) {
                state.simulation.alpha(0.65).alphaTarget(0.10).restart();
                setTimeout(() => state.simulation.alphaTarget(0), 250);
              }
            },
            badgeSocial: () => {
              if (!state.activeCoin) return;
              state.panelTab = 'social';
              state.activeWord = null;
              Viz.applySizing('social');
              CodexWheel.updateWheelHighlight();
              Viz.setLayout(true, state.panelTab);
              Panel.renderDetailsView(state.activeCoin);
              if (state.simulation) {
                state.simulation.alpha(0.65).alphaTarget(0.10).restart();
                setTimeout(() => state.simulation.alphaTarget(0), 250);
              }
            }
          });

          Panel.bindCodexControl();

          const deeplink = el.panel.querySelector('.codex-deeplink[data-open-codex]');
          if (deeplink && !deeplink.dataset.bound) {
            deeplink.dataset.bound = '1';
            Util.bindPress(deeplink, e => {
              e.preventDefault();
              e.stopPropagation();
              Portal.setSliderContext(name.toUpperCase(), false);
              const section = state.activeWord ? String(state.activeWord) : '';
              Portal.openCodexViewer(id, section);
            });
            deeplink.setAttribute('role', 'button');
            deeplink.setAttribute('tabindex', '0');
          }

          const enterVowBtn = el.panel.querySelector('[data-enter-vow="1"]');
          if (enterVowBtn && !enterVowBtn.dataset.bound) {
            enterVowBtn.dataset.bound = '1';
            Util.bindPress(enterVowBtn, e => {
              e.preventDefault();
              e.stopPropagation();
              App.setActiveWord('vow');
              state.panelTab = 'codex';
              Viz.setLayout(true, state.panelTab);
              Panel.renderDetailsView(state.activeCoin);
              if (state.simulation) {
                state.simulation.alpha(0.65).alphaTarget(0.10).restart();
                setTimeout(() => state.simulation.alphaTarget(0), 250);
              }
            });
          }

          const activationOpen = el.panel.querySelector('.activation-note[data-open-activation="1"]');
          if (activationOpen && !activationOpen.dataset.bound) {
            activationOpen.dataset.bound = '1';
            Util.bindPress(activationOpen, e => {
              e.preventDefault();
              e.stopPropagation();
              Portal.openActivationCodex();
            });
          }

          const note = el.panel.querySelector('.codexnote');
          const body = el.panel.querySelector('[data-codex-expand-body="1"]');

          if (note && body && !note.dataset.bound) {
            note.dataset.bound = '1';

            const capPx = () => Math.min(300, window.innerHeight * 0.45);

            const syncFrameToPanel = () => {
              const cap = capPx();
              const panelH = Math.min(el.panel.scrollHeight, cap);
              const nextH = C.TOTAL_H - panelH;
              el.frame.style.height = nextH + 'px';
              state.H = nextH;
              state.cy = nextH / 2;
              el.svg.attr('viewBox', `0 0 ${C.W} ${state.H}`);
              if (state.holeCircleSel) state.holeCircleSel.attr('cy', state.cy);
              if (state.simulation) {
                state.simulation.force('y', d3.forceY(state.cy).strength(C.CENTER_GRAV));
                state.simulation.force('walls', Viz.forceWalls());
                state.simulation.alpha(0.7).alphaTarget(0.12).restart();
                setTimeout(() => state.simulation.alphaTarget(0), 250);
              }
            };

            const applyPanelDynamic = () => {
              el.panel.classList.add('dynamic');
              el.panel.style.height = 'auto';
              el.panel.style.maxHeight = `min(300px,45vh)`;
              el.panel.style.overflowY = 'auto';
            };

            const toggleExpand = next => {
              const expanded = next !== undefined ? next : note.classList.toggle('expanded');
              note.classList.toggle('expanded', expanded);
              body.style.display = expanded ? 'block' : 'none';
              applyPanelDynamic();
              syncFrameToPanel();
            };

            note.addEventListener('click', e => {
              const blockExpand = e.target.closest('[data-enter-vow="1"], .activation-note, .codex-deeplink');
              if (blockExpand) return;
              toggleExpand();
            });

            if (window.matchMedia('(hover:hover)').matches) {
              note.addEventListener('mouseenter', () => toggleExpand(true));
              note.addEventListener('mouseleave', () => toggleExpand(false));
            }
          }
        }
      };

      const App = {
        setActiveWord(key, directMeta = false) {
          if (!C.CODEX_KEYS.includes(key)) return;
          state.activeWord = key;

          if (!state.activeCoin) {
            Portal.setSliderContext(String(key).toUpperCase(), false);
          }

          Viz.pulseCodexMaster();
          CodexWheel.updateWheelHighlight();
          Viz.updateMetrics();
          Viz.applySizing('meta');
          if (el.panel.classList.contains('show')) {
            if (state.activeCoin) Panel.renderDetailsView(state.activeCoin);
            else Panel.renderCodexSystemPanel();
          }
        },
        resetToDefault() {
          state.activeWord = null;
          state.lastContextLabel = null;
          state.lastContextQuiet = null;
          Portal.setSliderContext('MEME', false);
          Viz.updateMetrics();
          Viz.applySizing('mc');
          CodexWheel.updateWheelHighlight();
          Panel.close();
        },
        refreshDefault() {
          if (el.panel.classList.contains('show')) Panel.close();
          if (state.simulation) {
            state.simulation.alpha(0.9).alphaTarget(0.12).restart();
            setTimeout(() => state.simulation.alphaTarget(0), 260);
          }
        },
        setCodexMode() {
          state.activeWord = null;
          state.panelTab = 'codex';
          Viz.applySizing('codex');
          CodexWheel.updateWheelHighlight();
          Viz.setLayout(false, state.panelTab);
          if (state.simulation) {
            state.simulation.alpha(0.9).alphaTarget(0.15).restart();
            setTimeout(() => state.simulation.alphaTarget(0), 400);
          }
        },
        bindGlobal() {
          window.addEventListener('codex:select', e => {
            const key = e?.detail?.codex;
            if (!key) return;

            App.setActiveWord(String(key), true);

            if (!state.activeCoin && window.Portal?.setSliderContext) {
              window.Portal.setSliderContext(String(key).toUpperCase(), false);
            }

            if (state.activeCoin) {
              state.panelTab = 'codex';
              Viz.setLayout(true, state.panelTab);
              Panel.renderDetailsView(state.activeCoin);
              if (state.simulation) {
                state.simulation.alpha(0.65).alphaTarget(0.10).restart();
                setTimeout(() => state.simulation.alphaTarget(0), 250);
              }
            }
          });

          window.resetToDefault = App.resetToDefault;
          window.applySizing = Viz.applySizing;
          window.updateWheelHighlight = CodexWheel.updateWheelHighlight;
          window.closePanel = Panel.close;
          window.renderCodexSystemPanel = Panel.renderCodexSystemPanel;
          window.setCodexMode = App.setCodexMode;

          Object.defineProperty(window, 'sizeMode', {
            get: () => state.sizeMode,
            set: v => state.sizeMode = v
          });

          Object.defineProperty(window, 'activeWord', {
            get: () => state.activeWord,
            set: v => state.activeWord = v
          });
        },
        start() {
          CodexWheel.bind();
          App.bindGlobal();
          Viz.load();
          setInterval(Viz.load, 30 * 60 * 1000);
        }
      };

      App.start();

      function sendReady() {
        if (window.parent && window.parent !== window) {
          try {
            window.parent.postMessage({
              source: 'meme',
              type: 'MEME_READY',
              ts: Date.now()
            }, window.location.origin);
          } catch (_) {}
        }
      }

      let readySent = false;

      function safeSendReady() {
        if (readySent) return;
        readySent = true;
        sendReady();
      }

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          sendReady();
        }
      });

      safeSendReady();
      requestAnimationFrame(safeSendReady);
      setTimeout(safeSendReady, 120);

      let lastMsgKey = '';
      let lastMsgTime = 0;

      window.addEventListener('message', event => {
        if (event.origin !== window.location.origin) return;

        const msg = event.data || {};
        if (msg.source !== 'momentum') return;
        if (!msg.type) return;

        const key = `${msg.type}:${JSON.stringify(msg.payload || {})}`;
        const now = Date.now();

        if (key === lastMsgKey && now - lastMsgTime < 32) return;
        lastMsgKey = key;
        lastMsgTime = now;

        if (msg.type === 'SET_SIZE_MODE') {
          const mode = msg.payload && msg.payload.mode ? msg.payload.mode : 'mc';
          if (!['mc', 'social', 'codex', 'meta'].includes(mode)) return;

          if (state.sizeMode === mode) return;

          state.sizeMode = mode;
          state.lastContextLabel = null;
          state.lastContextQuiet = null;

          Viz.updateMetrics();
          Viz.applySizing(state.sizeMode);
          CodexWheel.updateWheelHighlight();

          if (state.simulation) {
            state.simulation.alpha(0.45).alphaTarget(0.08).restart();
            setTimeout(() => state.simulation.alphaTarget(0), 250);
          }
        }

        if (msg.type === 'RESET_MEME_VIEW') {
          if (!state.activeCoin && !state.activeWord) return;

          state.activeCoin = null;
          state.activeWord = null;
          state.lastContextLabel = null;
          state.lastContextQuiet = null;

          Portal.setSliderContext('MOMENTUM', false);

          App.resetToDefault();
          Viz.updateMetrics();
          CodexWheel.updateWheelHighlight();
          Panel.close();

          if (state.simulation) {
            state.simulation.alpha(0.6).alphaTarget(0.1).restart();
            setTimeout(() => state.simulation.alphaTarget(0), 300);
          }
        }
      });
    })();
  </script>
</body>
</html>
