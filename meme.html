<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>M E M E</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <meta name="viewport" content="width=650, user-scalable=no" />
  <meta name="description" content="Explore the MEME Multiverse within UNIVERSE." />
  <style>
    :root{
      --bg:#000;
      --text:#eee;
      --blue:#3366FF;
      --orange:#FF6600;
      --green:#22DD09;
      --border:rgba(255,255,255,.10);
      --border-weak:rgba(255,255,255,.06);
      --shadow-1:0 10px 26px rgba(0,0,0,.55);
      --shadow-2:0 14px 32px rgba(0,0,0,.65);
      --baseW:650;
      --scale:1;
      --radius-1:12px;
      --radius-2:14px;
      --row-h:46px;
      --font-ui:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif;
      --default-frame-h:720px;
      --hover-glow:rgba(255,255,255,.08);
      --open-glow:rgba(51,102,255,.16);
      --line:#f4f4f4;
    }

    *{margin:0;padding:0;box-sizing:border-box}

    html,body{
      height:100%;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      text-rendering:geometricPrecision;
      -webkit-font-smoothing:antialiased;
    }
    body{
      margin:0;
      background:transparent;
      color:var(--text);
      font-family:var(--font-ui);
      line-height:1.6;
      text-align:center;
      padding:0;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      height:100vh;
    }

    .scale-wrap{width:610px;margin:0 auto}
    .scale-inner{width:610px;transform-origin:center center;transform:scale(var(--scale))}

    .stage{
      position:relative;
      border-radius:var(--radius-1);
      overflow:hidden;
      border:0;
      background:transparent;
      box-shadow:none;
      min-height:610px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:0;
      background:url('media/META-MEME.jpg') center 40%/cover no-repeat;
      opacity:1;
      transform:scale(1.05);
      transform-origin:center;
      animation:metaSpaceDrift 30s ease-in-out infinite alternate;
      z-index:0;
      pointer-events:none;
    }

    @media (prefers-reduced-motion: reduce){
      .stage::before{animation:none !important}
    }

    .stage-inner{
      position:relative;
      z-index:2;
      padding:0;
    }

    .diagram-wrap{
      position:absolute;
      margin-top:0;
      inset:0;
      z-index:1;
      display:grid;
      place-items:center;
      cursor:default;
    }
    .diagram-wrap.is-hidden{display:none}

    .cosmos-shell{
      width:610px;
      margin-top:0;
      padding:0;
      border-radius:18px;
      background:transparent;
      border:0;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
      display:grid;
      place-items:center;
    }

    #cosmos600{
      width:610px;
      height:610px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background:transparent;
    }

    #frame{
      width:100%;
      height:610px;
      position:relative;
      overflow:hidden;
      transition:height .35s ease;
      background:
        linear-gradient(
          to bottom,
          rgba(8,12,20,.70) 0%,
          rgba(6,10,18,.80) 50%,
          rgba(3,6,12,.95) 100%
        );
    }

    #viz{width:100%;height:100%;display:block}
    .node{opacity:.65;transition:opacity 120ms ease}
    .node.selected{opacity:1!important}
    .node.selected circle{stroke-width:2.5px}
    #tip{
      position:absolute;
      z-index:5;
      display:none;
      white-space:nowrap;
      pointer-events:none;
      transform:translate(-50%,-120%);
      padding:8px 10px;
      border-radius:10px;
      font-size:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,12,16,.95);
      color:#fff;
      text-align:left;
    }

    #codexCenter{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:220px;
      height:220px;
      display:grid;
      place-items:center;
      user-select:none;
      z-index:3;
      pointer-events:auto;
    }

    #codexCenter svg{
      width:220px;
      height:220px;
      display:block;
    }

    #codexCenter text{
      font-family:"SF Mono","Menlo",monospace;
      font-size:12px;
      font-weight:900;
      letter-spacing:.2px;
    }

    #codexCenter .word{
      fill:var(--blue);
      cursor:pointer;
      opacity:.95;
      transition:fill .18s ease;
    }

    #codexCenter .word:hover{
      fill:var(--green);
      text-decoration:underline;
    }

    #codexCenter .word.is-active{
      fill:var(--green);
    }

    #codexCenter .plain{
      fill:var(--blue);
      opacity:.6;
      font-size:10px;
      font-weight:800;
    }

    #codexCenter .logo{
      pointer-events:none;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,.65));
    }

    .info-panel{
      width:100%;
      height:0;
      overflow:hidden;
      padding:0 20px;
      border-top:1px solid rgba(255,255,255,.10);
      background:linear-gradient(
      180deg,
      rgba(8,12,20,.92) 0%,
      rgba(4,8,16,.96) 60%,
      rgba(0,0,0,.98) 100%
    );
      backdrop-filter:blur(18px);
      opacity:1;
      transform:translateY(16px);
      transition:height .35s ease,padding .35s ease,opacity .25s ease,transform .25s ease;
    }
    .info-panel.show{
      opacity:1;
      transform:translateY(0);
      position:relative;
      overflow:visible;
    }

    .info-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .info-left{display:flex;align-items:center;gap:12px}
    .coin-logo{display:block;width:34px;height:34px;flex:0 0 34px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04)}
    .coinname{display:flex;align-items:center;height:34px;line-height:34px;font-size:20px;font-weight:700;letter-spacing:-.01em}
    .info-right{display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:12px;margin-left:auto}
    .badge .ico{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center}
    .badge svg{width:16px;height:16px;display:block;fill:currentColor}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:5px 16px;border-radius:14px;font-size:15px;font-weight:600;min-width:48px;height:32px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.25);color:#fff;backdrop-filter:blur(10px);transition:all .18s ease;}
    .badge.action{cursor:pointer;user-select:none;opacity:.55;transition:opacity .18s ease,border-color .18s ease,color .18s ease}
    .badge.action.active{opacity:1}
    .badge.action:hover{opacity:1}
    #badgeMc:hover,
    #badgeMc.active{
      color:var(--green);
      border-color:var(--green);
    }

    #badgeSocial{
      width:95px;
      min-width:95px;
      max-width:95px;
      justify-content:center;
      overflow:hidden;
      white-space:nowrap;
    }

    #badgeSocial:hover,
    #badgeSocial.active{
      color:var(--orange);
      border-color:var(--orange);
    }

    #badgeCodex{
      color:var(--blue);
      border-color:var(--blue);
    }

    .codex-control{
      width:95px;
      height:32px;
      padding:0;
      gap:0;
      position:relative;
      justify-content:center;
      overflow:hidden;
      color:var(--blue);
      border-color:var(--blue);
    }

    .codex-control .codex-label{
      color:var(--blue);
      font-size:13px;
      font-weight:800;
      letter-spacing:.12em;
      transition:opacity .15s ease;
    }

    .codex-control.item .codex-label{opacity:0}

    .codex-control .codex-ring{
      position:absolute;
      width:16px;
      height:16px;
      opacity:0;
      pointer-events:none;
      transition:opacity .15s ease;
    }

    .codex-control.item .codex-ring{opacity:1}

    .codex-ring-mover{
      transform-origin:12px 12px;
      animation:codexBadgeSpin 30s linear infinite;
    }

    .codex-ring-base{
      fill:none;
      stroke:var(--blue);
      stroke-width:2.2;
      opacity:.65;
    }

    .codex-ring-segment{
      fill:none;
      stroke:var(--green);
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-dasharray:12 88;
      transition:stroke-dashoffset .22s ease;
    }

    @keyframes codexBadgeSpin{
      to{transform:rotate(-360deg)}
    }

    .codex-control .codex-hit{
      position:absolute;
      top:0;
      height:100%;
      width:33.33%;
      z-index:3;
    }

    .codex-control .codex-hit.left{left:0}
    .codex-control .codex-hit.center{left:33.33%}
    .codex-control .codex-hit.right{right:0}

    .codex-control .codex-arrow{
      position:absolute;
      font-size:10px;
      color:var(--blue);
      opacity:0;
      pointer-events:none;
      transition:opacity .15s ease,color .15s ease;
    }

    .codex-control .codex-arrow.left{left:5px}
    .codex-control .codex-arrow.right{right:5px}

    .codex-control.root .codex-arrow,
    .codex-control.item .codex-arrow{
      opacity:.35;
    }

    .codex-control .codex-hit.left:hover ~ .codex-arrow.left,
    .codex-control .codex-hit.right:hover ~ .codex-arrow.right{
      opacity:1;
      color:var(--green);
    }

    @media (hover:none){
      .codex-control.root .codex-arrow,
      .codex-control.item .codex-arrow{
        opacity:.35;
      }
    }

    .codex-control .codex-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--blue);
      font-size:13px;
      font-weight:800;
      letter-spacing:.12em;
      background:rgba(0,0,0,.88);
      opacity:0;
      pointer-events:none;
      transition:opacity .15s ease;
    }

    .codex-control.item .codex-hit.center:hover ~ .codex-overlay{
      opacity:1;
    }

    .codex-control.item .codex-hit.center:hover ~ .codex-ring{
      opacity:.08;
    }

    #badgeCodex{
      color:var(--blue);
      border-color:var(--blue);
    }

    #badgeCodex:hover,
    body.is-word-active #badgeCodex:focus-visible,
    #badgeCodex:hover,
    #badgeCodex.active{
      color:var(--blue);
      border-color:var(--blue);
    }

    .links{margin-top:8px;display:block;padding-top:12px}
    .socialrow{width:100%;display:flex;flex-wrap:wrap;align-items:center;gap:7.5px}
    .linkname{text-decoration:none;color:inherit}
    .linkname:hover{text-decoration:underline;color: var(--blue);text-shadow: 0 0 6px rgba(51,102,255,.25)}
    .smallnote{margin-top:10px;font-size:12px;opacity:.55}

    .codexline{
      width:100%;
      text-align:center;
      font-size:12px;
      letter-spacing:.02em;
      font-weight:900;
      color:rgba(255,255,255,.70);
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:4.5px;
      align-items:center;
      padding:6px 2px 15px;
      user-select:none;
    }

    .codexline .k{
      cursor:pointer;
      color:rgba(51,102,255,.80);
      transition:color .16s ease,text-shadow .16s ease,opacity .16s ease;
    }

    .codexline .k:hover{
      color:var(--green);
      text-shadow:0 0 10px rgba(34,221,9,.18);
    }

    .codexline .k.is-active{
      color:var(--green);
      text-shadow:0 0 10px rgba(34,221,9,.22);
    }

    .codexline .t{
      color:rgba(51,102,255,.85);
      opacity:.55;
      letter-spacing:.01em;
      font-weight:800;
    }

    body.is-word-active .codexline .k{
      color:rgba(255,255,255,.28);
      text-shadow:none;
    }

    body.is-word-active .codexline .k.is-active{
      color:rgba(255,255,255,.28);
      opacity:.55;
      text-shadow:none;
    }

    body.is-word-active .codexline .t{
      color:rgba(255,255,255,.28);
      opacity:1;
    }

    body.is-word-active .codexline .k:hover{
      color:var(--green);
      text-shadow:0 0 10px rgba(34,221,9,.18);
    }

    .codexnote{
      min-height:42px;
      width:100%;
      text-align:center;
      font-size:13px;
      opacity:.88;
      letter-spacing:.02em;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
    }
    .codexnote b{letter-spacing:.12em}
    .codexnote .codex-deeplink{
      color:var(--blue);
      font-weight:800;
      cursor:pointer;
      margin-right:6px;
      text-align:left;
    }
    .codexnote .codex-deeplink:hover{color:var(--green)}

    .codex-rowhead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .codex-expand{
      margin-top:10px;
      padding:10px 0;
      border-radius:12px;
      border:0 solid rgba(255,255,255,.10);
      overflow-wrap:break-word;
      word-break:break-word;
      font-size:12px;
      opacity:0.95;
      text-align:justify;
    }

    .info-panel.dynamic{
      max-height:min(300px,45vh);
      overflow-y:auto;
      scrollbar-width:none;
    }

    .info-panel.dynamic::-webkit-scrollbar{
      display:none;
    }

    .socialpill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:12px;
      font-size:12px;
      text-decoration:none;
      color:#cfe1ff;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      opacity:.35;
      transition:opacity .18s ease,border-color .18s ease,background .18s ease
    }
    .socialpill:hover{opacity:1;border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.05)}
    .socialpill .ico{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center}
    .socialpill svg{width:16px;height:16px;display:block;fill:currentColor}
    .socialpill .n{opacity:.9}
    .socialpill.icononly{padding:6px 8px;gap:0}
    .socialpill.icononly .ico{margin:0}
    .panelbar{position:absolute;left:0;right:0;top:0;height:24px;pointer-events:none}
    .panelhandle{
      position:absolute;
      left:50%;
      top:-7px;
      transform:translateX(-50%);
      width:44px;
      height:11px;
      border-radius:99px;
      background:rgba(255,255,255,.14);
      opacity:.65;
      pointer-events:auto;
      cursor:pointer;
      transition:opacity .18s ease,background .18s ease
    }
    .panelhandle:hover{opacity:1;background:rgba(255,255,255,.22)}
    .panelhandle:active{transform:translateX(-50%) translateY(1px)}

    @keyframes metaSpaceDrift{
      0%{transform:scale(1.05) translate(0,0)}
      50%{transform:scale(1.12) translate(1%,-1%)}
      100%{transform:scale(1.08) translate(-1%,1%)}
    }

    #codexCenter .inner-dim{
      fill:rgba(0,0,0,0.45);
      opacity:0;
      transition:opacity .18s ease;
      pointer-events:none;
    }

    #codexCenter .inner-hit{
      fill:transparent;
      cursor:pointer;
      pointer-events:auto;
    }

    #codexCenter.is-word-active .inner-dim{
      opacity:1;
    }

    .community-name{
      font-weight:700;
      font-style:italic;
    }

    .mirror-text.inactive{
      opacity:0.5;
    }

    .codexrow{
      display:flex;
      align-items:flex-start;
      gap:12px;
      width:100%;
    }

    .codexcenter{
      flex:1;
      text-align:left;
    }

    .codexcenter .codexline{
      padding:0;
      margin:0;
      justify-content:flex-start;
    }

    .codexnote.is-idle .codexrow{
      align-items:center;
    }

    .codex-idle-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      width:100%;
    }

    .codex-enter{
      margin-left:auto;
      display:inline-flex;
      align-items:center;
      gap:6px;
      color:var(--blue);
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      cursor:pointer;
      white-space:nowrap;
      opacity:.85;
      transition:color .18s ease,opacity .18s ease,filter .18s ease;
    }

    .codex-enter .arr{
      font-size:12px;
      opacity:.8;
      transition:transform .18s ease,opacity .18s ease;
    }

    .codex-enter:hover,
    .codex-enter:focus-visible{
      color:var(--green);
      opacity:1;
      filter:drop-shadow(0 0 10px rgba(34,221,9,.2));
      outline:none;
    }

    .codex-enter:hover .arr,
    .codex-enter:focus-visible .arr{
      transform:translateX(2px);
      opacity:1;
    }

    .codex-chevron{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:22px;
      height:22px;
      margin-left:auto;
      cursor:pointer;
      opacity:.92;
      flex:0 0 auto;
      transition:transform .22s ease, opacity .18s ease;
    }

    .codex-chevron svg{
      width:16px;
      height:16px;
      display:block;
      fill:none;
      stroke:var(--blue);
      stroke-width:2.8px;
      stroke-linecap:round;
      stroke-linejoin:round;
      opacity:.96;
      filter:drop-shadow(0 0 4px rgba(51,102,255,.35));
      transition:stroke .18s ease, filter .18s ease, transform .22s ease, opacity .18s ease;
    }

    .codexnote:hover .codex-chevron svg,
    .codexnote:focus-within .codex-chevron svg{
      opacity:1;
      filter:drop-shadow(0 0 8px rgba(51,102,255,.55));
      transform:scale(1.12);
    }

    .codexnote.expanded .codex-chevron svg{
      transform:rotate(180deg);
      opacity:.85;
    }

    .codexnote.expanded .codexcenter{
      opacity:.35;
      transition:opacity .18s ease;
    }

    .codexnote.expanded .codexcenter .codex-deeplink{
      opacity:1;
    }

    @media (hover:hover){
      .codexnote:hover{
        border-color:rgba(255,255,255,.18);
        box-shadow:0 0 18px rgba(255,255,255,.06);
      }
    }

    #codexCenter .word{
      fill:var(--blue);
      opacity:.88;
      transition:fill 420ms cubic-bezier(.22,.95,.24,1), opacity 420ms cubic-bezier(.22,.95,.24,1);
    }

    .codex-meta-pulse{
      fill:var(--green) !important;
      animation:codexPulse 650ms ease-in-out both;
      will-change:opacity;
    }

    .codex-sentence-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      text-align:left;
    }

    .codex-sentence-row > div{
      flex:1;
      min-width:0;
    }

    .codex-explore{
      margin-left:auto;
      font-size:11px;
      letter-spacing:.18em;
      font-weight:700;
      text-transform:uppercase;
      color:rgba(255,255,255,.28);
      opacity:.45;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
      position:relative;
      overflow:hidden;
      text-decoration:none;
      transition:color .18s ease,opacity .18s ease,filter .18s ease;
    }

    .codex-explore .arr{
      font-size:12px;
      opacity:.7;
      transition:transform .18s ease,opacity .18s ease;
    }

    .codex-explore::after{
      content:"";
      position:absolute;
      top:0;
      left:-70%;
      width:60%;
      height:100%;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);
      transform:skewX(-18deg);
      opacity:0;
    }

    .codex-explore:hover,
    .codex-explore:focus-visible{
      opacity:1;
      color:rgba(51,102,255,1);
      filter:drop-shadow(0 0 10px rgba(51,102,255,.35));
    }

    .codex-explore:hover .arr,
    .codex-explore:focus-visible .arr{
      opacity:1;
      transform:translateY(-2px);
    }

    .codex-explore:hover::after,
    .codex-explore:focus-visible::after{
      opacity:1;
      animation:codexFlash .6s ease forwards;
    }

    .codex-explain-row{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      text-align:left;
      width:100%;
    }

    .codex-explain-row .left{
      flex:1;
      min-width:0;
    }

    .codex-explain-row .left span{
      white-space:normal;
    }

    .activation-note{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:flex-end;
      margin-left:auto;
      white-space:nowrap;
      font-weight:700;
      letter-spacing:.01em;
      color:transparent;
      flex:0 0 auto;
    }

    .activation-note.activation-open{
      cursor:pointer;
      outline:none;
    }

    .activation-note::before{
      content:"(activation pending)";
      color:rgba(160,170,190,.55);
      transition:opacity .18s ease,color .18s ease;
    }

    .activation-note::after{
      content:"SPARK CODEX ↗";
      position:absolute;
      right:0;
      top:50%;
      transform:translateY(-50%);
      color:var(--blue);
      opacity:0;
      transition:opacity .18s ease;
    }

    .activation-note .activation-arr{
      display:none;
    }

    .activation-note.activation-open:hover::before,
    .activation-note.activation-open:focus-visible::before{
      opacity:0;
    }

    .activation-note.activation-open:hover::after,
    .activation-note.activation-open:focus-visible::after{
      opacity:1;
    }

    @keyframes codexPulse{
      0%{opacity:.88}
      50%{opacity:1}
      100%{opacity:.88}
    }

    @keyframes codexFlash{
      0%{left:-70%}
      100%{left:115%}
    }
  </style>
</head>

  <script>
    (() => {
      'use strict';

      const C = {
        BASE_W: 650,
        VS: 'usd',
        CAT: 'meme-token',
        PER: 50,
        SOCIALS_JSON_URL: 'data/meme_50.json',
        LOGOS_JSON_URL: 'data/meme_50_logos.json',
        W: 610,
        TOTAL_H: 610,
        PANEL_H_MC: 70,
        PANEL_H_SOCIAL: 135,
        PANEL_H_CODEX_IDLE: 135,
        PANEL_H_CODEX_ACTIVE: 135,
        HOLE_DIAMETER: 185,
        HOLE_R: 92.5,
        HOLE_PAD: 27,
        CENTER_GRAV: 0.009,
        REPULSION: -30,
        SWIRL: 0.045,
        DRIFT: 0.050,
        DAMP: 0.995,
        WALL_REPEL: 0.10,
        COLLISION_PAD: 8,
        SELECT_PAD: 18,
        LOGO_PAD: 4,
        RING_W: 2.2,
        SHINE_W: 1.6,
        FIRST_START_MS: 1000,
        CYCLE_MS: 8000,
        COLLAPSE_MS: 3000,
        CODEX_KEYS: ['vow','guide','common','equilibrium','success','comud'],
        CODEX_DEFAULTS: {
          vow: name => `How <span class="community-name">${name}</span> cares and takes responsibility.`,
          guide: name => `How <span class="community-name">${name}</span> guides decisions and direction.`,
          common: name => `What <span class="community-name">${name}</span> shares in values and purpose.`,
          equilibrium: name => `How <span class="community-name">${name}</span> balances contribution and reward.`,
          success: name => `What <span class="community-name">${name}</span> defines and rewards as success.`,
          comud: name => `How <span class="community-name">${name}</span> reflects collective well-being.`
        }
      };

      const el = {
        root: document.documentElement,
        body: document.body,
        diagram: document.getElementById('diagramWrap'),
        svg: d3.select('#viz'),
        tip: document.getElementById('tip'),
        panel: document.getElementById('infoPanel'),
        frame: document.getElementById('frame'),
        codexCenter: document.getElementById('codexCenter'),
      };

      const state = {
        introPulseDone: false,
        socialsById: {},
        logosById: {},
        detailsCache: {},
        simulation: null,
        collide: null,
        defsSel: null,
        gSel: null,
        holeCircleSel: null,
        nodes: [],
        codexNode: null,
        maxMcSeen: 0,
        sizeMode: 'mc',
        panelTab: 'codex',
        activeCoin: null,
        activeWord: null,
        lastCoinName: '',
        lastContextLabel: null,
        lastContextQuiet: null,
        lastPortalOpen: null,
        H: C.TOTAL_H,
        cx: C.W / 2,
        cy: C.TOTAL_H / 2
      };

      const Util = {
        isReducedMotion() {
          return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        },
        safeUrl(u) {
          if (!u || typeof u !== 'string') return '';
          if (!/^https?:\/\//i.test(u)) return '';
          return u;
        },
        escapeHtml(v) {
          return String(v || '').replace(/[&<>"']/g, ch => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
          }[ch]));
        },
        usdShort(n) {
          if (!isFinite(n)) return '—';
          const a = Math.abs(n);
          return a >= 1e12 ? '$' + (n / 1e12).toFixed(2) + 'T' :
                 a >= 1e9 ? '$' + (n / 1e9).toFixed(2) + 'B' :
                 a >= 1e6 ? '$' + Math.round(n / 1e6) + 'M' :
                 a >= 1e3 ? '$' + Math.round(n / 1e3) + 'K' :
                 '$' + Math.round(n).toLocaleString();
        },
        numShort(n) {
          if (!Number.isFinite(n)) return '—';
          const sign = n < 0 ? '-' : '';
          const abs = Math.abs(n);
          const fmt1 = v => String(v.toFixed(1)).replace(/\.0$/, '');
          if (abs >= 1e12) return sign + fmt1(abs / 1e12) + 'T';
          if (abs >= 1e9) return sign + fmt1(abs / 1e9) + 'B';
          if (abs >= 1e6) return sign + fmt1(abs / 1e6) + 'M';
          if (abs >= 1e3) return sign + String(Math.round(abs / 1e3)) + 'K';
          return sign + String(Math.round(abs));
        },
        radiusFromCap(v, min, max, minR, maxR) {
          const a = Math.log(Math.max(1, min));
          const b = Math.log(Math.max(1, max));
          const x = Math.log(Math.max(1, v));
          const t = b === a ? 0.5 : (x - a) / (b - a);
          return minR + Math.max(0, Math.min(1, t)) * (maxR - minR);
        },
        radiusFromSqrt(v, min, max, minR, maxR) {
          const a = Math.sqrt(Math.max(1, min));
          const b = Math.sqrt(Math.max(1, max));
          const x = Math.sqrt(Math.max(1, v));
          const t = b === a ? 0.5 : (x - a) / (b - a);
          return minR + Math.max(0, Math.min(1, t)) * (maxR - minR);
        },
        mcHtml(mc) {
          const s = Util.usdShort(mc);
          if (s[0] !== '$') return s;
          return `<span class="cur">$</span>${s.slice(1)}`;
        },
        bindPress(node, handler) {
          if (!node) return;
          node.addEventListener('click', handler);
          node.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              handler(e);
            }
          });
        }
      };

      const Portal = {
        post(type, payload = {}) {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({
              source: 'meme',
              type,
              payload,
              ts: Date.now()
            }, window.location.origin);
          }
        },
        setSliderContext(label, quiet = false) {
          const nextLabel = String(label || '').trim();
          if (!nextLabel) return;

          if (state.lastContextLabel === nextLabel && state.lastContextQuiet === quiet) return;

          state.lastContextLabel = nextLabel;
          state.lastContextQuiet = quiet;

          Portal.post(quiet ? 'MEME_CONTEXT_QUIET' : 'MEME_CONTEXT', {
            label: nextLabel
          });
        },
        setOpen(open) {
          const next = !!open;

          if (state.lastPortalOpen === next) return;
          state.lastPortalOpen = next;

          Portal.post('MEME_PORTAL_SET_OPEN', {
            open: next
          });
        },
        openActivationCodex() {
          Portal.post('MEME_OPEN_ACTIVATION_CODEX');
        },
        openCodexViewer(id, section = '') {
          const nextId = String(id || '').trim();
          const nextSection = String(section || '').trim();

          if (!nextId) return;

          Portal.post('MEME_OPEN_CODEX_VIEWER', {
            id: nextId,
            section: nextSection,
            label: state.activeCoin && state.activeCoin.name ? state.activeCoin.name : state.lastCoinName
          });
        }
      };

      const Icons = {
        x() { return `<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><g transform="scale(0.75) translate(4 4)"><path d="M18.9 2H22l-7.2 8.2L23 22h-6.6l-5.2-7L5.1 22H2l7.8-8.9L1 2h6.8l4.7 6.3L18.9 2Zm-1.2 18h1.7L6.2 3.9H4.4L17.7 20Z"/></g></svg></span>`; },
        telegram() { return `<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><g transform="scale(0.90) translate(1.3 1.3)"><path d="M21.6 3.3c.5-.2 1 .2.8.9l-3.5 16.4c-.2.8-1 .9-1.6.5l-4.7-3.5-2.3 2.2c-.2.2-.4.4-.8.4l.3-5.6L19 6.1c.4-.3 0-.5-.4-.3L7 13l-4.9-1.6c-.8-.3-.8-1.1.2-1.5L21.6 3.3Z"/></g></svg></span>`; },
        discord() { return `<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><g transform="scale(1.22) translate(-2 -0.2)"><path d="M20 4.7a16 16 0 0 0-4-1.3l-.2.3a14 14 0 0 1 2.9 1.4 11 11 0 0 0-3.5-1.1 12 12 0 0 0-3.2 0A11 11 0 0 0 8.5 5a14 14 0 0 1 2.9-1.4l-.2-.3a16 16 0 0 0-4 1.3C5.1 8 4.6 11.2 5 14.3a16 16 0 0 0 3.4 2.1l.8-1.3a10 10 0 0 1-1.6-.9l.4-.3c3.1 1.4 6.4 1.4 9.6 0l.4.3c-.5.4-1 .7-1.6.9l.8 1.3a16 16 0 0 0 3.4-2.1c.5-3.1 0-6.3-1.8-9.6ZM9.5 13.2c-.7 0-1.3-.7-1.3-1.5S8.8 10.2 9.5 10.2s1.3.7 1.3 1.5-.6 1.5-1.3 1.5Zm5 0c-.7 0-1.3-.7-1.3-1.5s.6-1.5 1.3-1.5 1.3.7 1.3 1.5-.6 1.5-1.3 1.5Z"/></g></svg></span>`; },
        instagram() { return `<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7.5 2h9A5.5 5.5 0 0 1 22 7.5v9A5.5 5.5 0 0 1 16.5 22h-9A5.5 5.5 0 0 1 2 16.5v-9A5.5 5.5 0 0 1 7.5 2Zm0 2A3.5 3.5 0 0 0 4 7.5v9A3.5 3.5 0 0 0 7.5 20h9a3.5 3.5 0 0 0 3.5-3.5v-9A3.5 3.5 0 0 0 16.5 4h-9Zm4.5 4.2a3.8 3.8 0 1 1 0 7.6 3.8 3.8 0 0 1 0-7.6Zm0 2a1.8 1.8 0 1 0 0 3.6 1.8 1.8 0 0 0 0-3.6ZM17.9 6.8a.9.9 0 1 1-1.8 0 .9.9 0 0 1 1.8 0Z"/></svg></span>`; },
        youtube() { return `<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M21.6 7.2a3 3 0 0 0-2.1-2.1C17.6 4.6 12 4.6 12 4.6s-5.6 0-7.5.5A3 3 0 0 0 2.4 7.2 31 31 0 0 0 2 12a31 31 0 0 0 .4 4.8 3 3 0 0 0 2.1 2.1c1.9.5 7.5.5 7.5.5s5.6 0 7.5-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 22 12a31 31 0 0 0-.4-4.8ZM10.3 15.1V8.9l5.4 3.1-5.4 3.1Z"/></svg></span>`; },
        tiktok() { return `<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M16 2h2c.2 2.2 1.7 4.1 3.8 4.7V9c-1.8-.1-3.3-.7-4.8-1.8v7.1c0 3.5-2.6 6.2-6.2 6.2S4.6 17.8 4.6 14.3c0-3.4 2.7-6.1 6.2-6.1.4 0 .8 0 1.2.1v2.7c-.4-.1-.8-.2-1.2-.2-2 0-3.5 1.5-3.5 3.5 0 2 1.5 3.5 3.5 3.5s3.5-1.4 3.5-3.5V2Z"/></svg></span>`; },
        reddit() { return `<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M14.7 3.3c-.2 0-.4.1-.5.3l-1.5 3.5c-2.2-.2-4.3.4-5.9 1.7l-2.5-1.6c-.2-.1-.5-.1-.7.1-.2.2-.3.4-.2.7l1 2.8c-.6.9-.9 2-.9 3.1 0 3.6 4 6.5 9 6.5s9-2.9 9-6.5c0-1.1-.3-2.2-.9-3.1l1-2.8c.1-.2 0-.5-.2-.7-.2-.2-.5-.2-.7-.1l-2.5 1.6c-1.5-1.2-3.7-1.9-5.9-1.7l1.2-2.8 2.2.5c.1.7.7 1.2 1.4 1.2.8 0 1.5-.7 1.5-1.5S17 2.8 16.2 2.8c-.6 0-1.1.3-1.3.8l-2.2-.5ZM8.6 14.2c0-.8.6-1.4 1.4-1.4s1.4.6 1.4 1.4-.6 1.4-1.4 1.4-1.4-.6-1.4-1.4Zm5.4 0c0-.8.6-1.4 1.4-1.4s1.4.6 1.4 1.4-.6 1.4-1.4 1.4-1.4-.6-1.4-1.4Zm-5 2.6c1 .9 2.2 1.4 3.6 1.4s2.6-.5 3.6-1.4c.2-.2.2-.5 0-.7-.2-.2-.5-.2-.7 0-.8.7-1.8 1.1-2.9 1.1s-2.1-.4-2.9-1.1c-.2-.2-.5-.2-.7 0-.2.2-.2.5 0 .7Z"/></svg></span>`; },
        github() { return `<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><g transform="scale(0.95) translate(0.6 0.6)"><path d="M12 2C6.5 2 2 6.6 2 12.2c0 4.5 2.9 8.4 6.9 9.7.5.1.7-.2.7-.5v-1.9c-2.8.6-3.4-1.2-3.4-1.2-.5-1.2-1.1-1.6-1.1-1.6-.9-.6.1-.6.1-.6 1 .1 1.6 1.1 1.6 1.1.9 1.6 2.4 1.2 3 .9.1-.7.4-1.2.7-1.5-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1.1-2.7-.1-.3-.5-1.3.1-2.6 0 0 .9-.3 2.8 1.1a9.5 9.5 0 0 1 5 0c1.9-1.4 2.8-1.1 2.8-1.1.6 1.3.2 2.3.1 2.6.7.7 1.1 1.6 1.1 2.7 0 3.9-2.4 4.7-4.6 5 .4.3.8 1 .8 2v3c0 .3.2.6.7.5 4-1.3 6.9-5.2 6.9-9.7C22 6.6 17.5 2 12 2Z"/></g></svg></span>`; },
        platform(p) {
          if (p === 'x') return Icons.x();
          if (p === 'telegram') return Icons.telegram();
          if (p === 'discord') return Icons.discord();
          if (p === 'instagram') return Icons.instagram();
          if (p === 'youtube') return Icons.youtube();
          if (p === 'tiktok') return Icons.tiktok();
          if (p === 'reddit') return Icons.reddit();
          if (p === 'github') return Icons.github();
          return '';
        }
      };

      const Data = {
        followersFromJson(id, key) {
          const s = state.socialsById[id];
          const v = s?.followers?.[key];
          return Number.isFinite(v) ? v : null;
        },
        codexContextShort(id, key) {
          const s = state.socialsById[String(id)];
          const v = s?.codex_context?.[key];
          return typeof v === 'string' && v.trim() ? v.trim() : null;
        },
        codexContextLong(id, key) {
          const s = state.socialsById[String(id)];
          const v = s?.codex_context?.[`${key}_text`];
          return typeof v === 'string' && v.trim() ? v.trim() : null;
        },
        linksFromJson(id) {
          const s = state.socialsById[id];
          const l = s?.links || {};
          return {
            website: Util.safeUrl(l.website || l.homepage || l.site || l.web || ''),
            github: Util.safeUrl(l.github || ''),
            x: Util.safeUrl(l.x || l.twitter || ''),
            telegram: Util.safeUrl(l.telegram || ''),
            discord: Util.safeUrl(l.discord || ''),
            instagram: Util.safeUrl(l.instagram || ''),
            youtube: Util.safeUrl(l.youtube || ''),
            tiktok: Util.safeUrl(l.tiktok || ''),
            reddit: Util.safeUrl(l.reddit || '')
          };
        },
        logoFromJson(id, fallbackImage = '') {
          const s = state.logosById[id];
          if (s?.local_logo) return s.local_logo;
          return fallbackImage || '';
        },
        codexMetricFromJson(id) {
          const v = Data.followersFromJson(id, 'codex');
          return Number.isFinite(v) ? v : null;
        },
        metaMetricFromJson(id, key) {
          const v = Data.followersFromJson(id, key);
          return Number.isFinite(v) ? v : null;
        },
        codexSovereignFromJson(id) {
          const s = state.socialsById[id];
          return s?.codex_sovereign === true;
        },
        socialCountsFromJson(id) {
          return {
            github: Data.followersFromJson(id, 'github_followers'),
            x: Data.followersFromJson(id, 'twitter'),
            telegram: Data.followersFromJson(id, 'telegram_users'),
            discord: Data.followersFromJson(id, 'discord_members'),
            instagram: Data.followersFromJson(id, 'instagram_followers'),
            youtube: Data.followersFromJson(id, 'youtube_subscribers'),
            tiktok: Data.followersFromJson(id, 'tiktok_followers'),
            reddit: Data.followersFromJson(id, 'reddit_subscribers')
          };
        },
        bestSocialFromCounts(counts) {
          const entries = Object.entries(counts).filter(([, v]) => Number.isFinite(v));
          if (!entries.length) return null;
          entries.sort((a, b) => b[1] - a[1]);
          return { platform: entries[0][0], value: entries[0][1] };
        },
        topSocialForId(id) {
          return Data.bestSocialFromCounts(Data.socialCountsFromJson(id));
        },
        socialScoreForId(id) {
          const top = Data.topSocialForId(id);
          return top ? top.value : 0;
        },
        linksFromCoinGecko(details) {
          const homepage = (details.links?.homepage || []).find(Boolean) || '';
          const github = details.links?.repos_url?.github?.[0] || '';
          const twHandle = details.links?.twitter_screen_name || '';
          const xUrl = twHandle ? `https://x.com/${twHandle}` : '';
          const tgId = details.links?.telegram_channel_identifier || '';
          const tgUrl = tgId ? `https://t.me/${tgId}` : '';
          const igUrl = details.links?.instagram_username ? `https://www.instagram.com/${details.links.instagram_username}` : '';
          const ytUrl = details.links?.youtube_url?.find(Boolean) || '';
          const ttUrl = (details.links?.chat_url || []).find(u => (u || '').toLowerCase().includes('tiktok')) || '';
          const redditUrl = details.links?.subreddit_url || '';
          const discordUrl = (details.links?.chat_url || []).find(u => (u || '').toLowerCase().includes('discord')) || '';
          return {
            website: Util.safeUrl(homepage),
            github: Util.safeUrl(github),
            x: Util.safeUrl(xUrl),
            telegram: Util.safeUrl(tgUrl),
            discord: Util.safeUrl(discordUrl),
            instagram: Util.safeUrl(igUrl),
            youtube: Util.safeUrl(ytUrl),
            tiktok: Util.safeUrl(ttUrl),
            reddit: Util.safeUrl(redditUrl)
          };
        },
        async loadCoinDetails(id) {
          if (state.detailsCache[id]) return state.detailsCache[id];
          const r = await fetch(`https://api.coingecko.com/api/v3/coins/${encodeURIComponent(id)}?localization=false&tickers=false&market_data=false&community_data=false&developer_data=false&sparkline=false`);
          if (!r.ok) throw new Error('API error');
          const d = await r.json();
          state.detailsCache[id] = d;
          return d;
        },
        async loadDailySocials() {
          try {
            const [socialsRes, logosRes] = await Promise.all([
              fetch(`${C.SOCIALS_JSON_URL}?v=${Date.now()}`, { cache: 'no-store' }),
              fetch(`${C.LOGOS_JSON_URL}?v=${Date.now()}`, { cache: 'no-store' })
            ]);

            if (socialsRes.ok) {
              const j = await socialsRes.json();
              const items = Array.isArray(j.items) ? j.items : [];
              state.socialsById = {};
              for (const it of items) {
                if (it && it.id) state.socialsById[it.id] = it;
              }
            }

            if (logosRes.ok) {
              const j = await logosRes.json();
              const items = Array.isArray(j) ? j : [];
              state.logosById = {};
              for (const it of items) {
                if (it && it.id) state.logosById[it.id] = it;
              }
            }
          } catch (_) {}
        }
      };

      const CodexWheel = {
        initSpin({ wheelRoot, startAngle = 100, secondsPerRevolution = 60 } = {}) {
          const spinGroup = wheelRoot?.querySelector('#codexSpinGroup');
          if (!spinGroup) return null;
          let raf = null;
          let prev = 0;
          let angle = startAngle;
          let paused = false;
          const degPerSec = 360 / secondsPerRevolution;
          const apply = () => spinGroup.setAttribute('transform', `rotate(${angle} 120 120)`);
          const tick = now => {
            raf = requestAnimationFrame(tick);
            if (paused) {
              prev = now;
              return;
            }
            const dt = (now - prev) / 1000;
            prev = now;
            angle = (angle - dt * degPerSec) % 360;
            apply();
          };
          const start = () => {
            if (Util.isReducedMotion()) return;
            prev = performance.now();
            apply();
            raf = requestAnimationFrame(tick);
          };
          wheelRoot.addEventListener('mouseenter', () => paused = true);
          wheelRoot.addEventListener('mouseleave', () => paused = false);
          return { start, stop: () => raf && cancelAnimationFrame(raf) };
        },
        pulseCredoWordsOnce() {
          if (state.introPulseDone) return;
          state.introPulseDone = true;
          if (Util.isReducedMotion()) return;
          const words = [...el.codexCenter.querySelectorAll('tspan.word[data-codex]')];
          if (!words.length) return;
          let i = 0;
          const step = () => {
            if (i >= words.length) return;
            const current = words[i];
            current.classList.add('codex-meta-pulse');
            setTimeout(() => {
              current.classList.remove('codex-meta-pulse');
              i += 1;
              setTimeout(step, 80);
            }, 650);
          };
          step();
        },
        updateWheelHighlight() {
          const ws = [...el.codexCenter.querySelectorAll('.word[data-codex]')];
          ws.forEach(w => {
            const k = w.getAttribute('data-codex');
            w.classList.toggle('is-active', !!state.activeWord && k === state.activeWord);
          });
          const dimCenter = !!state.activeWord || state.sizeMode === 'codex';
          el.codexCenter.classList.toggle('is-word-active', dimCenter);
          el.body.classList.toggle('is-word-active', dimCenter);
        },
        bind() {
          const center = el.codexCenter;
          center.addEventListener('pointerdown', e => e.stopPropagation());
          center.addEventListener('click', e => e.stopPropagation());
          const wheel = CodexWheel.initSpin({ wheelRoot: center, startAngle: 100, secondsPerRevolution: 60 });
          wheel?.start();
          const words = [...center.querySelectorAll('.word[data-codex]')];
          words.forEach(w => {
            w.addEventListener('click', () => {
              words.forEach(x => x.classList.remove('is-active'));
              w.classList.add('is-active');
              center.dispatchEvent(new CustomEvent('codex:select', { bubbles: true, detail: { codex: w.getAttribute('data-codex') } }));
            });
          });
          const innerHit = center.querySelector('.inner-hit');
          if (innerHit) {
            innerHit.addEventListener('click', e => {
              e.stopPropagation();
              const m = state.sizeMode;
              if (m === 'mc' || m === 'social') {
                Panel.close();
                App.setCodexMode();
                return;
              }
              App.resetToDefault();
            });
          }
        }
      };

      const Viz = {
        forceHole() {
          let ns;
          function f(alpha) {
            for (const d of ns) {
              const dx = d.x - state.cx;
              const dy = d.y - state.cy;
              const dist = Math.sqrt(dx * dx + dy * dy) || 1e-6;
              const minDist = C.HOLE_R + d.r + C.HOLE_PAD;
              if (dist < minDist) {
                const push = (minDist - dist) * 0.95 * (alpha + 0.25);
                d.vx += (dx / dist) * push;
                d.vy += (dy / dist) * push;
              }
            }
          }
          f.initialize = _ => ns = _;
          return f;
        },
        forceSwirl() {
          let ns;
          function f(alpha) {
            for (const d of ns) {
              const dx = d.x - state.cx;
              const dy = d.y - state.cy;
              const dist = Math.sqrt(dx * dx + dy * dy) || 1e-6;
              const tx = -dy / dist;
              const ty = dx / dist;
              const s = C.SWIRL * alpha * Math.min(1, dist / 240);
              d.vx += tx * s * 20;
              d.vy += ty * s * 20;
            }
          }
          f.initialize = _ => ns = _;
          return f;
        },
        forceDrift() {
          let ns;
          function f(alpha) {
            for (const d of ns) {
              d.vx = (d.vx || 0) * C.DAMP;
              d.vy = (d.vy || 0) * C.DAMP;
              d.vx += (Math.random() - 0.5) * C.DRIFT * alpha * 10;
              d.vy += (Math.random() - 0.5) * C.DRIFT * alpha * 10;
            }
          }
          f.initialize = _ => ns = _;
          return f;
        },
        forceWalls() {
          let ns;
          function f(alpha) {
            const dynamicMargin = Math.max(90, state.H * 0.18);
            for (const d of ns) {
              const m = dynamicMargin + d.r;
              if (d.x < m) d.vx += C.WALL_REPEL * ((m - d.x) / m) ** 2 * alpha * 40;
              if (d.x > C.W - m) d.vx -= C.WALL_REPEL * ((d.x - (C.W - m)) / m) ** 2 * alpha * 40;
              if (d.y < m) d.vy += C.WALL_REPEL * ((m - d.y) / m) ** 2 * alpha * 40;
              if (d.y > state.H - m) d.vy -= C.WALL_REPEL * ((d.y - (state.H - m)) / m) ** 2 * alpha * 40;
              d.x = Math.max(d.r, Math.min(C.W - d.r, d.x));
              d.y = Math.max(d.r, Math.min(state.H - d.r, d.y));
            }
          }
          f.initialize = _ => ns = _;
          return f;
        },
        proveNodeState(d) {
          if (d.isCodexMaster) return { state: 'sovereign', hasData: true, isSovereign: true };
          if (state.sizeMode === 'codex') {
            if (!d.hasCodexMetric) return { state: 'empty', hasData: false, isSovereign: false };
            if (d.codexSovereign) return { state: 'sovereign', hasData: true, isSovereign: true };
            return { state: 'active', hasData: true, isSovereign: false };
          }
          if (state.sizeMode === 'meta') {
            if (!d.hasMetaMetric) return { state: 'empty', hasData: false, isSovereign: false };
            if (d.codexSovereign) return { state: 'sovereign', hasData: true, isSovereign: true };
            return { state: 'active', hasData: true, isSovereign: false };
          }
          return { state: 'empty', hasData: false, isSovereign: false };
        },
        ensureCodexNode() {
          if (state.codexNode) return;
          state.codexNode = {
            id: 'codex',
            symbol: 'CODEX',
            name: 'CODEX',
            mc: state.maxMcSeen || 0,
            image: '',
            socialTop: null,
            socialScore: 0,
            codexMetric: 100,
            isCodexMaster: true,
            hasCodexMetric: true,
            codexSovereign: true,
            metaMetric: 100,
            hasMetaMetric: true,
            r: 0.0001,
            x: state.cx,
            y: state.cy,
            selected: false,
            hidden: true
          };
          state.nodes.push(state.codexNode);
        },
        updateMetrics() {
          for (const d of state.nodes) {
            if (d.isCodexMaster) continue;
            const v = Data.codexMetricFromJson(d.id);
            d.codexMetric = Number.isFinite(v) ? v : null;
            d.hasCodexMetric = Number.isFinite(v);
            d.codexSovereign = Data.codexSovereignFromJson(d.id);
            if (state.activeWord) {
              const mv = Data.metaMetricFromJson(d.id, state.activeWord);
              d.metaMetric = Number.isFinite(mv) ? mv : null;
              d.hasMetaMetric = Number.isFinite(mv);
            } else {
              d.metaMetric = null;
              d.hasMetaMetric = false;
            }
          }
          if (state.codexNode) {
            const v = Data.codexMetricFromJson('codex');
            state.codexNode.codexMetric = Number.isFinite(v) ? v : 100;
            state.codexNode.hasCodexMetric = true;
            state.codexNode.codexSovereign = true;
            const mv = state.activeWord ? Data.metaMetricFromJson('codex', state.activeWord) : 100;
            state.codexNode.metaMetric = Number.isFinite(mv) ? mv : 100;
            state.codexNode.hasMetaMetric = true;
          }
        },
        activeCodexLabel() {
          return state.activeWord ? String(state.activeWord).toUpperCase() : 'CODEX';
        },
        updateHoleStyle() {
          if (!state.holeCircleSel) return;
          const on = !!state.activeWord;
          state.holeCircleSel
            .attr('fill', on ? 'rgba(51,102,255,.12)' : 'rgba(255,255,255,.01)')
            .attr('stroke', on ? 'rgba(51,102,255,.22)' : 'none')
            .attr('stroke-width', on ? 1.2 : 0);
        },
        applyStyles() {
          if (!state.gSel) return;
          const mode = state.sizeMode;
          const isMeta = mode === 'meta';

          state.gSel.style('opacity', d => {
            if (d.isCodexMaster) return (mode === 'codex' || isMeta) ? 1 : 0;
            if (mode === 'mc' || mode === 'social') return '.55';
            if (mode === 'codex') return d.hasCodexMetric ? '1' : '.40';
            if (isMeta) return d.hasMetaMetric ? '1' : '.40';
            return '.55';
          });

          state.gSel.style('pointer-events', d => {
            if (d.isCodexMaster) return (mode === 'codex' || isMeta) ? 'auto' : 'none';
            return 'auto';
          });

          state.gSel.classed('selected', d => !!d.selected);

          state.gSel.select('circle.fill')
            .style('display', d => (d.isCodexMaster && (mode === 'codex' || isMeta)) ? 'block' : 'none')
            .attr('r', d => d.r)
            .attr('fill', 'url(#pat-codex)')
            .style('opacity', (mode === 'codex' || isMeta) ? 0.45 : 0.0);

          state.gSel.select('circle.ring')
            .attr('fill', d => {
              if (d.isCodexMaster && (mode === 'codex' || isMeta)) return 'url(#grad-codex)';
              return 'none';
            })
            .attr('stroke', d => {
              if (d.isCodexMaster && (mode === 'codex' || isMeta)) return 'rgba(51,102,255,.60)';
              if (d.selected) {
                if (mode === 'social') return 'url(#ring-social)';
                if (mode === 'mc') return 'url(#ring-mc)';
                return 'url(#ring-codex)';
              }
              if (mode === 'codex' && !d.hasCodexMetric) return 'rgba(255,255,255,.08)';
              if (isMeta && !d.hasMetaMetric) return 'rgba(255,255,255,.08)';
              return 'rgba(255,255,255,.12)';
            })
            .attr('stroke-width', d => {
              if (d.isCodexMaster && (mode === 'codex' || isMeta)) return 2;
              return d.selected ? C.RING_W : 1;
            });

          state.gSel.select('circle.ring-shine')
            .style('opacity', d => {
              if (d.isCodexMaster && (mode === 'codex' || isMeta)) return 0;
              return d.selected ? 0.85 : 0.0;
            });

          state.gSel.select('circle.tone')
            .style('display', 'none')
            .style('opacity', 0);

          state.gSel.select('image')
            .style('display', d => (d.isCodexMaster && (mode === 'codex' || isMeta)) ? 'none' : 'block')
            .style('filter', d => {
              if (mode === 'codex' && !d.isCodexMaster && !d.hasCodexMetric) return 'grayscale(1) contrast(0.9) brightness(0.9)';
              if (isMeta && !d.isCodexMaster && !d.hasMetaMetric) return 'grayscale(1) contrast(0.9) brightness(0.9)';
              return 'none';
            })
            .style('opacity', d => {
              if (mode === 'codex' && !d.isCodexMaster && !d.hasCodexMetric) return '.35';
              if (isMeta && !d.isCodexMaster && !d.hasMetaMetric) return '.35';
              return '1';
            });

          state.gSel.select('text.codex-label')
            .style('display', d => (d.isCodexMaster && (mode === 'codex' || isMeta)) ? 'block' : 'none')
            .text(d => d.isCodexMaster ? Viz.activeCodexLabel() : '')
            .style('letter-spacing', () => {
              const w = Viz.activeCodexLabel();
              if (w === 'EQUILIBRIUM') return '.05em';
              if ((w || '').length >= 10) return '.06em';
              return '.10em';
            })
            .style('font-size', d => {
              const r = d.r || 0;
              const w = Viz.activeCodexLabel();
              const len = (w || '').length || 1;
              let px = r * 0.52;
              px = px * (8 / Math.max(8, len));
              px = Math.min(px, 18);
              if (w === 'EQUILIBRIUM') px *= 0.65;
              if (w === 'COMMON') px *= 0.85;
              if (w === 'SUCCESS') px *= 0.80;
              px = Math.max(9, Math.min(18, px));
              return px + 'px';
            });
        },
        pulseCodexMaster() {
          if (!state.gSel) return;
          const master = state.gSel.filter(d => d.isCodexMaster);
          const sel = master.selectAll('circle.fill, circle.ring, circle.ring-shine, text.codex-label');
          sel.style('transform', 'scale(1)').style('opacity', '1');
          requestAnimationFrame(() => {
            sel.style('transform', 'scale(0.96)').style('opacity', '0.8');
            setTimeout(() => {
              sel.style('transform', 'scale(1)').style('opacity', '1');
            }, 250);
          });
        },
        applySizing(nextMode) {
          state.sizeMode = nextMode;
          Viz.ensureCodexNode();
          Viz.updateMetrics();

          if (state.sizeMode === 'codex' || state.sizeMode === 'meta') {
            const maxR = 50;
            const minR = 8;
            const coreR = maxR;
            state.codexNode.r = coreR;
            state.codexNode.hidden = false;
            for (const d of state.nodes) {
              if (d.isCodexMaster) continue;
              const v = state.sizeMode === 'codex'
                ? (Number.isFinite(d.codexMetric) ? d.codexMetric : null)
                : (Number.isFinite(d.metaMetric) ? d.metaMetric : null);
              if (v === null) {
                d.r = Math.max(15, coreR * 0.10);
              } else {
                const t = Math.max(0, Math.min(1, v / 100));
                d.r = Math.max(minR, coreR * t);
              }
            }
          } else {
            state.codexNode.r = 0.0001;
            state.codexNode.hidden = true;
            const values = state.nodes.filter(d => !d.isCodexMaster).map(d => state.sizeMode === 'social' ? (d.socialScore || 0) : (d.mc || 0)).map(v => Math.max(1, v));
            const min = Math.min(...values);
            const max = Math.max(...values);
            for (const d of state.nodes) {
              if (d.isCodexMaster) continue;
              const v = state.sizeMode === 'social' ? (d.socialScore || 0) : (d.mc || 0);
              const minR = 11;
              const maxR = state.sizeMode === 'social' ? 46 : 50;
              d.r = state.sizeMode === 'social'
                ? Util.radiusFromSqrt(v, min, max, minR, maxR)
                : Util.radiusFromCap(v, min, max, minR, maxR);
            }
          }

          if (state.defsSel) {
            for (const d of state.nodes) {
              state.defsSel.select(`#clip-${CSS.escape(d.id)} circle`).attr('r', Math.max(0.0001, d.r - C.LOGO_PAD));
            }
          }

          if (state.gSel) {
            state.gSel.select('circle.fill').attr('r', d => d.r);
            state.gSel.select('circle.ring').attr('r', d => d.r);
            state.gSel.select('circle.ring-shine').attr('r', d => d.r);
            state.gSel.select('image')
              .attr('width', d => Math.max(0.0001, (d.r - C.LOGO_PAD) * 2))
              .attr('height', d => Math.max(0.0001, (d.r - C.LOGO_PAD) * 2))
              .attr('x', d => -(d.r - C.LOGO_PAD))
              .attr('y', d => -(d.r - C.LOGO_PAD));
            state.gSel.select('text.codex-label').attr('y', 0);
          }

          if (state.collide) {
            const pad = state.sizeMode === 'social' ? C.COLLISION_PAD + 4 : C.COLLISION_PAD;
            state.collide.radius(n => {
              if (n.isCodexMaster) return (state.sizeMode === 'codex' || state.sizeMode === 'meta') ? (n.r + pad) : 0.1;
              return n.r + (n.selected ? C.SELECT_PAD : pad);
            });
          }

          Viz.updateHoleStyle();
          Viz.applyStyles();
          if (state.simulation) {
            state.simulation.alpha(0.9).alphaTarget(0.15).restart();
            setTimeout(() => state.simulation.alphaTarget(0), 400);
          }
        },
        bubbleTipHtml(d) {
          const sym = String(d.symbol || '').toUpperCase();
          if (state.sizeMode === 'codex') {
            if (d.isCodexMaster) return `<b>CODEX</b><br><span style="color:rgba(255,255,255,.65);font-weight:700;">Proof of</span><br><span style="color:var(--green);font-weight:900;">Meaning</span>`;
            const p = Viz.proveNodeState(d);
            const label = p.state === 'sovereign' ? 'PoM ✓' : p.state === 'active' ? 'ACTIVE' : 'PENDING';
            const color = p.state === 'sovereign' ? 'var(--green)' : 'rgba(255,255,255,.45)';
            return `<b>${sym}</b><br><span style="color:var(--blue);font-weight:800;">CODEX</span><br><span style="color:${color};font-weight:900;">${label}</span>`;
          }
          if (state.sizeMode === 'meta') {
            const word = Viz.activeCodexLabel();
            if (d.isCodexMaster) return `<b>${word}</b><br><span style="color:rgba(255,255,255,.55);font-weight:700;">EXPLORE</span><br><span style="color:var(--green);font-weight:900;">MEANING</span>`;
            const p = Viz.proveNodeState(d);
            const label = p.state === 'sovereign' ? 'PoM ✓' : p.state === 'active' ? 'ACTIVE' : 'PENDING';
            const color = p.state === 'sovereign' ? 'var(--green)' : 'rgba(255,255,255,.45)';
            return `<b>${sym}</b><br><span style="color:var(--blue);font-weight:800;">${word}</span><br><span style="color:${color};font-weight:900;">${label}</span>`;
          }
          if (state.sizeMode === 'social') {
            const top = d.socialTop || null;
            if (top && Number.isFinite(top.value)) return `<b>${sym}</b><br>${top.platform.toUpperCase()} ${Util.numShort(top.value)}`;
            return `<b>${sym}</b><br>Social —`;
          }
          return `<b>${sym}</b><br>${Util.usdShort(d.mc)}`;
        },
        panelHeightForTab(tab) {
          if (tab === 'social') return C.PANEL_H_SOCIAL;
          if (tab === 'codex') return state.activeWord ? C.PANEL_H_CODEX_ACTIVE : C.PANEL_H_CODEX_IDLE;
          return C.PANEL_H_MC;
        },
        setLayout(open, tab) {
          const panelH = open ? Viz.panelHeightForTab(tab) : 0;
          const nextH = C.TOTAL_H - panelH;
          el.frame.style.height = nextH + 'px';
          el.panel.classList.toggle('show', open);
          el.panel.style.height = open ? panelH + 'px' : '0px';
          el.panel.style.padding = open ? '18px 20px' : '0 20px';
          state.H = nextH;
          state.cy = nextH / 2;
          el.svg.attr('viewBox', `0 0 ${C.W} ${state.H}`);
          if (state.holeCircleSel) state.holeCircleSel.attr('cy', state.cy);
          if (state.nodes.length) {
            for (const d of state.nodes) {
              d.x = Math.max(d.r, Math.min(C.W - d.r, d.x));
              d.y = Math.max(d.r, Math.min(state.H - d.r, d.y));
            }
          }
          if (state.simulation) {
            state.simulation.force('x', d3.forceX(state.cx).strength(C.CENTER_GRAV));
            state.simulation.force('y', d3.forceY(state.cy).strength(C.CENTER_GRAV));
            state.simulation.force('walls', Viz.forceWalls());
            state.simulation.alpha(0.95).alphaTarget(0.2).restart();
            setTimeout(() => state.simulation.alphaTarget(0), 420);
          }
        },
        rebuild() {
          el.svg.selectAll('*').remove();

          state.holeCircleSel = el.svg.append('circle')
            .attr('cx', state.cx).attr('cy', state.cy).attr('r', C.HOLE_R)
            .attr('fill', 'rgba(255,255,255,.01)')
            .attr('stroke', 'none');

          state.holeCircleSel.on('click', () => {
            if (state.activeWord) App.resetToDefault();
            else App.refreshDefault();
          });

          state.defsSel = el.svg.append('defs');

          state.defsSel.append('pattern')
            .attr('id', 'pat-codex')
            .attr('patternUnits', 'userSpaceOnUse')
            .attr('x', -120).attr('y', -120)
            .attr('width', 380).attr('height', 380)
            .call(p => {
              p.append('image')
                .attr('href', 'media/META-MEME.jpg')
                .attr('x', -220).attr('y', -180)
                .attr('width', 760).attr('height', 520)
                .attr('preserveAspectRatio', 'xMidYMid slice')
                .append('animateTransform')
                .attr('attributeName', 'transform')
                .attr('type', 'translate')
                .attr('dur', '24s')
                .attr('values', '0 0; 40 -26; -22 18; 0 0')
                .attr('repeatCount', 'indefinite');
            });

          state.defsSel.append('linearGradient').attr('id', 'grad-codex').attr('x1', '0%').attr('y1', '0%').attr('x2', '100%').attr('y2', '100%')
            .call(g => {
              g.append('stop').attr('offset', '0%').attr('stop-color', 'rgb(51,102,255)').attr('stop-opacity', '0.65');
              g.append('stop').attr('offset', '55%').attr('stop-color', 'rgb(51,102,255)').attr('stop-opacity', '0.40');
              g.append('stop').attr('offset', '100%').attr('stop-color', 'rgb(16,28,70)').attr('stop-opacity', '0.12');
            });

          state.defsSel.append('linearGradient').attr('id', 'ring-mc').attr('x1', '0%').attr('y1', '0%').attr('x2', '100%').attr('y2', '100%')
            .call(g => {
              g.append('stop').attr('offset', '0%').attr('stop-color', 'rgba(34,221,9,.05)');
              g.append('stop').attr('offset', '45%').attr('stop-color', 'rgba(34,221,9,.55)');
              g.append('stop').attr('offset', '100%').attr('stop-color', 'rgba(34,221,9,.10)');
            });

          state.defsSel.append('linearGradient').attr('id', 'ring-social').attr('x1', '0%').attr('y1', '0%').attr('x2', '100%').attr('y2', '100%')
            .call(g => {
              g.append('stop').attr('offset', '0%').attr('stop-color', 'rgba(255,102,0,.05)');
              g.append('stop').attr('offset', '45%').attr('stop-color', 'rgba(255,102,0,.55)');
              g.append('stop').attr('offset', '100%').attr('stop-color', 'rgba(255,102,0,.10)');
            });

          state.defsSel.append('linearGradient').attr('id', 'ring-codex').attr('x1', '0%').attr('y1', '0%').attr('x2', '100%').attr('y2', '100%')
            .call(g => {
              g.append('stop').attr('offset', '0%').attr('stop-color', 'rgba(51,102,255,.06)');
              g.append('stop').attr('offset', '45%').attr('stop-color', 'rgba(51,102,255,.60)');
              g.append('stop').attr('offset', '100%').attr('stop-color', 'rgba(51,102,255,.12)');
            });

          state.defsSel.append('linearGradient').attr('id', 'ring-shine').attr('x1', '0%').attr('y1', '0%').attr('x2', '100%').attr('y2', '100%')
            .call(g => {
              g.append('stop').attr('offset', '0%').attr('stop-color', 'rgba(255,255,255,0)');
              g.append('stop').attr('offset', '45%').attr('stop-color', 'rgba(255,255,255,.55)');
              g.append('stop').attr('offset', '55%').attr('stop-color', 'rgba(255,255,255,.10)');
              g.append('stop').attr('offset', '100%').attr('stop-color', 'rgba(255,255,255,0)');
            });

          state.gSel = el.svg.append('g').selectAll('g.node').data(state.nodes, d => d.id).join('g').attr('class', 'node');

          state.gSel.append('circle').attr('class', 'fill').attr('r', d => d.r).style('display', 'none');
          state.gSel.append('circle').attr('class', 'ring').attr('r', d => d.r).attr('fill', 'none').attr('stroke', 'rgba(255,255,255,.12)');

          for (const d of state.nodes) {
            state.defsSel.append('clipPath').attr('id', 'clip-' + d.id).append('circle').attr('r', Math.max(0.0001, d.r - C.LOGO_PAD));
          }

          state.gSel.append('image')
            .attr('href', d => Data.logoFromJson(d.id, d.image))
            .attr('width', d => Math.max(0.0001, (d.r - C.LOGO_PAD) * 2))
            .attr('height', d => Math.max(0.0001, (d.r - C.LOGO_PAD) * 2))
            .attr('x', d => -(d.r - C.LOGO_PAD))
            .attr('y', d => -(d.r - C.LOGO_PAD))
            .attr('clip-path', d => `url(#clip-${d.id})`)
            .attr('preserveAspectRatio', 'xMidYMid meet');

          state.gSel.append('circle')
            .attr('class', 'tone')
            .attr('r', d => Math.max(0, d.r - C.LOGO_PAD))
            .attr('fill', 'url(#grad-codex)')
            .style('display', 'none')
            .style('pointer-events', 'none');

          state.gSel.append('text').attr('class', 'codex-label').attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('font-family', `ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Ubuntu,sans-serif`)
            .attr('font-weight', '900').attr('letter-spacing', '.10em')
            .attr('fill', 'var(--blue)')
            .text(d => d.isCodexMaster ? 'CODEX' : '')
            .style('pointer-events', 'none')
            .style('display', 'none');

          state.gSel.selectAll('circle.fill, circle.ring, circle.ring-shine, circle.tone, text.codex-label')
            .style('transform-origin', 'center')
            .style('transition', 'transform 320ms cubic-bezier(.2,.9,.2,1), opacity 320ms ease');

          state.gSel.on('pointerenter', (e, d) => {
            el.svg.selectAll('.node').style('opacity', '.35');
            d3.select(e.currentTarget).style('opacity', '1').raise();
            el.tip.innerHTML = Viz.bubbleTipHtml(d);
            el.tip.style.display = 'block';
          }).on('pointermove', e => {
            const rect = el.frame.getBoundingClientRect();
            const pad = 12;
            const rawX = e.clientX - rect.left;
            const rawY = e.clientY - rect.top;
            const tipW = el.tip.offsetWidth;
            const tipH = el.tip.offsetHeight;
            let x = rawX;
            let y = rawY;
            if (x < pad) x = pad;
            if (x > rect.width - tipW - pad) x = rect.width - tipW - pad;
            if (y < tipH + pad) y = tipH + pad;
            if (y > rect.height - pad) y = rect.height - pad;
            el.tip.style.left = x + 'px';
            el.tip.style.top = y + 'px';
          }).on('pointerleave', () => {
            el.tip.style.display = 'none';
            el.svg.selectAll('.node').style('opacity', '.35');
            Viz.applyStyles();
          });

          const drag = d3.drag()
            .on('start', (event, d) => {
              el.tip.style.display = 'none';
              if (!event.active) state.simulation.alphaTarget(0.25).restart();
              d.fx = d.x;
              d.fy = d.y;
            })
            .on('drag', (event, d) => {
              d.fx = Math.max(d.r, Math.min(C.W - d.r, event.x));
              d.fy = Math.max(d.r, Math.min(state.H - d.r, event.y));
            })
            .on('end', (event, d) => {
              if (!event.active) state.simulation.alphaTarget(0);
              d.fx = null;
              d.fy = null;
            });

          state.gSel.call(drag);

          state.gSel.on('click', async (e, d) => {
            e.stopPropagation();
            if (d.isCodexMaster) {
              state.activeCoin = null;
              state.panelTab = 'codex';
              Portal.setSliderContext(state.activeWord ? String(state.activeWord).toUpperCase() : 'CODEX', false);
              Panel.renderCodexSystemPanel();
              if (state.simulation) {
                state.simulation.alpha(0.65).alphaTarget(0.10).restart();
                setTimeout(() => state.simulation.alphaTarget(0), 250);
              }
              return;
            }

            state.nodes.forEach(n => n.selected = false);
            d.selected = true;
            el.svg.selectAll('.node').classed('selected', n => n.selected);

            if (state.collide) {
              const pad = state.sizeMode === 'social' ? C.COLLISION_PAD + 4 : C.COLLISION_PAD;
              state.collide.radius(n => {
                if (n.isCodexMaster) return (state.sizeMode === 'codex' || state.sizeMode === 'meta') ? (n.r + pad) : 0.1;
                return n.r + (n.selected ? C.SELECT_PAD : pad);
              });
            }

            const wasOpen = el.panel.classList.contains('show');
            const inCodexContext = !!state.activeWord || state.sizeMode === 'codex' || state.sizeMode === 'meta';
            state.panelTab = wasOpen ? state.panelTab : (inCodexContext ? 'codex' : 'mc');

            if (!wasOpen && state.panelTab === 'codex') {
              Viz.applySizing(state.activeWord ? 'meta' : 'codex');
            }

            if (state.panelTab === 'mc') {
              state.activeWord = null;
              CodexWheel.updateWheelHighlight();
              Viz.applySizing('mc');
            } else if (state.panelTab === 'social') {
              state.activeWord = null;
              CodexWheel.updateWheelHighlight();
              Viz.applySizing('social');
            } else if (state.panelTab === 'codex') {
              CodexWheel.updateWheelHighlight();
              Viz.applySizing(state.activeWord ? 'meta' : 'codex');
            }

            Viz.setLayout(true, state.panelTab);
            el.panel.innerHTML = `<div class="panelbar"><div class="panelhandle" id="panelHandle" role="button" tabindex="0" aria-label="Collapse"></div></div><div class="coinname">Loading…</div><div class="smallnote">Fetching links</div>`;
            const hBtn = document.getElementById('panelHandle');
            if (hBtn) Util.bindPress(hBtn, Panel.close);

            const id = d.id;
            const symbol = String(d.symbol || '').toUpperCase();
            const name = d.name;
            const logo = Data.logoFromJson(id) || d.image || '';
            const mc = d.mc || 0;
            const jsonLinks = Data.linksFromJson(id);
            const jsonCounts = Data.socialCountsFromJson(id);
            const jsonCountsAvail = Object.values(jsonCounts).some(v => Number.isFinite(v));
            const hasAnyJsonLink = Object.values(jsonLinks).some(Boolean);

            if (hasAnyJsonLink || jsonCountsAvail) {
              state.activeCoin = { id, symbol, name, logo, mc, links: jsonLinks, counts: jsonCounts, countsAvailable: jsonCountsAvail, sourceNote: '' };
              Portal.setSliderContext(name);
              Portal.post('MEME_COIN_SELECTED', {
                id,
                symbol,
                name,
                mc
              });
              Panel.renderDetailsView(state.activeCoin);
              if (state.simulation) {
                state.simulation.alpha(0.9).alphaTarget(0.15).restart();
                setTimeout(() => state.simulation.alphaTarget(0), 400);
              }
              return;
            }

            try {
              const details = await Data.loadCoinDetails(id);
              const cgLinks = Data.linksFromCoinGecko(details);
              const mergedLinks = {
                website: jsonLinks.website || cgLinks.website,
                github: jsonLinks.github || cgLinks.github,
                x: jsonLinks.x || cgLinks.x,
                telegram: jsonLinks.telegram || cgLinks.telegram,
                discord: jsonLinks.discord || cgLinks.discord,
                instagram: jsonLinks.instagram || cgLinks.instagram,
                youtube: jsonLinks.youtube || cgLinks.youtube,
                tiktok: jsonLinks.tiktok || cgLinks.tiktok,
                reddit: jsonLinks.reddit || cgLinks.reddit
              };
              state.activeCoin = { id, symbol, name, logo, mc, links: mergedLinks, counts: { github: null, x: null, telegram: null, discord: null, instagram: null, youtube: null, tiktok: null, reddit: null }, countsAvailable: false, sourceNote: 'Links from CoinGecko (followers pending).' };
              Panel.renderDetailsView(state.activeCoin);
            } catch (_) {
              state.activeCoin = { id, symbol, name, logo, mc, links: jsonLinks, counts: jsonCounts, countsAvailable: jsonCountsAvail, sourceNote: 'Failed to fetch CoinGecko links.' };
              Panel.renderDetailsView(state.activeCoin);
            }

            if (state.simulation) {
              state.simulation.alpha(0.9).alphaTarget(0.15).restart();
              setTimeout(() => state.simulation.alphaTarget(0), 400);
            }
          });

          state.collide = d3.forceCollide().radius(d => d.r + C.COLLISION_PAD).iterations(2);

          if (state.simulation) state.simulation.stop();
          state.simulation = d3.forceSimulation(state.nodes)
            .force('x', d3.forceX(state.cx).strength(C.CENTER_GRAV))
            .force('y', d3.forceY(state.cy).strength(C.CENTER_GRAV))
            .force('repel', d3.forceManyBody().strength(C.REPULSION))
            .force('collide', state.collide)
            .force('swirl', Viz.forceSwirl())
            .force('drift', Viz.forceDrift())
            .force('hole', Viz.forceHole())
            .force('walls', Viz.forceWalls())
            .alpha(1).alphaDecay(0.02)
            .on('tick', () => state.gSel.attr('transform', d => `translate(${d.x},${d.y})`));

          Viz.updateHoleStyle();
          Viz.applyStyles();
        },
        async load() {
          try {
            await Data.loadDailySocials();
            const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=${C.VS}&category=${C.CAT}&order=market_cap_desc&per_page=${C.PER}&page=1&sparkline=false`, { headers: { accept: 'application/json' } });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const filtered = data.filter(d => {
              const name = String(d.name || '').toLowerCase();
              const id = String(d.id || '').toLowerCase();
              if (name.includes('binance-peg') || name.includes('binance peg') || name.includes('wrapped') || name.includes('wormhole') || id.includes('binance-peg') || id.includes('wrapped')) return false;
              return true;
            });
            const seen = new Set();
            const clean = [];
            for (const d of filtered) {
              const sym = String(d.symbol || '').toLowerCase();
              if (seen.has(sym)) continue;
              seen.add(sym);
              clean.push(d);
            }

            state.nodes = clean.map(d => {
              const id = d.id;
              const st = Data.topSocialForId(id);
              const ss = Data.socialScoreForId(id);
              const localMc = state.socialsById[id]?.market_cap_usd;
              const mc = d.market_cap ?? localMc ?? 0;
              return {
                id,
                symbol: d.symbol,
                name: d.name,
                mc,
                image: Data.logoFromJson(id, d.image),
                socialTop: st,
                socialScore: ss,
                codexMetric: null,
                hasCodexMetric: false,
                codexSovereign: false,
                metaMetric: null,
                hasMetaMetric: false,
                isCodexMaster: false,
                r: 12,
                x: Math.random() * C.W,
                y: Math.random() * state.H,
                selected: false
              };
            });

            state.maxMcSeen = state.nodes.reduce((m, d) => Math.max(m, d.mc || 0), 0);
            state.codexNode = null;
            Viz.ensureCodexNode();
            Viz.updateMetrics();

            for (const d of state.nodes) {
              const dx = d.x - state.cx;
              const dy = d.y - state.cy;
              const dist = Math.sqrt(dx * dx + dy * dy) || 1e-6;
              const minDist = C.HOLE_R + d.r + C.HOLE_PAD;
              if (dist < minDist) {
                const ang = Math.random() * Math.PI * 2;
                d.x = state.cx + Math.cos(ang) * minDist;
                d.y = state.cy + Math.sin(ang) * minDist;
              }
            }

            Viz.rebuild();
            Viz.setLayout(false, state.panelTab);
            Viz.applySizing(state.sizeMode);
            CodexWheel.updateWheelHighlight();
            setTimeout(CodexWheel.pulseCredoWordsOnce, 700);
          } catch (_) {}
        }
      };

      const Panel = {
        addSocialIcon(arr, { label, url, iconHtml, count }) {
          const u = Util.safeUrl(url);
          if (!u) return;
          arr.push(`<a class="socialpill${count === null ? ' icononly' : ''}" href="${u}" target="_blank" rel="noreferrer" aria-label="${label}">${iconHtml}${count === null ? '' : `<span class="n">${Util.numShort(count)}</span>`}</a>`);
        },
        close() {
          state.activeCoin = null;
          state.nodes.forEach(n => n.selected = false);
          el.svg.selectAll('.node').classed('selected', false);

          el.panel.classList.remove('dynamic');
          el.panel.style.maxHeight = '';
          el.panel.style.overflowY = '';
          el.panel.style.height = '';
          el.panel.style.padding = '';

          Viz.setLayout(false, state.panelTab);

          if (state.collide) {
            const pad = state.sizeMode === 'social' ? C.COLLISION_PAD + 4 : C.COLLISION_PAD;
            state.collide.radius(n => {
              if (n.isCodexMaster) return (state.sizeMode === 'codex' || state.sizeMode === 'meta') ? (n.r + pad) : 0.1;
              return n.r + pad;
            });
          }
          Viz.applyStyles();
          if (state.simulation) {
            state.simulation.alpha(0.9).alphaTarget(0.15).restart();
            setTimeout(() => state.simulation.alphaTarget(0), 400);
          }
        },
        codexLineHtml() {
          const mk = (k, label) => `<span class="k${state.activeWord === k ? ' is-active' : ''}" data-k="${k}">${label}</span>`;
          return `<div class="codexline">${mk('vow','VOW')}<span class="t">to</span>${mk('guide','GUIDE')}<span class="t">the</span>${mk('common','COMMON')}<span class="t">through</span>${mk('equilibrium','EQUILIBRIUM')}<span class="t">and</span>${mk('success','SUCCESS')}<span class="t">enabling</span>${mk('comud','COMUD')}</div>`;
        },
        chevronSvg() {
          return `<span class="codex-chevron" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"></path></svg></span>`;
        },
        codexPanelBody({ id, name }) {
          const isUniversePanel = String(id) === 'codex';
          const isCodexTab = !state.activeWord;
          const label = state.activeWord ? String(state.activeWord).toUpperCase() : 'CODEX';

          if (isUniversePanel) {
            const sentence = state.activeWord ? Data.codexContextLong(id, state.activeWord) : null;
            return `
              <div class="links">
                ${!state.activeWord ? `
                  <div class="codexnote">
                    <div class="codex-rowhead">
                      <div class="codexrow">
                        <span class="codexcenter">
                          ${Panel.codexLineHtml()}
                        </span>
                      </div>
                    </div>
                  </div>
                ` : ``}
                ${sentence ? `
                  <div class="codexnote">
                    <div class="codex-sentence-row">
                      <div>
                        <span style="color:var(--green);font-weight:900;letter-spacing:.08em;">${label}</span>
                        <span style="color:rgba(51,102,255,.85);font-weight:700;">${sentence.replace(new RegExp('^' + label + '\\s*', 'i'), '')}</span>
                      </div>
                      <a class="codex-explore" href="#" data-open-codex="1" aria-label="Explore CODEX explanation">EXPLORE <span class="arr">↗</span></a>
                    </div>
                  </div>
                ` : ``}
              </div>
            `;
          }

          const isSovereign = Data.codexSovereignFromJson(id);
          const codexMetric = Data.codexMetricFromJson(id);
          const metaMetric = state.activeWord ? Data.metaMetricFromJson(id, state.activeWord) : null;
          const wordShort = state.activeWord ? Data.codexContextShort(id, state.activeWord) : null;
          const wordLong = state.activeWord ? Data.codexContextLong(id, state.activeWord) : null;

          let shortText = '';
          let inactive = false;

          if (isCodexTab) {
            shortText = `of the <span class="community-name">${name}</span> Community`;
            inactive = !isSovereign && !(Number.isFinite(codexMetric) && codexMetric > 0);
          } else {
