<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>M O M E N T U M</title>
  <link rel="icon" href="media/universe-favicon.ico" type="image/x-icon" />
  <meta name="viewport" content="width=650, user-scalable=no" />
  <meta name="description" content="MOMENTUM — to master the Infinite Game within the UNIVERSE." />

  <style>
    :root{
      --bg:#000;
      --text:#eee;
      --blue:#3366FF;
      --orange:#FF6600;
      --green:#22DD09;
      --border:rgba(255,255,255,.10);
      --border-weak:rgba(255,255,255,.06);
      --shadow-1:0 10px 26px rgba(0,0,0,.55);
      --shadow-2:0 14px 32px rgba(0,0,0,.65);
      --baseW:650;
      --scale:1;
      --radius-1:12px;
      --radius-2:14px;
      --row-h:46px;
      --font-ui:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif;
      --default-frame-h:720px;
      --hover-glow:rgba(255,255,255,.08);
      --open-glow:rgba(51,102,255,.16);
      --line:#f4f4f4;
    }

    *{margin:0;padding:0;box-sizing:border-box}

    html,body{
      height:100%;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      text-rendering:geometricPrecision;
      -webkit-font-smoothing:antialiased;
    }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:var(--font-ui);
      line-height:1.6;
      text-align:center;
      padding:30px 0;
      display:flex;
      justify-content:center;
    }

    .scale-wrap{width:650px;margin:0 auto}
    .scale-inner{width:650px;transform-origin:top center;transform:scale(var(--scale))}

    .stage{
      position:relative;
      border-radius:var(--radius-1);
      overflow:hidden;
      border:1px solid var(--border-weak);
      background:
        radial-gradient(circle at 10% 0%, rgba(51,102,255,.22), transparent 55%),
        linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.92)),
        url('media/META-MEME.jpg') center/cover no-repeat;
      background-blend-mode:normal,multiply,normal;
      box-shadow:0 0 10px rgba(0,0,0,.35);
      min-height:var(--default-frame-h);
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:0;
      background:url('media/META-MEME.jpg') center 40%/cover no-repeat;
      opacity:1;
      transform:scale(1.05);
      transform-origin:center;
      animation:metaSpaceDrift 30s ease-in-out infinite alternate;
      z-index:0;
      pointer-events:none;
    }

    @media (prefers-reduced-motion: reduce){
      .stage::before{animation:none !important}
    }

    .stage-inner{
      position:relative;
      z-index:2;
      padding:20px 16px 16px;
    }

    .diagram-wrap{
      position:absolute;
      margin-top:50px;
      inset:0;
      z-index:1;
      display:grid;
      place-items:center;
      cursor:default;
    }
    .diagram-wrap.is-hidden{display:none}

    .cosmos-shell{
      width:610px;
      margin-top:10px;
      padding:0;
      border-radius:18px;
      background:transparent;
      border:0;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
      display:grid;
      place-items:center;
    }

    #cosmos600{
      width:610px;
      height:610px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background:transparent;
    }

    #frame{
      width:100%;
      height:610px;
      position:relative;
      overflow:hidden;
      transition:height .35s ease;
      background:
        linear-gradient(
          to bottom,
          rgba(8,12,20,.70) 0%,
          rgba(6,10,18,.80) 50%,
          rgba(3,6,12,.95) 100%
        );
    }

    #viz{width:100%;height:100%;display:block}
    .node{opacity:.65;transition:opacity 120ms ease}
    .node.selected{opacity:1!important}
    .node.selected circle{stroke-width:2.5px}
    #tip{
      position:absolute;
      z-index:5;
      display:none;
      white-space:nowrap;
      pointer-events:none;
      transform:translate(-50%,-120%);
      padding:8px 10px;
      border-radius:10px;
      font-size:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,12,16,.95);
      color:#fff;
      text-align:left;
    }

    #codexCenter{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:220px;
      height:220px;
      display:grid;
      place-items:center;
      user-select:none;
      z-index:3;
      pointer-events:auto;
    }

    #codexCenter svg{
      width:220px;
      height:220px;
      display:block;
    }

    #codexCenter text{
      font-family:"SF Mono","Menlo",monospace;
      font-size:12px;
      font-weight:900;
      letter-spacing:.2px;
    }

    #codexCenter .word{
      fill:var(--blue);
      cursor:pointer;
      opacity:.95;
      transition:fill .18s ease;
    }

    #codexCenter .word:hover{
      fill:var(--green);
      text-decoration:underline;
    }

    #codexCenter .word.is-active{
      fill:var(--green);
    }

    #codexCenter .plain{
      fill:var(--blue);
      opacity:.6;
      font-size:10px;
      font-weight:800;
    }

    #codexCenter .logo{
      pointer-events:none;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,.65));
    }

    .info-panel{
      width:100%;
      height:0;
      overflow:hidden;
      padding:0 20px;
      border-top:1px solid rgba(255,255,255,.10);
      background:linear-gradient(
      180deg,
      rgba(8,12,20,.92) 0%,
      rgba(4,8,16,.96) 60%,
      rgba(0,0,0,.98) 100%
    );
      backdrop-filter:blur(18px);
      opacity:1;
      transform:translateY(16px);
      transition:height .35s ease,padding .35s ease,opacity .25s ease,transform .25s ease;
    }
    .info-panel.show{
      opacity:1;
      transform:translateY(0);
      position:relative;
      overflow:visible;
    }

    .info-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .info-left{display:flex;align-items:center;gap:12px;min-width:200px}
    .coin-logo{width:34px;height:34px;flex:0 0 auto;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04)}
    .titlewrap{display:flex;flex-direction:column;line-height:1.05}
    .coinname{font-size:20px;font-weight:700;letter-spacing:-.01em}
    .ticker{margin-top:4px;font-size:12px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;opacity:.55}
    .info-right{display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:12px;margin-left:auto}
    .badge .ico{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center}
    .badge svg{width:16px;height:16px;display:block;fill:currentColor}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:5px 16px;border-radius:14px;font-size:15px;font-weight:600;min-width:48px;height:32px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.25);color:#fff;backdrop-filter:blur(10px);transition:all .18s ease;}
    .badge.action{cursor:pointer;user-select:none;opacity:.55;transition:opacity .18s ease,border-color .18s ease,color .18s ease}
    .badge.action.active{opacity:1}
    .badge.action:hover{opacity:1}
    .universe-name{
      color: var(--green);
      letter-spacing: .10em;
      font-weight: 900;
    }

    #badgeMc:hover,
    #badgeMc.active{
      color:var(--green);
      border-color:var(--green);
    }

    #badgeSocial:hover,
    #badgeSocial.active{
      color:var(--orange);
      border-color:var(--orange);
    }

    #badgeCodex{
      color:var(--blue);
      border-color:var(--blue);
    }

    body.is-word-active #badgeCodex{
      color:rgba(51,102,255,.28);
      border-color:rgba(51,102,255,.75);
    }

    body.is-word-active #badgeCodex:hover,
    body.is-word-active #badgeCodex:focus-visible,
    #badgeCodex:hover,
    #badgeCodex.active{
      color:var(--blue);
      border-color:var(--blue);
    }

    .cur{font-weight:650}
    .links{margin-top:8px;display:block;padding-top:12px}
    .socialrow{width:100%;display:flex;flex-wrap:wrap;align-items:center;gap:7.5px}
    .linkname{text-decoration:none;color:inherit}
    .linkname:hover{text-decoration:underline}
    .smallnote{margin-top:10px;font-size:12px;opacity:.55}

    .codexline{
      width:100%;
      text-align:center;
      font-size:12px;
      letter-spacing:.02em;
      font-weight:900;
      color:rgba(255,255,255,.70);
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:4.5px;
      align-items:center;
      padding:6px 2px 15px;
      user-select:none;
    }

    .codexline .k{
      cursor:pointer;
      color:rgba(51,102,255,.80);
      transition:color .16s ease,text-shadow .16s ease,opacity .16s ease;
    }

    .codexline .k:hover{
      color:var(--green);
      text-shadow:0 0 10px rgba(34,221,9,.18);
    }

    .codexline .k.is-active{
      color:var(--green);
      text-shadow:0 0 10px rgba(34,221,9,.22);
    }

    .codexline .t{
      color:rgba(51,102,255,.85);
      opacity:.55;
      letter-spacing:.01em;
      font-weight:800;
    }

    body.is-word-active .codexline .k{
      color:rgba(255,255,255,.28);
      text-shadow:none;
    }

    body.is-word-active .codexline .k.is-active{
      color:rgba(255,255,255,.28);
      opacity:.55;
      text-shadow:none;
    }

    body.is-word-active .codexline .t{
      color:rgba(255,255,255,.28);
      opacity:1;
    }

    body.is-word-active .codexline .k:hover{
      color:var(--green);
      text-shadow:0 0 10px rgba(34,221,9,.18);
    }

    .codexnote{
      width:100%;
      text-align:center;
      font-size:13px;
      opacity:.88;
      letter-spacing:.02em;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
    }
    .codexnote b{letter-spacing:.12em}
    .codexnote .codex-deeplink{
      color:var(--blue);
      font-weight:800;
      cursor:pointer;
      margin-right:6px;
    }
    .codexnote .codex-deeplink:hover{color:var(--green)}

    .codex-rowhead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .codex-expand{
      margin-top:10px;
      padding:10px 0px;
      border-radius:12px;
      border:0px solid rgba(255,255,255,.10);
      overflow-wrap:break-word;
      word-break:break-word;
      font-size:12px;
      opacity:0.95;
      text-align:justify;
    }

    .info-panel.dynamic{
      max-height:min(300px,45vh);
      overflow-y:auto;
      scrollbar-width:none;
    }

    .info-panel.dynamic::-webkit-scrollbar{
      display:none;
    }

    .socialpill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:12px;
      font-size:12px;
      text-decoration:none;
      color:#cfe1ff;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      opacity:.35;
      transition:opacity .18s ease,border-color .18s ease,background .18s ease
    }
    .socialpill:hover{opacity:1;border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.05)}
    .socialpill .ico{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center}
    .socialpill svg{width:16px;height:16px;display:block;fill:currentColor}
    .socialpill .n{opacity:.9}
    .socialpill.icononly{padding:6px 8px;gap:0}
    .socialpill.icononly .ico{margin:0}
    .panelbar{position:absolute;left:0;right:0;top:0;height:24px;pointer-events:none}
    .panelhandle{
      position:absolute;
      left:50%;
      top:-7px;
      transform:translateX(-50%);
      width:44px;
      height:11px;
      border-radius:99px;
      background:rgba(255,255,255,.14);
      opacity:.65;
      pointer-events:auto;
      cursor:pointer;
      transition:opacity .18s ease,background .18s ease
    }
    .panelhandle:hover{opacity:1;background:rgba(255,255,255,.22)}
    .panelhandle:active{transform:translateX(-50%) translateY(1px)}

    .meta-box{
      background:transparent;
      border-color:transparent;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
      opacity:1;
      overflow:hidden;
      border-radius:18px;
      width:100%;
    }

    .header-row{
      width:610px;
      margin:0 auto;
      height:50px;
      display:grid;
      grid-template-columns:40px 1fr 40px;
      align-items:center;
    }

    .banner-shell{
      width:500px;
      height:40px;
      margin:0 auto;
      background:rgba(0,0,0,.55);
      padding:10px 0;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.07);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      transition:background .18s ease,border-color .18s ease,box-shadow .18s ease,backdrop-filter .18s ease,-webkit-backdrop-filter .18s ease;
    }

    .banner-btn:hover .banner-shell{
      background:rgba(0,0,0,.62);
      border-color:rgba(255,255,255,.14);
      transform:translateY(-1px);
    }

    .sliding-universe{
      font-size:15px;
      font-weight:900;
      padding:0 14px;
      display:flex;
      justify-content:center;
      align-items:center;
      white-space:nowrap;
      gap:0;
    }

    #uni,#verse{
      color:#66dd33;
      font-weight:900;
      opacity:.9;
      letter-spacing:.13em;
      text-shadow:0 0 6px rgba(102,221,51,.18);
      transition:color .18s ease,opacity .18s ease,text-shadow .18s ease,filter .18s ease;
    }

    #middle{
      color:rgba(51,102,255,0.65);
      max-width:650px;
      opacity:.7;
      overflow:hidden;
      white-space:nowrap;
      transition:3s;
      text-shadow:0 0 8px rgba(80,140,255,.18);
      padding-right:1px;
    }

    .highlight{
      color:#3366FF;
      opacity:1 !important;
      font-weight:800;
      letter-spacing:.10em;
      text-shadow:0 0 2px rgba(120,160,255,.35);
    }

    .collapsed #middle{max-width:0;opacity:0;visibility:hidden}
    .expanded #middle{max-width:650px;opacity:1;visibility:visible}

    .portal-btn{
      width:40px;
      height:40px;
      border:1px solid rgba(51,102,255,.18);
      border-radius:12px;
      background:rgba(8,18,40,.38);
      display:grid;
      place-items:center;
      cursor:pointer;
      transition:background .18s ease,border-color .18s ease,transform .18s ease,box-shadow .18s ease;
      padding:0;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      box-shadow:inset 0 0 8px rgba(255,255,255,.04);
    }

    .portal-btn:hover{
      background:rgba(51,102,255,.10);
      border-color:rgba(51,102,255,.34);
      transform:translateY(-1px);
      box-shadow:0 0 0 1px rgba(51,102,255,.14),0 0 18px rgba(51,102,255,.18),inset 0 0 8px rgba(255,255,255,.05);
    }

    .portal-btn:active{transform:translateY(0)}

    .portal-btn.is-open{
      background:rgba(8,18,40,.38);
      border-color:rgba(51,102,255,.18);
      box-shadow:inset 0 0 8px rgba(255,255,255,.04);
    }

    .portal-btn svg{
      width:17px;
      height:17px;
      overflow:visible;
      display:block;
    }

.portal-btn .shape{
  stroke:rgba(51,102,255,.82);
  stroke-width:1.8;
  fill:none;
  stroke-linecap:round;
  vector-effect:non-scaling-stroke;
  transform-box:fill-box;
  transform-origin:center;
  transition:opacity .18s ease,transform .22s ease,filter .18s ease,stroke .18s ease;
}

.portal-btn .icon-default,
.portal-btn .icon-hover,
.portal-btn .icon-open{
  opacity:0;
  pointer-events:none;
}

.portal-btn:not(:hover):not(.is-open) .icon-default{opacity:1}
.portal-btn:hover .icon-hover{opacity:1}
.portal-btn.is-open:not(:hover) .icon-open{opacity:1}

.portal-btn:hover .icon-hover{
  filter:drop-shadow(0 0 6px rgba(255,255,255,.16));
  transform:scale(1.03);
}

.portal-btn.is-open:not(:hover) .icon-open{
  filter:drop-shadow(0 0 6px rgba(255,255,255,.12));
  transform:translateY(.2px) scale(1.02);
}

    .logo-link{
      width:40px;
      height:40px;
      display:grid;
      place-items:center;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      box-shadow:inset 0 0 8px rgba(255,255,255,.06);
    }

    .logo-link img{
      width:25px;
      height:25px;
      display:block;
    }

    .logo-link:hover{
      background:rgba(0,0,0,.45);
      border-color:rgba(255,255,255,.18);
      transform:translateY(-1px);
    }

    .banner-btn{
      border:0;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .portal-outlet{
      width:100%;
      display:flex;
      justify-content:center;
      margin-top:14px;
      border-radius:14px;
      overflow:visible;
      border:0;
      background:transparent;
      box-shadow:none;
      display:none;
    }
    .portal-outlet.is-open{display:block}

    .portal-iframe{
      width:100%;
      height:610px;
      border:0;
      border-radius:16px;
      display:block;
      background:transparent;
    }

    .meta-box.is-open .banner-shell{
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.008));
      backdrop-filter:blur(1px) saturate(108%) contrast(103%);
      -webkit-backdrop-filter:blur(1px) saturate(108%) contrast(103%);
    }

    .meta-box.is-open .banner-btn:hover .banner-shell{
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      transform:translateY(-1px);
    }

    .meta-box.is-open #uni,
    .meta-box.is-open #verse{
      color:rgba(255,255,255,.01);
      opacity:.1;
      text-shadow:0 0 1px rgba(255,255,255,.75),0 0 10px rgba(255,255,255,.58);
      filter:blur(.2px);
    }

    .meta-box.is-open .banner-btn:hover #uni,
    .meta-box.is-open .banner-btn:hover #verse{
      color:var(--green);
      opacity:.95;
      filter:none;
      text-shadow:0 0 6px rgba(34,221,9,.35),0 0 16px rgba(34,221,9,.22);
    }

    .dao-title{
      margin:22px 0 0;
      font-size:12px;
      text-align:center;
      color:#333;
    }
    .dao-title a{text-decoration:none}
    .dao-highlight{
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      color:#333;
      letter-spacing:1px;
    }
    .dao-title a:hover .dao-highlight{color:var(--green)}
    .dao-text{
      text-align:center;
      color:#333;
      font-size:10px;
      margin-top:0;
      font-family:var(--font-ui);
    }
    .emphasis{font-weight:900;color:#333}

    @keyframes metaSpaceDrift{
      0%{transform:scale(1.05) translate(0,0)}
      50%{transform:scale(1.12) translate(1%,-1%)}
      100%{transform:scale(1.08) translate(-1%,1%)}
    }

    #codexCenter .inner-dim{
      fill:rgba(0,0,0,0.45);
      opacity:0;
      transition:opacity .18s ease;
      pointer-events:none;
    }

    #codexCenter .inner-hit{
      fill:transparent;
      cursor:pointer;
      pointer-events:auto;
    }

    #codexCenter.is-word-active .inner-dim{
      opacity:1;
    }

    .frame-credo{
      position:absolute;
      left:14px;
      right:14px;
      bottom:14px;
      z-index:6;
      display:none;
      padding:14px 14px 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(8,12,20,.72) 0%, rgba(4,8,16,.88) 70%, rgba(0,0,0,.92) 100%);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      box-shadow:0 10px 26px rgba(0,0,0,.55);
      pointer-events:auto;
    }
    .frame-credo.show{display:block}
    .frame-credo .codexline{padding:0;margin:0;justify-content:center}

    .community-name{
      font-weight:700;
      font-style:italic;
    }

    .mirror-text.inactive{
      opacity:0.5;
    }

    .codexrow{
      display:flex;
      align-items:flex-start;
      gap:12px;
      width:100%;
    }

    .codex-deeplink{
      text-align:left;
    }

    .codexcenter{
      flex:1;
      text-align:left;
    }

    .codexcenter .codexline{
      padding:0;
      margin:0;
      justify-content:flex-start;
    }

    .codex-chevron{
      opacity:.2;

    (() => {
      'use strict';

      const BASE_W = 650;
      const root = document.documentElement;

      const box = document.getElementById('momentumBox');

      const diagram = document.getElementById('diagramWrap');

      const layoutBtn = document.getElementById('layoutBtn');

      const memeDiv = document.getElementById('slidingMeme');
      const middle = document.getElementById('middle');

      homeLink.addEventListener('click', e => e.stopPropagation());

      const memes = [
        "te to master <span class='highlight'>Infinite Game</span> through the Meta",
        "te to find <span class='highlight'>consensus</span> through the Meta"
      ];

      const FIRST_START_MS = 1000;
      const CYCLE_MS = 8000;
      const COLLAPSE_MS = 3000;

      let idx = 0;
      let open = false;
      let navVisible = true;

      let loopInterval = null;
      let startTimer = null;
      let cycleTimer = null;

      function rescale(){
        const vw = Math.max(root.clientWidth || 0, window.innerWidth || 0);
        root.style.setProperty('--scale', String(Math.min(vw / BASE_W, 1)));
      }

      function clearTimers(){
        if(loopInterval){ clearInterval(loopInterval); loopInterval = null; }
        if(startTimer){ clearTimeout(startTimer); startTimer = null; }
        if(cycleTimer){ clearTimeout(cycleTimer); cycleTimer = null; }
      }

      function setUniverseOnly(){
        middle.innerHTML = "";
        memeDiv.classList.remove('expanded');
        memeDiv.classList.add('collapsed');
      }

      function setExpandedWithText(html){
        middle.innerHTML = html || "";
        memeDiv.classList.remove('collapsed');
        memeDiv.classList.add('expanded');
      }

      function cycleOnce(){
        memeDiv.classList.remove('expanded');
        memeDiv.classList.add('collapsed');
        cycleTimer = setTimeout(() => {
          idx = (idx + 1) % memes.length;
          setExpandedWithText(memes[idx]);
        }, COLLAPSE_MS);
      }

      function startSequence(){
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        clearTimers();
        setUniverseOnly();
        idx = 0;
        startTimer = setTimeout(() => {
          setExpandedWithText(memes[idx]);
          loopInterval = setInterval(cycleOnce, CYCLE_MS);
        }, FIRST_START_MS);
      }

      function stopSequence(){
        clearTimers();
        setUniverseOnly();
      }

      function postToPortal(type, payload){
        try{
          const w = iframe?.contentWindow;
          if(!w) return;
          w.postMessage({ source:'momentum', type, payload: payload || {} }, '*');
        }catch(_e){}
      }

      function applyPortalButton(){
        layoutBtn.classList.toggle('is-open', open);
        layoutBtn.setAttribute('aria-pressed', String(open));
      }

      function openPortalHome(){
        if(!iframe) return;
        navVisible = true;
        iframe.src = 'about:blank';
        requestAnimationFrame(() => {
          iframe.src = 'portal.html';
        });
      }

      window.addEventListener('message', event => {
        const msg = event.data;
        if (!msg || (msg.source !== 'portal' && msg.source !== 'portal-inner')) return;

        if (msg.type === 'OPEN_PULSE') {
          navVisible = false;
          setOpen(true);
          iframe.src = 'about:blank';
          requestAnimationFrame(() => {
            iframe.src = 'pulse.html';
          });
        }
      });

      function setOpen(next){
        open = !!next;

        box.setAttribute('aria-expanded', String(open));
        box.classList.toggle('is-open', open);
        toggle.setAttribute('aria-expanded', String(open));
        outlet.classList.toggle('is-open', open);
        diagram?.classList.toggle('is-hidden', open);
        applyPortalButton();

        if(open) stopSequence();
        else startSequence();

        if(open){
          postToPortal('PORTAL_NAV_SET', { visible: navVisible });
        }

        rescale();
      }

      toggle.addEventListener('click', e => {
        e.preventDefault();
        setOpen(!open);
      });

      layoutBtn.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        if(open){
          setOpen(false);
          return;
        }
        navVisible = true;
        openPortalHome();
        setOpen(true);
      });

      window.addEventListener('resize', rescale, { passive: true });
      window.addEventListener('load', () => {
        rescale();
        setOpen(false);
      });

      function openActivationCodex(){
        if(!iframe) return;
        iframe.src = 'codex/codex.html';
        navVisible = false;
        setOpen(true);
      }

      window.setOpen = setOpen;
      window.postToPortal = postToPortal;
      window.openActivationCodex = openActivationCodex;
    })();
  </script>

  <script>
    function initCodexWheelSpin({wheelRoot,startAngle=100,secondsPerRevolution=60}={}){
      const reduce=()=>window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const spinGroup=wheelRoot?.querySelector('#codexSpinGroup');
      if(!spinGroup) return;
      let raf=null,prev=0,angle=startAngle,paused=false;
      const degPerSec=360/secondsPerRevolution;
      function apply(){spinGroup.setAttribute('transform',`rotate(${angle} 120 120)`);}
      function tick(now){
        raf=requestAnimationFrame(tick);
        if(paused){prev=now;return;}
        const dt=(now-prev)/1000;
        prev=now;
        angle=(angle-dt*degPerSec)%360;
        apply();
      }
      function start(){
        if(reduce()) return;
        prev=performance.now();
        apply();
        raf=requestAnimationFrame(tick);
      }
      wheelRoot.addEventListener('mouseenter',()=>paused=true);
      wheelRoot.addEventListener('mouseleave',()=>paused=false);
      return{start};
    }

    (() => {
      const center=document.getElementById('codexCenter');
      if(!center) return;
      center.addEventListener('pointerdown',e=>e.stopPropagation());
      center.addEventListener('click',e=>e.stopPropagation());

      const wheel=initCodexWheelSpin({wheelRoot:center,startAngle:100,secondsPerRevolution:60});
      wheel?.start();

      const words=[...center.querySelectorAll('.word[data-codex]')];
      words.forEach(w=>{
        w.addEventListener('click',()=>{
          words.forEach(x=>x.classList.remove('is-active'));
          w.classList.add('is-active');
          center.dispatchEvent(new CustomEvent('codex:select',{bubbles:true,detail:{codex:w.getAttribute('data-codex')}}));
        });
      });

      const innerHit = center.querySelector('.inner-hit');
      if(innerHit){
        innerHit.addEventListener('click', e => {
          e.stopPropagation();
          const m = window.sizeMode;

          if(m === "mc" || m === "social"){
            if(window.closePanel) window.closePanel();
            if(window.setCodexMode) window.setCodexMode();
            return;
          }

          if(window.resetToDefault) window.resetToDefault();
        });
      }
    })();

    function updateMetrics(){

          d.metaMetric=Number.isFinite(mv)?mv:null;
          d.hasMetaMetric=Number.isFinite(mv);
        }else{
          d.metaMetric=null;
          d.hasMetaMetric=false;

      }
      if(codexNode){
        const v=codexMetricFromJson("codex");
        codexNode.codexMetric=Number.isFinite(v)?v:100;

        codexNode.codexSovereign=true;

      gSel.classed("selected",d=>!!d.selected);

          return proveNodeState(d).isSovereign ? 0.28 : 0;

      gSel.select("circle.ring")
        .attr("fill",d=>{
          if(!isCodexLike) return "none";
          return proveNodeState(d).isSovereign ? "url(#grad-codex)" : "none";
        })
        .attr("stroke",d=>{
          const p=proveNodeState(d);
          if(isCodexLike && p.isSovereign) return "rgba(51,102,255,.60)";

    function applySizing(nextMode){
      sizeMode=nextMode;
      ensureCodexNode();
      updateMetrics();

      if(sizeMode==="codex" || sizeMode==="meta"){
        const maxR=50;
        const minR=8;
        const coreR=maxR;
        codexNode.r=coreR;
        codexNode.hidden=false;

        for(const d of nodes){
          if(d.isCodexMaster) continue;
          const v=(sizeMode==="codex") ? (Number.isFinite(d.codexMetric)?d.codexMetric:null) : (Number.isFinite(d.metaMetric)?d.metaMetric:null);
          if(v===null){
            d.r=Math.max(15, coreR*0.10);
          }else{
            const t=Math.max(0, Math.min(1, v/100));
            d.r=Math.max(minR, coreR*t);
          }
        }
      }else{
        codexNode.r=0.0001;
        codexNode.hidden=true;
        const values=nodes.filter(d=>!d.isCodexMaster).map(d=>sizeMode==="social"?(d.socialScore||0):(d.mc||0)).map(v=>Math.max(1,v));
        const min=Math.min(...values);
        const max=Math.max(...values);
        for(const d of nodes){
          if(d.isCodexMaster) continue;
          const v=sizeMode==="social"?(d.socialScore||0):(d.mc||0);
          const minR=11;
          const maxR=sizeMode==="social"?46:50;
          d.r=sizeMode==="social"?radiusFromSqrt(v,min,max,minR,maxR):radiusFromCap(v,min,max,minR,maxR);
        }

        gSel.select("circle.ring").attr("r",d=>d.r);

          .attr("width",d=>Math.max(0.0001,(d.r-LOGO_PAD)*2))

    function codexPanelBody({ id, name }) {
      const isUniversePanel = String(id) === "codex";
      const isCodexTab = !activeWord;
      const label = activeWord ? String(activeWord).toUpperCase() : "CODEX";

      if (isUniversePanel) {
        const sentence = activeWord ? codexContextLong(id, activeWord) : null;

        return `
          <div class="links">
            <div class="codexnote">
              <div class="codex-rowhead">
                <div class="codexrow">
                  <span class="codexcenter">
                    ${codexLineHtml()}
                  </span>
                </div>
              </div>
            </div>

            ${
              sentence ? `
              <div class="codexnote" style="margin-top:12px;">
                <div class="codex-sentence-row">
                  <div>
                    <span style="color:var(--green);font-weight:900;letter-spacing:.08em;">
                      ${label}
                    </span>
                    <span style="color:rgba(51,102,255,.85);font-weight:700;">
                      ${sentence.replace(new RegExp("^"+label+"\\s*", "i"), "")}
                    </span>
                  </div>

                  <a class="codex-explore" href="#" data-open-codex="1" aria-label="Explore CODEX explanation">
                    EXPLORE <span class="arr">↗</span>
                  </a>
                </div>
              </div>
              ` : ``
            }
          </div>
        `;
      }

      let shortText = "";
      let inactive = false;
      const isSovereign = codexSovereignFromJson(id);

      if (isCodexTab) {
        const ctxShort = codexContextShort(id, "codex");

        if (ctxShort) {
          shortText = ctxShort;
          inactive = false;
        } else {
          shortText = `Mirror of the <span class="community-name">${name}</span> Community Soul`;
          inactive = !isSovereign;
        }
      } else {
        const ctxShort = codexContextShort(id, activeWord);
        const fallbackFn = CODEX_DEFAULTS[activeWord];

        if (ctxShort) {
          shortText = ctxShort;
        } else {
          inactive = !isSovereign;
          shortText = (fallbackFn ? fallbackFn(name) : `How <span class="community-name">${name}</span> activates ${label}.`);
        }
      }

      const longText = (!isCodexTab && activeWord) ? codexContextLong(id, activeWord) : null;
      const showChev = !!longText;

      const activationNote = inactive ? `<span class="activation-note activation-open" data-open-activation="1" role="button" tabindex="0" aria-label="SPARK CODEX"></span>` : "";
      const shortWrapped = inactive
        ? `<span class="codex-explain-row"><span class="left"><span class="mirror-text inactive">${shortText}</span></span>${activationNote}</span>`
        : `<span class="mirror-text">${shortText}</span>`;

      return `
        <div class="links">
          <div class="codexnote">
            <div class="codex-rowhead">
              <div class="codexrow">
                <span class="codex-deeplink" data-open-codex="1">

                <span class="codexcenter">
                  ${shortWrapped}
                </span>

                ${showChev ? `<span class="codex-chevron">⌄</span>` : ``}
              </div>
            </div>

            ${showChev ? `
              <div class="codex-expand" data-codex-expand-body="1" style="display:none">
                ${longText}
              </div>
            ` : ``}
          </div>
        </div>
      `;
    }

          const cap=capPx();
          const panelH=Math.min(panel.scrollHeight,cap);
          const nextH=TOTAL_H-panelH;

          H=nextH;

          svg.attr("viewBox",`0 0 ${W} ${H}`);
          if(holeCircleSel)holeCircleSel.attr("cy",cy);

          if(simulation){
            simulation.force("y",d3.forceY(cy).strength(CENTER_GRAV));
            simulation.force("walls",forceWalls());
            simulation.alpha(0.7).alphaTarget(0.12).restart();
            setTimeout(()=>simulation.alphaTarget(0),250);
          }
        };

        const applyPanelDynamic=()=>{
          panel.classList.add("dynamic");
          panel.style.height="auto";
          panel.style.maxHeight=`min(300px,45vh)`;
          panel.style.overflowY="auto";
        };

        const toggleExpand=state=>{
          const expanded=state!==undefined?state:note.classList.toggle("expanded");
          note.classList.toggle("expanded",expanded);
          body.style.display=expanded?"block":"none";
          applyPanelDynamic();
          syncFrameToPanel();
        };

        note.addEventListener("click",()=>toggleExpand());

        if(window.matchMedia("(hover:hover)").matches){
          note.addEventListener("mouseenter",()=>toggleExpand(true));
          note.addEventListener("mouseleave",()=>toggleExpand(false));
        }
      }
    }

    async function loadCoinDetails(id){
      if(detailsCache[id])return detailsCache[id];
      const r=await fetch(`https://api.coingecko.com/api/v3/coins/${encodeURIComponent(id)}?localization=false&tickers=false&market_data=false&community_data=false&developer_data=false&sparkline=false`);
      if(!r.ok)throw new Error("API error");
      const d=await r.json();
      detailsCache[id]=d;
      return d;
    }

    async function loadDailySocials(){
      try{
        const r=await fetch(`${SOCIALS_JSON_URL}?v=${Date.now()}`,{cache:"no-store"});
        if(!r.ok)return;
        const j=await r.json();
        const items=Array.isArray(j.items)?j.items:[];
        socialsById={};
        for(const it of items){if(it&&it.id)socialsById[it.id]=it}
      }catch(e){}

        .attr("y",d=>-(d.r-LOGO_PAD))
        .attr("clip-path",d=>`url(#clip-${d.id})`)
        .attr("preserveAspectRatio","xMidYMid meet");

      gSel.append("text").attr("class","codex-label").attr("text-anchor","middle").attr("dominant-baseline","middle")
        .attr("font-family","ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Ubuntu,sans-serif")
        .attr("font-weight","900").attr("letter-spacing",".10em")
        .attr("fill","var(--blue)")
        .text(d=>d.isCodexMaster?"CODEX":"")
        .style("pointer-events","none")
        .style("display","none");

      gSel.selectAll("circle.fill, circle.ring, circle.ring-shine, text.codex-label")
        .style("transform-origin","center")
        .style("transition","transform 320ms cubic-bezier(.2,.9,.2,1), opacity 320ms ease");

      gSel.on("pointerenter",(e,d)=>{
        svg.selectAll(".node").style("opacity",".35");
        d3.select(e.currentTarget).style("opacity","1").raise();
        tip.innerHTML=bubbleTipHtml(d);
        tip.style.display="block";
      }).on("pointermove",e=>{
        const rect = frameEl.getBoundingClientRect();
        const pad = 12;
        const rawX = e.clientX - rect.left;
        const rawY = e.clientY - rect.top;
        const tipW = tip.offsetWidth;
        const tipH = tip.offsetHeight;
        let x = rawX;
        let y = rawY;
        if(x < pad) x = pad;
        if(x > rect.width - tipW - pad) x = rect.width - tipW - pad;
        if(y < tipH + pad) y = tipH + pad;
        if(y > rect.height - pad) y = rect.height - pad;
        tip.style.left = x + "px";
        tip.style.top  = y + "px";
      }).on("pointerleave",()=>{
        tip.style.display="none";
        svg.selectAll(".node").style("opacity",".35");
        applyStyles();
      });

      const drag=d3.drag().on("start",(event,d)=>{
        tip.style.display="none";
        if(!event.active)simulation.alphaTarget(0.25).restart();
        d.fx=d.x;d.fy=d.y;
      }).on("drag",(event,d)=>{
        d.fx=Math.max(d.r,Math.min(W-d.r,event.x));
        d.fy=Math.max(d.r,Math.min(H-d.r,event.y));
      }).on("end",(event,d)=>{
        if(!event.active)simulation.alphaTarget(0);
        d.fx=null;d.fy=null;
      });

      gSel.call(drag);

      gSel.on("click",async (e,d)=>{
        e.stopPropagation();
        if(d.isCodexMaster){
          renderCodexSystemPanel();
          if(simulation){
            simulation.alpha(0.65).alphaTarget(0.10).restart();
            setTimeout(()=>simulation.alphaTarget(0),250);
          }
          return;
        }

        nodes.forEach(n=>n.selected=false);
        d.selected=true;
        svg.selectAll(".node").classed("selected",n=>n.selected);

        if(collide){
          const pad=sizeMode==="social"?COLLISION_PAD+4:COLLISION_PAD;
          collide.radius(n=>{
            if(n.isCodexMaster) return (sizeMode==="codex"||sizeMode==="meta") ? (n.r+pad) : 0.1;
            return n.r+(n.selected?SELECT_PAD:pad);
          });
        }

        const wasOpen = panel.classList.contains("show");
        const inCodexContext = !!activeWord || sizeMode === "codex" || sizeMode === "meta";

        panelTab = wasOpen ? panelTab : (inCodexContext ? "codex" : "mc");

        if (!wasOpen && panelTab === "codex") {
          applySizing(activeWord ? "meta" : "codex");
        }

        if(panelTab === "mc"){
          activeWord = null;
          updateWheelHighlight();
          applySizing("mc");
        }else if(panelTab === "social"){
          activeWord = null;
          updateWheelHighlight();
          applySizing("social");
        }else if(panelTab === "codex"){
          updateWheelHighlight();
          applySizing(activeWord ? "meta" : "codex");
        }

        setLayout(true, panelTab);

        panel.innerHTML=`<div class="panelbar"><div class="panelhandle" id="panelHandle" role="button" tabindex="0" aria-label="Collapse"></div></div><div class="coinname">Loading…</div><div class="smallnote">Fetching links</div>`;
        const hBtn=document.getElementById("panelHandle");
        if(hBtn){
          hBtn.addEventListener("click",closePanel);
          hBtn.addEventListener("keydown",ev=>{if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();closePanel()}});
        }

        const id=d.id;
        const symbol=String(d.symbol||"").toUpperCase();
        const name=d.name;
        const logo=d.image||"";
        const mc=d.mc||0;
        const jsonLinks=linksFromJson(id);
        const jsonCounts=socialCountsFromJson(id);
        const jsonCountsAvail=Object.values(jsonCounts).some(v=>Number.isFinite(v));
        const hasAnyJsonLink=Object.values(jsonLinks).some(Boolean);

        if(hasAnyJsonLink||jsonCountsAvail){
          activeCoin={id,symbol,name,logo,mc,links:jsonLinks,counts:jsonCounts,countsAvailable:jsonCountsAvail,sourceNote:""};
          renderDetailsView(activeCoin);
          if(simulation){
            simulation.alpha(0.9).alphaTarget(0.15).restart();
            setTimeout(()=>simulation.alphaTarget(0),400);
          }
          return;
        }

        try{
          const details=await loadCoinDetails(id);
          const cgLinks=linksFromCoinGecko(details);
          const mergedLinks={website:jsonLinks.website||cgLinks.website,github:jsonLinks.github||cgLinks.github,x:jsonLinks.x||cgLinks.x,telegram:jsonLinks.telegram||cgLinks.telegram,discord:jsonLinks.discord||cgLinks.discord,instagram:jsonLinks.instagram||cgLinks.instagram,youtube:jsonLinks.youtube||cgLinks.youtube,tiktok:jsonLinks.tiktok||cgLinks.tiktok,reddit:jsonLinks.reddit||cgLinks.reddit};
          activeCoin={id,symbol,name,logo,mc,links:mergedLinks,counts:{github:null,x:null,telegram:null,discord:null,instagram:null,youtube:null,tiktok:null,reddit:null},countsAvailable:false,sourceNote:"Links from CoinGecko (followers pending)."};
          renderDetailsView(activeCoin);
        }catch(_err){
          activeCoin={id,symbol,name,logo,mc,links:jsonLinks,counts:jsonCounts,countsAvailable:jsonCountsAvail,sourceNote:"Failed to fetch CoinGecko links."};
          renderDetailsView(activeCoin);
        }

        if(simulation){
          simulation.alpha(0.9).alphaTarget(0.15).restart();
          setTimeout(()=>simulation.alphaTarget(0),400);
        }
      });

      collide=d3.forceCollide().radius(d=>d.r+COLLISION_PAD).iterations(2);

      if(simulation)simulation.stop();
      simulation=d3.forceSimulation(nodes)
        .force("x",d3.forceX(cx).strength(CENTER_GRAV))
        .force("y",d3.forceY(cy).strength(CENTER_GRAV))
        .force("repel",d3.forceManyBody().strength(REPULSION))
        .force("collide",collide)
        .force("swirl",forceSwirl())
        .force("drift",forceDrift())
        .force("hole",forceHole())
        .force("walls",forceWalls())
        .alpha(1).alphaDecay(0.02)
        .on("tick",()=>{gSel.attr("transform",d=>`translate(${d.x},${d.y})`)});

      updateHoleStyle();
      applyStyles();
    }

    async function load(){
      try{
        await loadDailySocials();
        const res=await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=${VS}&category=${CAT}&order=market_cap_desc&per_page=${PER}&page=1&sparkline=false`,{headers:{accept:"application/json"}});
        if(!res.ok)throw new Error(`HTTP ${res.status}`);
        const data=await res.json();
        const filtered=data.filter(d=>{
          const name=String(d.name||"").toLowerCase();
          const id=String(d.id||"").toLowerCase();
          if(name.includes("binance-peg")||name.includes("binance peg")||name.includes("wrapped")||name.includes("wormhole")||id.includes("binance-peg")||id.includes("wrapped"))return false;
          return true;
        });
        const seen=new Set();
        const clean=[];
        for(const d of filtered){
          const sym=String(d.symbol||"").toLowerCase();
          if(seen.has(sym))continue;
          seen.add(sym);
          clean.push(d);
        }

      nodes=clean.map(d=>{
        const id=d.id;
        const st=topSocialForId(id);
        const ss=socialScoreForId(id);
        const mc=d.market_cap||0;
        return{id,symbol:d.symbol,name:d.name,mc,image:d.image,socialTop:st,socialScore:ss,codexMetric:null,hasCodexMetric:false,codexSovereign:false,metaMetric:null,hasMetaMetric:false,isCodexMaster:false,r:12,x:Math.random()*W,y:Math.random()*H,selected:false};
      });

        maxMcSeen=nodes.reduce((m,d)=>Math.max(m,d.mc||0),0);
        ensureCodexNode();
        updateMetrics();

        for(const d of nodes){
          const dx=d.x-cx,dy=d.y-cy;
          const dist=Math.sqrt(dx*dx+dy*dy)||1e-6;
          const minDist=HOLE_R+d.r+HOLE_PAD;
          if(dist<minDist){
            const ang=Math.random()*Math.PI*2;
            d.x=cx+Math.cos(ang)*minDist;
            d.y=cy+Math.sin(ang)*minDist;
          }
        }

        rebuildViz();
        setLayout(false, panelTab);
        applySizing(sizeMode);
        updateWheelHighlight();

        setTimeout(pulseCredoWordsOnce, 700);
      }catch(_e){}
    }

    window.addEventListener("codex:select",e=>{
      const key=e?.detail?.codex;
      if(!key) return;
      setActiveWord(String(key));
      if(activeCoin){
        panelTab="codex";
        setLayout(true,panelTab);
        renderDetailsView(activeCoin);
        if(simulation){
          simulation.alpha(0.65).alphaTarget(0.10).restart();
          setTimeout(()=>simulation.alphaTarget(0),250);
        }
      }
    });

    window.resetToDefault = resetToDefault;
    window.applySizing = applySizing;
    window.updateWheelHighlight = updateWheelHighlight;
    window.closePanel = closePanel;
    window.renderCodexSystemPanel = renderCodexSystemPanel;

    window.setCodexMode = () => {
      activeWord = null;
      panelTab = "codex";
      applySizing("codex");
      updateWheelHighlight();
      setLayout(false, panelTab);
      if(simulation){
        simulation.alpha(0.9).alphaTarget(0.15).restart();
        setTimeout(()=>simulation.alphaTarget(0),400);
      }
    };

    Object.defineProperty(window, "sizeMode", { get: () => sizeMode, set: v => sizeMode = v });
    Object.defineProperty(window, "activeWord", { get: () => activeWord, set: v => activeWord = v });

    load();
    setInterval(load,30*60*1000);
  </script>
</body>
</html>
