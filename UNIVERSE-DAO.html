<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=610, initial-scale=1.0, user-scalable=no" />

<title>UNIVERSE.DAO</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

:root{

  --blue:#5f7cff;
  --blue-soft:#7f96ff;
  --blue-dim:#4e67d8;

  --bg:#030712;
  --bg-soft:#071120;
  --bg-panel:#060d18;
  --bg-panel-2:#091425;

  --text:#d8e1ff;
  --text-soft:rgba(216,225,255,.72);
  --text-dim:rgba(216,225,255,.44);

  --border:rgba(120,150,255,.10);

  --glow:rgba(95,124,255,.16);

}

*{
  box-sizing:border-box;
}

html,
body{
  width:610px;
  height:610px;

  margin:0;
  overflow:hidden;

  background:var(--bg);

  color:var(--text);

  font-family:
    ui-sans-serif,
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    sans-serif;

  -webkit-font-smoothing:antialiased;
}

body{
  background:
    radial-gradient(
      circle at top,
      rgba(95,124,255,.10),
      transparent 42%
    ),
    linear-gradient(
      180deg,
      #02050d,
      #01040a
    );
}

/* SHELL */

.shell{
  width:610px;
  height:610px;
}

.panel{
  width:100%;
  height:100%;

  display:flex;

  overflow:hidden;

  background:
    linear-gradient(
      180deg,
      rgba(4,10,20,.96),
      rgba(2,6,14,.98)
    );

  border:
    1px solid var(--border);
}

/* NAV */

.nav{
  width:220px;
  min-width:220px;

  height:100%;

  overflow-y:auto;
  overflow-x:hidden;

  padding:16px 10px;

  border-right:
    1px solid var(--border);

  background:
    linear-gradient(
      180deg,
      rgba(8,18,35,.98),
      rgba(4,10,20,.98)
    );

  transition:
    width .22s ease,
    min-width .22s ease,
    padding .22s ease;

  scrollbar-width:thin;
  scrollbar-color:#33405f transparent;
}

.nav::-webkit-scrollbar,
.content::-webkit-scrollbar{
  width:8px;
}

.nav::-webkit-scrollbar-thumb,
.content::-webkit-scrollbar-thumb{
  background:#33405f;
  border-radius:20px;
}

.nav::-webkit-scrollbar-track,
.content::-webkit-scrollbar-track{
  background:transparent;
}

.nav.collapsed{
  width:0;
  min-width:0;

  padding:0;

  overflow:hidden;

  border-right:0;
}

.nav.collapsed *{
  display:none;
}

.brand{
  color:#6f8cff;

  font-size:13px;
  font-weight:900;

  letter-spacing:.18em;

  margin:4px 8px 20px;
}

.group{
  margin:18px 8px 8px;

  color:var(--text-dim);

  font-size:10px;
  font-weight:900;

  letter-spacing:.18em;

  text-transform:uppercase;
}

.file{
  width:100%;

  border:0;
  border-radius:12px;

  background:transparent;

  color:var(--text-soft);

  text-align:left;

  font-size:13px;
  font-weight:750;

  padding:10px 12px;

  margin-bottom:4px;

  cursor:pointer;

  transition:.16s ease;
}

.file:hover{
  color:#fff;

  background:
    rgba(255,255,255,.04);
}

.file.active{
  color:#fff;

  background:
    linear-gradient(
      90deg,
      rgba(95,124,255,.18),
      rgba(95,124,255,.05)
    );

  box-shadow:
    inset 2px 0 0 var(--blue-soft);
}

/* MAIN */

.main{
  flex:1;

  min-width:0;
  height:100%;

  display:flex;
  flex-direction:column;
}

/* TOP BAR */

.top{
  height:52px;
  min-height:52px;

  display:grid;

  grid-template-columns:
    52px
    1fr
    auto;

  align-items:center;

  gap:14px;

  padding:0 16px;

  border-bottom:
    1px solid var(--border);

  background:
    linear-gradient(
      180deg,
      rgba(6,12,22,.94),
      rgba(3,8,16,.94)
    );
}

.toggle{
  width:36px;
  height:36px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:12px;

  border:
    1px solid rgba(120,150,255,.08);

  background:
    rgba(95,124,255,.06);

  color:var(--blue-soft);

  font-size:15px;

  cursor:pointer;

  transition:.18s ease;
}

.toggle:hover{
  background:
    rgba(95,124,255,.12);

  box-shadow:
    0 0 18px rgba(95,124,255,.12);

  color:#fff;
}

.title{
  min-width:0;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;

  color:#6f8cff;

  font-size:13px;
  font-weight:900;

  letter-spacing:.16em;

  text-transform:uppercase;
}

.github{
  justify-self:end;

  color:#6f8cff;

  font-size:12px;
  font-weight:850;

  text-decoration:none;
}

.github:hover{
  color:#c9d4ff;
}

/* CONTENT */

.content{
  flex:1;

  overflow-y:auto;
  overflow-x:hidden;

  padding:22px;

  scrollbar-width:thin;
  scrollbar-color:#33405f transparent;
}

/* MARKDOWN */

#doc{
  font-size:13px;

  line-height:1.72;

  color:var(--text-soft);

  word-break:break-word;
}

#doc img{
  max-width:100%;

  height:auto;

  border-radius:14px;

  display:block;

  margin:16px auto;
}

#doc h1{
  color:#e8eefc;

  font-size:26px;

  text-align:center;

  letter-spacing:.08em;

  margin:12px 0 28px;
}

#doc h2{
  color:#8ea2ff;

  font-size:17px;

  margin:24px 0 10px;
}

#doc h3{
  color:#fff;

  font-size:15px;
}

#doc h4,
#doc h5,
#doc h6{
  color:#dbe5ff;
}

#doc p{
  margin:0 0 16px;
}

#doc strong{
  color:#f0f4ff;
}

#doc em{
  font-style:italic;
}

#doc a{
  color:#8ea5ff;

  text-decoration:none;

  font-weight:700;
}

#doc a:hover{
  color:#c9d4ff;
}

#doc ul,
#doc ol{
  margin:0 0 16px 22px;

  padding:0;
}

#doc li{
  margin:6px 0;
}

#doc code{
  background:
    rgba(255,255,255,.06);

  border:
    1px solid rgba(255,255,255,.08);

  border-radius:6px;

  padding:2px 5px;

  color:#dbe5ff;

  font-family:
    "SF Mono",
    Menlo,
    Consolas,
    monospace;

  font-size:12px;
}

#doc pre{
  overflow:auto;

  padding:14px;

  border-radius:14px;

  background:
    rgba(0,0,0,.34);

  border:
    1px solid rgba(255,255,255,.08);
}

#doc pre code{
  background:none;
  border:0;
  padding:0;
}

#doc blockquote{
  margin:16px 0;

  padding:12px 16px;

  border-left:
    2px solid var(--blue);

  background:
    linear-gradient(
      90deg,
      rgba(95,124,255,.10),
      rgba(95,124,255,.03)
    );

  color:
    rgba(230,236,248,.76);
}

#doc blockquote p{
  margin:0 0 8px;
}

#doc blockquote p:last-child{
  margin-bottom:0;
}

#doc hr{
  border:0;

  border-top:
    1px solid rgba(255,255,255,.08);

  margin:24px 0;
}

#doc table{
  width:100%;

  border-collapse:collapse;

  margin:18px 0;

  font-size:12px;
}

#doc th,
#doc td{
  border:
    1px solid rgba(255,255,255,.10);

  padding:8px 10px;

  text-align:left;

  vertical-align:top;
}

#doc th{
  color:#dbe5ff;

  background:
    rgba(255,255,255,.06);
}

.status{
  color:
    rgba(255,255,255,.5);
}

</style>
</head>

<body>

<div class="shell">

<div class="panel">

<nav class="nav collapsed" id="nav">

<div class="brand">
UNIVERSE.DAO
</div>

</nav>

<main class="main">

<div class="top">

<button class="toggle" id="toggleNav">
☰
</button>

<div class="title" id="title">
README
</div>

<a
  class="github"
  id="githubLink"
  href="https://github.com/UNIVERSE-DAO/UNIVERSE"
  target="_blank"
  rel="noopener"
>
GitHub ↗
</a>

</div>

<div class="content" id="content">

<article id="doc" class="status">
Loading...
</article>

</div>

</main>

</div>

</div>

<script>

const RAW_BASE =
'https://raw.githubusercontent.com/UNIVERSE-DAO/UNIVERSE/main/';

const GITHUB_BASE =
'https://github.com/UNIVERSE-DAO/UNIVERSE/blob/main/';

const FILES = [

{
  group:'Root',
  items:[
    {label:'Portal to the Possible',path:'README.md'},
    {label:'CONTRIBUTING',path:'CONTRIBUTING.md'},
    {label:'LICENSE',path:'LICENSE.md'}
  ]
},

{
  group:'DAO',
  items:[
    {label:'0.0 Layer Zero',path:'0 DAO/0.0 Layer Zero.md'},
    {label:'0.1 SIG',path:'0 DAO/0.1 SIG.md'},
    {label:'0.2 UIP',path:'0 DAO/0.2 UIP.md'},
    {label:'0.3 DAOIST',path:'0 DAO/0.3 DAOIST.md'}
  ]
},

{
  group:'MOMENTUM',
  items:[
    {label:'1.1 MEMES',path:'1 MOMENTUM/1.1 MEMES.md'},
    {label:'1.2 MINDFORGER',path:'1 MOMENTUM/1.2 MINDFORGER.md'},
    {label:'1.3 FICTION ?',path:'1 MOMENTUM/1.3 FICTION ?.md'}
  ]
},

{
  group:'SOVERN',
  items:[
    {label:'2.0 UID',path:'2 SOVERN/2.0 UID.md'},
    {label:'2.1 SOVEREIGNTY',path:'2 SOVERN/2.1 SOVEREIGNTY.md'}
  ]
},

{
  group:'D-UI',
  items:[
    {label:'3.0 CODEX',path:'3 D-UI/3.0 CODEX.md'},
    {label:'3.1 VOW',path:'3 D-UI/3.1 VOW.md'},
    {label:'3.2 GUIDE',path:'3 D-UI/3.2 GUIDE.md'},
    {label:'3.3 COMMON',path:'3 D-UI/3.3 COMMON.md'},
    {label:'3.4 EQUILIBRIUM',path:'3 D-UI/3.4 EQUILIBRIUM.md'},
    {label:'3.5 SUCCESS',path:'3 D-UI/3.5 SUCCESS.md'},
    {label:'3.6 COMUD',path:'3 D-UI/3.6 COMUD.md'}
  ]
},

{
  group:'DOCS',
  items:[
    {label:'PHILOSOPHY',path:'docs/PHILOSOPHY.md'},
    {label:'VISION',path:'docs/VISION.md'},
    {label:'MISSION',path:'docs/MISSION.md'},
    {label:'ARCHITECTURE',path:'docs/ARCHITECTURE.md'},
    {label:'ROADMAP',path:'docs/ROADMAP.md'},
    {label:'MANIFESTO',path:'docs/MANIFESTO.md'},
    {label:'GLOSSARY',path:'docs/GLOSSARY.md'},
    {label:'STRUCTURE',path:'docs/STRUCTURE.md'},
    {label:'HIGHLIGHTS',path:'docs/HIGHLIGHTS.md'},
    {label:'BUIDL4',path:'docs/BUIDL4.md'}
  ]
}

];
const el = {

  nav:
    document.getElementById('nav'),

  doc:
    document.getElementById('doc'),

  title:
    document.getElementById('title'),

  github:
    document.getElementById('githubLink'),

  content:
    document.getElementById('content')

};

function normalizePath(path){

  const parts = [];

  path.split('/').forEach(part => {

    if(!part || part === '.')
      return;

    if(part === '..')
      parts.pop();

    else
      parts.push(part);

  });

  return parts.join('/');

}

function rawUrl(path){

  return RAW_BASE +
    normalizePath(path)
      .split('/')
      .map(encodeURIComponent)
      .join('/');

}

function githubUrl(path){

  return GITHUB_BASE +
    normalizePath(path)
      .split('/')
      .map(encodeURIComponent)
      .join('/');

}

function resolveRelativePath(href,currentPath){

  const cleanHref =
    href.split('#')[0];

  if(/^https?:\/\//i.test(cleanHref))
    return cleanHref;

  if(cleanHref.startsWith('/'))
    return normalizePath(cleanHref.slice(1));

  const base =
    currentPath.split('/');

  base.pop();

  return normalizePath(
    base.concat(cleanHref.split('/')).join('/')
  );

}

function resolveRelativeUrl(url,currentPath){

  if(/^https?:\/\//i.test(url))
    return url;

  if(url.startsWith('#'))
    return url;

  return rawUrl(
    resolveRelativePath(url,currentPath)
  );

}

function findFile(path){

  const normalized =
    normalizePath(path);

  return FILES
    .flatMap(group => group.items)
    .find(item => item.path === normalized);

}

function labelFromPath(path){

  return path
    .split('/')
    .pop()
    .replace(/\.md$/i,'');

}

function renderMarkdown(md,currentPath){

  marked.setOptions({
    breaks:true,
    gfm:true
  });

  let html =
    marked.parse(md);

  /* images */

  html = html.replace(
    /<img([^>]*?)src=["']([^"']+)["']([^>]*)>/gi,
    (_,a,src,b) => {

      return `
        <img
          ${a}
          src="${resolveRelativeUrl(src,currentPath)}"
          ${b}
        >
      `;

    }
  );

  /* md links */

  html = html.replace(
    /<a([^>]*?)href=["']([^"']+\.md(?:#[^"']*)?)["']([^>]*)>/gi,
    (_,a,href,b) => {

      if(/^https?:\/\//i.test(href)){
        return `<a${a}href="${href}"${b}>`;
      }

      const nextPath =
        resolveRelativePath(href,currentPath);

      return `
        <a
          href="#"
          data-md-link="${nextPath}"
        >
      `;

    }
  );

  /* normal links */

  html = html.replace(
    /<a([^>]*?)href=["']([^"']+)["']([^>]*)>/gi,
    (_,a,href,b) => {

      if(
        href.startsWith('#') ||
        href.startsWith('http') ||
        href.startsWith('mailto:')
      ){

        return `
          <a
            ${a}
            href="${href}"
            ${b}
            target="_blank"
            rel="noopener"
          >
        `;

      }

      return `
        <a
          ${a}
          href="${resolveRelativeUrl(href,currentPath)}"
          ${b}
          target="_blank"
          rel="noopener"
        >
      `;

    }
  );

  return html;

}

function buildNav(){

  FILES.forEach(group => {

    const g =
      document.createElement('div');

    g.className = 'group';

    g.textContent =
      group.group;

    el.nav.appendChild(g);

    group.items.forEach(item => {

      const b =
        document.createElement('button');

      b.className = 'file';

      b.type = 'button';

      b.textContent =
        item.label;

      b.dataset.path =
        item.path;

      b.addEventListener(
        'click',
        () => {

          loadFile(item);

          el.nav.classList.add('collapsed');

        }
      );

      el.nav.appendChild(b);

    });

  });

}

function setActive(path){

  const normalized =
    normalizePath(path);

  [
    ...el.nav.querySelectorAll('.file')
  ]

  .forEach(btn => {

    btn.classList.toggle(
      'active',
      btn.dataset.path === normalized
    );

  });

}

function attachInternalMdLinks(){

  el.doc
    .querySelectorAll('[data-md-link]')
    .forEach(a => {

      a.addEventListener('click',e => {

        e.preventDefault();

        const nextPath =
          normalizePath(
            a.getAttribute('data-md-link')
          );

        const found =
          findFile(nextPath);

        loadFile(

          found ||

          {
            label:labelFromPath(nextPath),
            path:nextPath
          }

        );

      });

    });

}

async function loadFile(item){

  const path =
    normalizePath(item.path);

  el.doc.className =
    'status';

  el.doc.textContent =
    'Loading...';

  el.title.textContent =
    item.label || labelFromPath(path);

  el.github.href =
    githubUrl(path);

  setActive(path);

  try{

    const r = await fetch(
      rawUrl(path),
      {cache:'no-store'}
    );

    if(!r.ok)
      throw new Error('not found');

    const md =
      await r.text();

    el.doc.className = '';

    el.doc.innerHTML =
      renderMarkdown(md,path);

    attachInternalMdLinks();

    el.content.scrollTop = 0;

  }catch(e){

    el.doc.className =
      'status';

    el.doc.textContent =
      'Document could not be loaded.';

  }

}

document
.getElementById('toggleNav')
.addEventListener('click',() => {

  el.nav.classList.toggle('collapsed');

});

buildNav();

const requestedDoc =
  new URLSearchParams(window.location.search).get('doc');

const initialFile =
  requestedDoc
    ? findFile(requestedDoc) || {
        label: labelFromPath(requestedDoc),
        path: requestedDoc
      }
    : FILES[0].items[0];

loadFile(initialFile);

</script>

</body>
</html>
