<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAVEL Gallery</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  background:#000;
  font-family:Arial,Helvetica,sans-serif;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:none;
  -ms-overflow-style:none;
}

body::-webkit-scrollbar{
  display:none;
}

.gallery{
  width:100%;
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:6px;
  padding:6px;
}

.card{
  position:relative;
  aspect-ratio:1 / 1;
  overflow:hidden;
  border-radius:8px;
  background:#111;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:.3s;
}

.card:hover img{
  transform:scale(1.03);
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:.25s;
}

.card:hover .overlay{
  opacity:1;
}

.overlay-box{
  width:86%;
  padding:12px;
  border-radius:14px;
  background:rgba(35,35,35,.82);
  border:1px solid rgba(90,130,255,.45);
  backdrop-filter:blur(8px);
  display:flex;
  flex-direction:column;
  gap:12px;
  text-align:center;
}

.overlay-box a{
  color:#4d7cff;
  text-decoration:none;
  font-weight:700;
  font-size:13px;
  line-height:1.35;
}

.overlay-box a:hover{
  color:#86a9ff;
  text-decoration:underline;
}

.copyright{
  font-size:.65em;
  vertical-align:super;
}

.loading{
  text-align:center;
  color:#777;
  padding:40px;
}
</style>
</head>

<body>

<div id="loading" class="loading">Loading Gallery...</div>
<div id="gallery" class="gallery"></div>

<script>
const OWNER="UNIVERSE-MEME";
const REPO="uni_PAVEL_verse";

const PREVIEW_FOLDER="PAVEL-Gallery";
const ORIGINAL_FOLDER="DUROV-Gallery";

const LICENSE="https://github.com/UNIVERSE-DAO/UNIVERSE/blob/main/LICENSE.md";
const TELEGRAM="https://t.me/uni_chat_verse";

const API=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PREVIEW_FOLDER}`;

async function loadGallery(){
  try{
    const response=await fetch(API);
    const files=await response.json();

    document.getElementById("loading").style.display="none";

    const gallery=document.getElementById("gallery");

    files
      .filter(file=>file.type==="file" && /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name))
      .forEach(file=>{

        const preview=file.download_url;

        const original=preview.replace(
          `/${PREVIEW_FOLDER}/`,
          `/${ORIGINAL_FOLDER}/`
        );

        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
          <img
            loading="lazy"
            src="${preview}"
            data-preview="${preview}"
            data-original="${original}"
            data-state="preview"
            alt="${file.name}">

          <div class="overlay">
            <div class="overlay-box">

              <a href="${LICENSE}" target="_blank" rel="noopener noreferrer">
                UNIVERSE–4ALL <span class="copyright">©</span>
              </a>

              <a href="${TELEGRAM}" target="_blank" rel="noopener noreferrer">
                Original Contributor<br>on Telegram
              </a>

            </div>
          </div>
        `;

        gallery.appendChild(card);
      });

  }catch(e){
    console.error(e);
    document.getElementById("loading").innerHTML="Unable to load gallery.";
  }
}

document.addEventListener("click",function(e){
  if(e.target.closest(".overlay-box a")) return;

  const card=e.target.closest(".card");
  if(!card) return;

  const img=card.querySelector("img");

  if(img.dataset.state==="preview"){
    img.src=img.dataset.original;
    img.dataset.state="original";
  }else{
    img.src=img.dataset.preview;
    img.dataset.state="preview";
  }
});

loadGallery();
</script>

</body>
</html>
