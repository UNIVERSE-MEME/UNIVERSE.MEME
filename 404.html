<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404</title>

<style>
:root{
  --bg:#000;
  --text:rgba(245,245,250,.92);
  --muted:rgba(255,255,255,.4);
  --blue:#3366FF;
  --green:#22DD09;
  --orange:#FF6600;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:
    radial-gradient(circle at 20% 10%, rgba(51,102,255,.18), transparent 40%),
    #000;
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.wrap{
  padding:24px;
}

.main{
  font-size:20px;
  letter-spacing:.18em;
  color:var(--blue);
  margin-bottom:18px;
}

.dots{
  display:inline-block;
  width:36px;
  text-align:left;
}

.sub{
  font-size:14px;
  color:var(--orange);
  margin-bottom:34px;
  letter-spacing:.12em;
}

a{
  font-size:13px;
  letter-spacing:.22em;
  text-decoration:none;
  color:#fff;
  border-bottom:1px solid rgba(255,255,255,.25);
  padding-bottom:6px;
  transition:.2s;
}

a:hover{
  color:var(--green);
  border-color:var(--green);
}

/* animated dots */
@media (prefers-reduced-motion: no-preference){
  .dots::after{
    content:"";
    animation:dots 3.6s steps(4,end) infinite;
  }
  @keyframes dots{
    0%{content:""}
    25%{content:"."}
    50%{content:".."}
    75%{content:"..."}
    100%{content:""}
  }
}
</style>
</head>

<body>

<div class="wrap">
  <div class="main">
    404 · ACTIVATION PENDING<span class="dots"></span>
  </div>

  <div class="sub">MOMENTUM IS BUILDING</div>

  <a href="#" onclick="history.back(); return false;">RETURN</a>
</div>

</body>
</html>
