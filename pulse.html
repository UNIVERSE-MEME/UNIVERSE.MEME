<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UNIVERSE = META MEME OF MEANING</title>

<style>
:root{
  --text:rgba(240,240,245,.92);
  --blue:#2F6BFF;
  --blue-dim:rgba(51,102,255,.45);
  --mutedBlue:rgba(47,107,255,.70);
  --mutedBlue2:rgba(47,107,255,.55);
  --grayFoot:rgba(200,205,215,.52);
  --border:rgba(255,255,255,.10);
  --box-bg:rgba(255,255,255,.03);
  --box-border:rgba(255,255,255,.10);
  --scroll-track:rgba(255,255,255,.04);
  --scroll-thumb:rgba(47,107,255,.55);
  --scroll-thumb-hover:rgba(47,107,255,.85);
  --green:#22DD09;
}

html,body{
  height:100%;
  margin:0;
  background:transparent;
  overflow:hidden;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:94%;
  height:94%;
  padding:18px;
  border:1px solid var(--border);
  border-radius:10px;
  background:
    radial-gradient(circle at 0 0, rgba(47,107,255,.10), transparent 60%),
    rgba(0,0,0,.55);
  text-align:center;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:thin;
  scrollbar-color:var(--scroll-thumb) var(--scroll-track);
}

.card::-webkit-scrollbar{width:8px;}
.card::-webkit-scrollbar-track{background:var(--scroll-track);border-radius:8px;}
.card::-webkit-scrollbar-thumb{
  background:var(--scroll-thumb);
  border-radius:8px;
  box-shadow:0 0 8px rgba(47,107,255,.28);
}
.card::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover);}

.meta-title{
  font-size:20px;
  margin:0 0 14px;
  font-weight:950;
  letter-spacing:2px;
  color:var(--blue);
  text-shadow:0 0 18px rgba(47,107,255,.18);
  transition:color .25s ease, text-shadow .25s ease, opacity .25s ease;
  cursor:pointer;
  user-select:none;
}

.meta-title span{
  color:var(--blue);
  opacity:1;
  transition:opacity .25s ease, color .25s ease, text-shadow .25s ease;
}

.meta-title.is-why .title-meta,
.meta-title.is-why .title-meme,
.meta-title.is-why .title-of{
  opacity:.22;
  text-shadow:none;
}

.meta-title.is-what .title-meta,
.meta-title.is-what .title-of,
.meta-title.is-what .title-meaning{
  opacity:.22;
  text-shadow:none;
}

.meta-title.is-how .title-meme,
.meta-title.is-how .title-of,
.meta-title.is-how .title-meaning{
  opacity:.22;
  text-shadow:none;
}

.meta-title.is-map .title-meta,
.meta-title.is-map .title-meme,
.meta-title.is-map .title-of,
.meta-title.is-map .title-meaning{
  opacity:.22;
  text-shadow:none;
}

.meta-title:hover span,
.meta-title:focus-visible span{
  opacity:1;
}

details.section{
  width:min(560px,95%);
  margin:12px auto;
  padding:16px 10px;
  border:1px solid var(--box-border);
  border-radius:14px;
  background:var(--box-bg);
}

summary.section-title{
  list-style:none;
  cursor:pointer;
  user-select:none;
  font-size:13px;
  letter-spacing:4px;
  font-weight:900;
  text-transform:uppercase;
  color:rgba(200,205,215,.55);
  transition:color .18s ease, opacity .18s ease;
}

summary.section-title::-webkit-details-marker{display:none;}

details.section summary.section-title:hover,
details.section summary.section-title:focus-visible{
  color:rgba(240,240,245,.85);
}

details.section[open] summary.section-title{
  color:rgba(200,205,215,.38);
}

.section-content{
  margin-top:14px;
  font-size:14px;
  line-height:1.75;
  color:var(--blue);
}

.how-shell{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.input-main{
  width:280px;
  height:40px;
  padding:0 12px;
  border-radius:16px;
  border:1px dashed rgba(47,107,255,.35);
  background:
    radial-gradient(circle at 0 0, rgba(47,107,255,.06), transparent 65%),
    rgba(0,0,0,.66);
  color:rgba(47,107,255,.92);
  text-shadow:0 0 10px rgba(47,107,255,.18);
  text-align:center;
  font-size:13px;
  font-weight:700;
  outline:none;
  transition:border-color .18s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease;
  caret-color:rgba(47,107,255,.92);
}

.input-main::placeholder{
  color:rgba(47,107,255,.92);
}

.input-main:focus{
  border-color:rgba(47,107,255,.48);
  box-shadow:0 0 0 1px rgba(47,107,255,.18),0 0 20px rgba(47,107,255,.16);
  background:
    radial-gradient(circle at 0 0, rgba(47,107,255,.08), transparent 65%),
    rgba(0,0,0,.72);
}

.coord{
  display:flex;
  align-items:center;
  justify-content:center;
  width:280px;
  height:28px;
  padding:4px 10px 4px 14px;
  border-radius:14px;
  border:1px solid rgba(47,107,255,.24);
  background:
    radial-gradient(circle at 0 0, rgba(47,107,255,.08), transparent 62%),
    rgba(10,20,40,.18);
  font-size:13px;
  font-weight:900;
  letter-spacing:.08px;
  cursor:pointer;
  transition:all .18s ease;
  box-shadow:
    inset 0 0 14px rgba(47,107,255,.04),
    0 0 14px rgba(47,107,255,.06);
}

.coord:hover{
  background:
    radial-gradient(circle at 0 0, rgba(47,107,255,.12), transparent 62%),
    rgba(10,20,40,.24);
  border-color:rgba(47,107,255,.38);
  box-shadow:
    inset 0 0 16px rgba(47,107,255,.06),
    0 0 18px rgba(47,107,255,.10);
}

.coord-main{
  flex:1 1 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:0;
}

.coord-symbol,
.coord-word{
  color:rgba(200,205,215,.20);
  transition:color .18s ease, text-shadow .18s ease;
}

.coord-key{
  color:rgba(200,205,215,.35);
  background:none;
  padding:0;
  border-radius:0;
  text-shadow:none;
  box-shadow:none;
  transition:color .18s ease, text-shadow .18s ease, opacity .18s ease, max-width .22s ease, transform .22s ease;
  display:inline-block;
  overflow:hidden;
  white-space:nowrap;
  max-width:72px;
  opacity:1;
}

.coord.is-collapsed .coord-key{
  max-width:0;
  opacity:0;
  transform:scaleX(.7);
}

.card.is-coord-active .coord-symbol{
  color:var(--blue);
  text-shadow:0 0 6px rgba(47,107,255,.25);
}

.card.is-coord-active .coord-key{
  color:var(--blue);
  text-shadow:0 0 8px rgba(47,107,255,.22);
}

.card.is-coord-active .coord-word{
  color:var(--green);
  text-shadow:0 0 6px rgba(34,221,9,.18);
}

.coord-copy{
  flex:0 0 auto;
  margin-left:8px;
  color:rgba(240,240,245,.28);
  font-size:12px;
  line-height:1;
  transition:color .18s ease, opacity .18s ease, transform .18s ease;
}

.coord:hover .coord-copy{
  color:rgba(240,240,245,.58);
}

.card.is-coord-active .coord-copy{
  color:rgba(240,240,245,.48);
}

.coord.copied{
  background:
    radial-gradient(circle at 0 0, rgba(47,107,255,.16), transparent 62%),
    rgba(10,20,40,.28);
  border-color:rgba(47,107,255,.46);
}

.coord.copied .coord-copy{
  color:rgba(240,240,245,.92);
}

details.section.map-section{
  opacity:.72;
  border-color:rgba(255,255,255,.06);
}

details.section.map-section:hover,
details.section.map-section[open]{
  opacity:.92;
}

details.section.map-section .section-title{
  color:rgba(200,205,215,.34);
}

details.section.map-section summary.section-title:hover,
details.section.map-section summary.section-title:focus-visible{
  color:rgba(220,225,235,.58);
}

.map-trigger{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.map-shell{
  margin-top:12px;
  display:flex;
  justify-content:center;
}

.map-link{
  display:inline-flex;
  align-items:center;
  gap:8px;
  text-decoration:none;
  color:var(--blue);
  font-size:13px;
  font-weight:700;
  letter-spacing:.2px;
  transition:color .18s ease, opacity .18s ease, transform .18s ease;
}

.map-link:hover,
.map-link:focus-visible{
  color:var(--green);
}

.map-arrow{
  font-size:13px;
  opacity:.85;
}

.footer{
  width:min(560px,92%);
  margin:16px auto 4px;
  padding-top:12px;
  font-size:12px;
  font-weight:900;
  color:var(--blue);
  text-align:center;
  transition:color .25s ease, opacity .25s ease;
}

.card.is-expanded .footer{
  color:var(--blue-dim);
}
</style>
</head>

<body>
<div class="card">

<h1 id="metaTitle" class="meta-title" role="button" tabindex="0">
  <span class="title-meta">META</span>
  <span class="title-meme">MEME</span>
  <span class="title-of">OF</span>
  <span class="title-meaning">MEANING</span>
</h1>

<details class="section">
  <summary class="section-title">WHY</summary>
  <div class="section-content">
    Find Meaning amid quantum distraction and AI forgery
  </div>
</details>

<details class="section">
  <summary class="section-title">WHAT</summary>
  <div class="section-content">
    A self-referencing MEME as portal to the UNIVERSE
  </div>
</details>

<details class="section how-section">
  <summary class="section-title">HOW</summary>
  <div class="how-shell">
    <input class="input-main" id="keywordInput" placeholder="enter META here to generate coordinates" />
    <div class="coord" id="copyTag" role="button" tabindex="0" aria-label="Copy coordinate">
      <div class="coord-main">
        <span class="coord-symbol">#</span><span class="coord-word">uni</span><span class="coord-symbol">_</span><span class="coord-key" id="coordKey">*****</span><span class="coord-symbol">_</span><span class="coord-word">verse</span>
      </div>
      <span class="coord-copy">⧉</span>
    </div>
  </div>
</details>

<details class="section map-section">
  <summary class="section-title map-trigger" id="mapTrigger">MAP</summary>
  <div class="map-shell">
    <a href="#" class="map-link" id="openPulseLink">
      teleport and feel the pulse of the UNIVERSE <span class="map-arrow">↗</span>
    </a>
  </div>
</details>

<div class="footer" id="footerText">
  CARRY THE MEME · PROTECT THE MEANING
</div>

</div>

<script>
(function(){
  const card=document.querySelector('.card');
  const sections=[...document.querySelectorAll('details.section')];
  const input=document.getElementById('keywordInput');
  const copy=document.getElementById('copyTag');
  const coordKey=document.getElementById('coordKey');
  const title=document.getElementById('metaTitle');
  const footer=document.getElementById('footerText');
  const openPulseLink=document.getElementById('openPulseLink');
  const mapTrigger=document.getElementById('mapTrigger');
  const whySection=sections[0];
  const whatSection=sections[1];
  const howSection=sections[2];
  const mapSection=sections[3];
  let hasFocusedInput=false;
  let mapPinned=false;

  function updateFooter(){
    if(whySection.open){
      footer.textContent='where meaning, attention, and action converge';
    }else if(whatSection.open){
      footer.textContent='this portal does not explain — it activates';
    }else if(howSection.open){
      footer.textContent='create · discover · map · unlock → arrive';
    }else if(mapSection.open){
      footer.textContent='where true signal emerges — meaning is found';
    }else{
      footer.textContent='CARRY THE MEME · PROTECT THE MEANING';
    }
  }

  function update(){
    const hasOpen=sections.some(s=>s.open);
    card.classList.toggle('is-expanded',hasOpen);
    title.classList.remove('is-why','is-what','is-how','is-map');
    if(whySection.open) title.classList.add('is-why');
    else if(whatSection.open) title.classList.add('is-what');
    else if(howSection.open) title.classList.add('is-how');
    else if(mapSection.open) title.classList.add('is-map');
    updateFooter();
  }

  function sanitize(value){
    return value
      .trim()
      .replace(/\s+/g,'_')
      .replace(/[^A-Za-z0-9_]/g,'')
      .replace(/^_+|_+$/g,'');
  }

  function updateCoordinate(){
    const value=sanitize(input.value);
    const hasValue=value.length>0;
    card.classList.toggle('is-coord-active',hasValue);
    copy.classList.toggle('is-collapsed',hasFocusedInput && !hasValue);
    coordKey.textContent=hasValue ? value : '*****';
  }

  function activateInputState(){
    if(hasFocusedInput) return;
    hasFocusedInput=true;
    input.placeholder='';
    updateCoordinate();
  }

  function copyCoordinate(){
    const value=sanitize(input.value);
    const output=value ? `#uni_${value}_verse` : '#uni__verse';
    navigator.clipboard.writeText(output);
    copy.classList.add('copied');
    setTimeout(()=>copy.classList.remove('copied'),1200);
  }

  function reset(){
    sections.forEach(s=>s.removeAttribute('open'));
    mapPinned=false;
    update();
  }

  function expandMap(){
    sections.forEach(o=>{
      if(o!==mapSection) o.removeAttribute('open');
    });
    mapSection.setAttribute('open','');
    update();
  }

  function collapseMap(){
    if(mapPinned) return;
    mapSection.removeAttribute('open');
    update();
  }

  function openMapAction(){
    mapPinned=true;
    expandMap();
    window.top.postMessage({
      source:'portal',
      type:'OPEN_PULSE'
    },'*');
  }

  sections.forEach(s=>{
    s.addEventListener('toggle',()=>{
      if(s.open && s!==mapSection){
        sections.forEach(o=>o!==s&&o.removeAttribute('open'));
      }
      update();
    });
  });

  title.addEventListener('click',reset);
  title.addEventListener('keydown',e=>{
    if(e.key==='Enter' || e.key===' '){
      e.preventDefault();
      reset();
    }
  });

  input.addEventListener('focus',activateInputState);
  input.addEventListener('click',activateInputState);
  input.addEventListener('input',updateCoordinate);

  copy.addEventListener('click',copyCoordinate);
  copy.addEventListener('keydown',e=>{
    if(e.key==='Enter' || e.key===' '){
      e.preventDefault();
      copyCoordinate();
    }
  });

  mapSection.addEventListener('mouseenter',()=>{
    expandMap();
  });

  mapSection.addEventListener('mouseleave',()=>{
    collapseMap();
  });

  mapTrigger.addEventListener('click',e=>{
    e.preventDefault();
    openMapAction();
  });

  mapTrigger.addEventListener('keydown',e=>{
    if(e.key==='Enter' || e.key===' '){
      e.preventDefault();
      openMapAction();
    }
  });

  openPulseLink.addEventListener('click',e=>{
    e.preventDefault();
    openMapAction();
  });

  updateCoordinate();
  update();
})();
</script>

</body>
</html>
